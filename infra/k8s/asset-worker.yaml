# asset-worker — Rust + Blender render pipeline (services/asset-worker). Image built on the box and
# `k3d image import`ed as lumin-asset-worker:prod (no registry), like the other lumin-* images.
#
# GPU-locked: Cycles + CUDA on the GTX 1060 (ADR-007), concurrency=1 (ADR-014, enforced in the
# JetStream consumer — a single replica is the deploy-side half). Off the web-live critical path: no
# order render blocks go-live, so this is a separate manifest the owner applies ONLY once the cluster
# can schedule a GPU (see README "asset-worker — GPU prerequisite"); until then it stays Pending,
# which is the honest signal, not a silent failure. The worker is a scaffold today (connects to NATS +
# idles); the image bakes Blender so GPU passthrough is proven before the pipeline lands.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-worker
  namespace: prod
spec:
  replicas: 1
  strategy:
    type: Recreate # one GPU — a rolling update would deadlock the new pod Pending on the held card
  selector:
    matchLabels: { app: asset-worker }
  template:
    metadata:
      labels: { app: asset-worker }
    spec:
      # k3s auto-creates this RuntimeClass when the NVIDIA container runtime is detected on the node.
      runtimeClassName: nvidia
      containers:
        - name: asset-worker
          image: lumin-asset-worker:prod
          imagePullPolicy: IfNotPresent # locally imported (no registry) — never try to pull
          env:
            # Server-to-server (internal DNS). Worker binds the ASSET_JOBS JetStream WorkQueue here and
            # pulls asset_job.created (core-api provisions the stream; the worker owns the consumer).
            - { name: NATS_URL, value: nats://nats:4222 }
            # Render callback (ADR-045): report each job's result to core-api. WORKER_CALLBACK_TOKEN MUST
            # equal core-api's; optional:true — until it is set the callback 401s and the job redelivers
            # (harmless this slice: the Unimplemented processor naks every job anyway, so nothing reports).
            - { name: CORE_API_URL, value: http://core-api:8080 }
            - name: WORKER_CALLBACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lumin-secrets
                  key: WORKER_CALLBACK_TOKEN
                  optional: true
            # Reserved for the NEXT slice (the real per-kind processors that write derivatives): Garage
            # creds (mirrors core-api's ASSETS_* key) for uploading the LOD glb / 360° sprite.
          resources:
            limits:
              nvidia.com/gpu: 1 # requires the NVIDIA k8s device plugin (see README)
