# TEMPLATE ONLY — Secret dùng CHUNG cho imgproxy (ADR-055) và wedding-web:
# imgproxy VERIFY chữ ký, wedding-web SINH chữ ký ⇒ hai bên phải cùng KEY/SALT.
# AWS_* chỉ imgproxy cần (đọc object từ Garage); wedding-web không tham chiếu.
#
# Vắng Secret này: imgproxy 403 mọi request, wedding-web fail-open trả URL gốc
# ⇒ ảnh vẫn hiện, chỉ không được tối ưu. Không có bước nào chặn deploy.
#
# One-time box bootstrap (xem README §imgproxy):
#
#   # 1. Khoá ký — hex, imgproxy đọc dạng hex nên phải là chuỗi hex hợp lệ.
#   KEY=$(openssl rand -hex 32); SALT=$(openssl rand -hex 32)
#
#   # 2. Key Garage CHỈ-ĐỌC, scope đúng 2 bucket ảnh. KHÔNG dùng lại key upload của
#   #    wedding-api (key đó có quyền ghi) và TUYỆT ĐỐI không cấp lumin-payment-proofs.
#   kubectl -n prod exec deploy/garage -- /garage key create imgproxy-ro
#   #    → chép Key ID + Secret key từ output
#   kubectl -n prod exec deploy/garage -- /garage bucket allow --read wedding-assets --key imgproxy-ro
#   kubectl -n prod exec deploy/garage -- /garage bucket allow --read lumin-assets   --key imgproxy-ro
#
#   # 3. Tạo Secret
#   kubectl -n prod create secret generic imgproxy-secrets \
#     --from-literal=IMGPROXY_KEY="$KEY" \
#     --from-literal=IMGPROXY_SALT="$SALT" \
#     --from-literal=AWS_ACCESS_KEY_ID="<Key ID ở bước 2>" \
#     --from-literal=AWS_SECRET_ACCESS_KEY="<Secret key ở bước 2>"
#
#   # 4. wedding-web đọc KEY/SALT lúc khởi động → phải restart mới ký được
#   kubectl -n prod rollout restart deploy/imgproxy deploy/wedding-web
#
# Đổi KEY/SALT về sau = mọi URL đã ký hết hiệu lực; Cloudflare còn cache bản cũ nên
# ảnh vẫn hiện tới khi TTL hết. Restart wedding-web ngay sau khi patch Secret.
apiVersion: v1
kind: Secret
metadata:
  name: imgproxy-secrets
  namespace: prod
type: Opaque
stringData:
  IMGPROXY_KEY: CHANGE_ME_hex32
  IMGPROXY_SALT: CHANGE_ME_hex32
  AWS_ACCESS_KEY_ID: CHANGE_ME_garage_readonly_key_id
  AWS_SECRET_ACCESS_KEY: CHANGE_ME_garage_readonly_secret
