# Postgres backup — daily pg_dump → restic snapshot to an OFFSITE repo (ADR-018: backup is a launch
# condition; offsite + encrypted + TESTED restore, non-negotiable). Not WAL-G/PITR on purpose: a single
# all-home box that already accepts downtime (ADR-009) does not need near-zero RPO, and restic is already
# the ADR's chosen tool for the object/secret side — one tool, offsite, encrypted, dedup, retention, and a
# trivial `pg_restore`. If you later want point-in-time recovery, that's WAL-G (custom pg image +
# archive_command) — see README.
#
# Prereqs (once, README "Backup & restore"): build+import lumin-backup:prod · create lumin-backup-secrets ·
# `restic init`. Manual test run:  kubectl -n prod create job --from=cronjob/postgres-backup backup-now
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: prod
spec:
  schedule: '0 3 * * *' # 03:00 daily — off-peak (ADR-018: the upload races home bandwidth)
  timeZone: 'Asia/Ho_Chi_Minh' # k8s >=1.27; without it the schedule is UTC
  concurrencyPolicy: Forbid # never run two dumps against the one DB at once
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3 # keep failed pods around — a vanished backup job is the failure that matters
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: lumin-backup:prod
              imagePullPolicy: IfNotPresent
              # Dump to a FILE first: `set -e` aborts on a pg_dump failure so restic can never snapshot a
              # truncated dump as a "successful" backup (a silent-corruption trap worse than no backup).
              # Retention is native to restic (no hand-rolled rotation). Heartbeat pings only on success.
              command: [/bin/sh, -ceu]
              args:
                - |
                  dump=/scratch/lumin.dump
                  echo "pg_dump -Fc → $dump"
                  pg_dump -Fc "$DATABASE_URL" -f "$dump"
                  echo "restic backup"
                  restic backup --host luminstudio --tag postgres "$dump"
                  echo "restic forget --prune"
                  restic forget --prune --keep-daily 7 --keep-weekly 4 --keep-monthly 6
                  if [ -n "${BACKUP_HEARTBEAT_URL:-}" ]; then
                    wget -qO- "$BACKUP_HEARTBEAT_URL" >/dev/null 2>&1 || true
                  fi
                  echo "backup ok"
              envFrom:
                - secretRef: { name: lumin-backup-secrets } # RESTIC_REPOSITORY/PASSWORD, AWS_*, heartbeat
              env:
                - name: DATABASE_URL # reuse the app's DB creds (pg_dump takes the conninfo URI directly)
                  valueFrom: { secretKeyRef: { name: lumin-secrets, key: DATABASE_URL } }
              volumeMounts:
                - { name: scratch, mountPath: /scratch }
              resources:
                requests: { cpu: 100m, memory: 128Mi }
                limits: { cpu: '1', memory: 512Mi } # ADR-014: cap so Blender/BFF win CPU
          volumes:
            # ponytail: 4Gi holds a -Fc dump of the 5Gi DB PVC; bump both if the DB outgrows it.
            - name: scratch
              emptyDir: { sizeLimit: 4Gi }
