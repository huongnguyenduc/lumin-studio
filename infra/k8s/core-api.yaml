# core-api (Go + Chi BFF). Image built from services/core-api → imported to k3d as lumin-core-api:prod.
# Boot is env-only; migrations run separately (the migrate Job) before this rolls out.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels: { app: core-api }
  template:
    metadata:
      labels: { app: core-api }
    spec:
      containers:
        - name: core-api
          image: lumin-core-api:prod
          imagePullPolicy: IfNotPresent # locally imported (no registry) — never try to pull
          ports:
            - { containerPort: 8080 }
          env:
            - { name: PORT, value: '8080' }
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: lumin-secrets, key: DATABASE_URL } }
            - { name: NATS_URL, value: nats://nats:4222 }
            # Fail-fast secrets — core-api refuses to boot without real values (ADR-030). All distinct.
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: lumin-secrets, key: JWT_SECRET } }
            - name: CUSTOMER_JWT_SECRET
              valueFrom: { secretKeyRef: { name: lumin-secrets, key: CUSTOMER_JWT_SECRET } }
            - name: TRACKING_SECRET
              valueFrom: { secretKeyRef: { name: lumin-secrets, key: TRACKING_SECRET } }
            # WORKER_CALLBACK_TOKEN — the static shared secret the asset-worker presents to the render
            # callback PATCH /internal/asset-jobs/{id} (ADR-045). optional:true — the endpoint is
            # fail-closed until set (unset → it rejects every call), so a missing key just keeps the
            # worker output path disabled rather than stalling the rollout; add it (same value on the
            # worker) when the render pipeline lands. Put the identical value in the worker's env.
            - name: WORKER_CALLBACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lumin-secrets
                  key: WORKER_CALLBACK_TOKEN
                  optional: true
            - { name: ALLOW_DEV_JWT_SECRET, value: 'false' }
            # Cloudflare terminates TLS → browser sees HTTPS → Secure cookies are correct.
            - { name: COOKIE_SECURE, value: 'true' }
            # --- Garage/S3 uploads (ADR-005/035/036). The endpoint is baked into the browser's
            # presigned-POST URL, so it MUST be the public S3 host, not the in-cluster Service DNS
            # (browser → s3.luminstudio.vn → tunnel → traefik → garage:3900). The payment-proof
            # retention sweep's server-side delete hairpins back through the same public host — fine
            # for a 6-hourly, non-fatal sweep. bucket/region/key-prefix keep their config defaults
            # (lumin-payment-proofs · lumin-assets · garage), so only endpoint+base-url+creds are set.
            # Two keys: a PROOF key scoped to the private proof bucket, an ASSETS key scoped to the
            # public lumin-assets bucket (shared by model + image uploads). The cred keys are
            # optional:true — they are created LATER by the Garage bootstrap (README), so until then
            # they are absent from lumin-secrets. optional lets the env stay unset (that store fails
            # closed, core-api still boots) instead of blocking the pod from starting on a missing key
            # — a required secretKeyRef to an absent key is a CreateContainerConfigError that stalls the
            # rollout. Buckets/keys/CORS: see README bootstrap.
            - { name: PAYMENT_PROOF_S3_ENDPOINT, value: 'https://s3.luminstudio.vn' }
            - {
                name: PAYMENT_PROOF_PUBLIC_BASE_URL,
                value: 'https://s3.luminstudio.vn/lumin-payment-proofs',
              }
            - name: PAYMENT_PROOF_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: lumin-secrets
                  key: PAYMENT_PROOF_ACCESS_KEY_ID
                  optional: true
            - name: PAYMENT_PROOF_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: lumin-secrets
                  key: PAYMENT_PROOF_SECRET_ACCESS_KEY
                  optional: true
            - { name: MODEL_UPLOAD_S3_ENDPOINT, value: 'https://s3.luminstudio.vn' }
            # Serve/host-pin base ≠ upload endpoint: uploads PUT path-style to s3.luminstudio.vn (above),
            # but the model3d_url browsers load is Garage website mode on assets.luminstudio.vn — anon,
            # bucket implied by host so NO /lumin-assets path segment (v1.0.1 has no anon S3 read). README.
            - { name: MODEL_UPLOAD_PUBLIC_BASE_URL, value: 'https://assets.luminstudio.vn' }
            - name: MODEL_UPLOAD_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: lumin-secrets
                  key: ASSETS_ACCESS_KEY_ID
                  optional: true
            - name: MODEL_UPLOAD_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: lumin-secrets
                  key: ASSETS_SECRET_ACCESS_KEY
                  optional: true
            - { name: IMAGE_UPLOAD_S3_ENDPOINT, value: 'https://s3.luminstudio.vn' }
            # Website-mode serve host (see MODEL_UPLOAD_PUBLIC_BASE_URL note) — product/pet/review images.
            - { name: IMAGE_UPLOAD_PUBLIC_BASE_URL, value: 'https://assets.luminstudio.vn' }
            - name: IMAGE_UPLOAD_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: lumin-secrets
                  key: ASSETS_ACCESS_KEY_ID
                  optional: true
            - name: IMAGE_UPLOAD_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: lumin-secrets
                  key: ASSETS_SECRET_ACCESS_KEY
                  optional: true
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: core-api
  namespace: prod
spec:
  selector: { app: core-api }
  ports:
    - { port: 8080, targetPort: 8080 }
