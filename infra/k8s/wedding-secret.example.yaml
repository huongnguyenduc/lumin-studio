# TEMPLATE ONLY — the wedding site's SEPARATE Secret (never reuses lumin-secrets;
# its own DB user/password + signing key + shared admin password, HANDOFF §6).
# wedding-api fail-fasts without a real JWT_SECRET; empty ADMIN_PASSWORD keeps
# login disabled (503); absent UPLOAD_* keys keep uploads disabled — the API
# still boots (the env refs are optional:true in wedding.yaml).
#
# One-time box bootstrap (see README §wedding):
#
#   PW=$(openssl rand -hex 32)
#   # role + database on the SHARED postgres instance (own database, own user):
#   kubectl -n prod exec deploy/postgres -- psql -U lumin -d lumin -c \
#     "CREATE ROLE wedding LOGIN PASSWORD '$PW'; CREATE DATABASE wedding OWNER wedding;"
#   kubectl -n prod create secret generic wedding-secrets \
#     --from-literal=DATABASE_URL="postgres://wedding:$PW@postgres:5432/wedding?sslmode=disable" \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=ADMIN_PASSWORD="<mật khẩu chủ tiệc tự chọn>"
#
# UPLOAD_S3_* come from the Garage bootstrap: create bucket `wedding-assets`,
# a key scoped to it (--owner), enable website mode + global alias
# wedding-assets.luminstudio.vn, replay CORS (one-rule-per-origin! Garage v1.0.1
# gotcha — see README), then `kubectl -n prod patch secret wedding-secrets` the
# two key values in.
apiVersion: v1
kind: Secret
metadata:
  name: wedding-secrets
  namespace: prod
type: Opaque
stringData:
  DATABASE_URL: postgres://wedding:CHANGE_ME@postgres:5432/wedding?sslmode=disable
  JWT_SECRET: CHANGE_ME_hex32
  ADMIN_PASSWORD: CHANGE_ME
  UPLOAD_S3_ACCESS_KEY_ID: CHANGE_ME_wedding_key
  UPLOAD_S3_SECRET_ACCESS_KEY: CHANGE_ME_wedding_secret
