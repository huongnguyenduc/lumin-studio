# TEMPLATE ONLY — do NOT put real values here and do NOT commit the real Secret.
# core-api fail-fast refuses to boot without real JWT_SECRET / CUSTOMER_JWT_SECRET / TRACKING_SECRET
# (forgeable tokens = money-out / PII leak, ADR-030). All three MUST be distinct.
#
# Create the real Secret on the box (values from `openssl rand -hex 32`):
#
#   PW=$(openssl rand -hex 32)
#   kubectl -n prod create secret generic lumin-secrets \
#     --from-literal=POSTGRES_PASSWORD="$PW" \
#     --from-literal=DATABASE_URL="postgres://lumin:$PW@postgres:5432/lumin?sslmode=disable" \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=CUSTOMER_JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=TRACKING_SECRET="$(openssl rand -hex 32)"
#
# DATABASE_URL embeds POSTGRES_PASSWORD — keep them consistent (rotate together).
# Upload creds (payment-proof/model/image) are omitted until garage/S3 lands → uploads fail closed,
# core-api still boots (matches the compose empty-creds behaviour).
apiVersion: v1
kind: Secret
metadata:
  name: lumin-secrets
  namespace: prod
type: Opaque
stringData:
  POSTGRES_PASSWORD: CHANGE_ME
  DATABASE_URL: postgres://lumin:CHANGE_ME@postgres:5432/lumin?sslmode=disable
  JWT_SECRET: CHANGE_ME_distinct_1
  CUSTOMER_JWT_SECRET: CHANGE_ME_distinct_2
  TRACKING_SECRET: CHANGE_ME_distinct_3
