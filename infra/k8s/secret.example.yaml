# TEMPLATE ONLY — do NOT put real values here and do NOT commit the real Secret.
# core-api fail-fast refuses to boot without real JWT_SECRET / CUSTOMER_JWT_SECRET / TRACKING_SECRET
# (forgeable tokens = money-out / PII leak, ADR-030). All three MUST be distinct.
#
# Create the real Secret on the box (values from `openssl rand -hex 32`):
#
#   PW=$(openssl rand -hex 32)
#   kubectl -n prod create secret generic lumin-secrets \
#     --from-literal=POSTGRES_PASSWORD="$PW" \
#     --from-literal=DATABASE_URL="postgres://lumin:$PW@postgres:5432/lumin?sslmode=disable" \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=CUSTOMER_JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=TRACKING_SECRET="$(openssl rand -hex 32)"
#
# DATABASE_URL embeds POSTGRES_PASSWORD — keep them consistent (rotate together).
#
# GARAGE_RPC_SECRET / GARAGE_ADMIN_TOKEN: `openssl rand -hex 32` each (garage.yaml reads them from env).
# Upload creds are the two S3 access keys created during the Garage bootstrap (README): a PROOF key
# scoped to the private lumin-payment-proofs bucket, and an ASSETS key scoped to the public lumin-assets
# bucket (core-api wires ASSETS_* to BOTH model + image uploads). Leave a pair empty → that store fails
# closed, core-api still boots (matches the compose empty-creds behaviour).
apiVersion: v1
kind: Secret
metadata:
  name: lumin-secrets
  namespace: prod
type: Opaque
stringData:
  POSTGRES_PASSWORD: CHANGE_ME
  DATABASE_URL: postgres://lumin:CHANGE_ME@postgres:5432/lumin?sslmode=disable
  JWT_SECRET: CHANGE_ME_distinct_1
  CUSTOMER_JWT_SECRET: CHANGE_ME_distinct_2
  TRACKING_SECRET: CHANGE_ME_distinct_3
  GARAGE_RPC_SECRET: CHANGE_ME_hex32
  GARAGE_ADMIN_TOKEN: CHANGE_ME_hex32
  PAYMENT_PROOF_ACCESS_KEY_ID: CHANGE_ME_proof_key
  PAYMENT_PROOF_SECRET_ACCESS_KEY: CHANGE_ME_proof_secret
  ASSETS_ACCESS_KEY_ID: CHANGE_ME_assets_key
  ASSETS_SECRET_ACCESS_KEY: CHANGE_ME_assets_secret
  # WORKER_CALLBACK_TOKEN (`openssl rand -hex 32`) — the asset-worker's render-callback bearer (ADR-045).
  # optional in core-api.yaml (endpoint fail-closed until set), so it can be omitted until the render
  # pipeline lands; when added, set the IDENTICAL value in the worker's env.
  WORKER_CALLBACK_TOKEN: CHANGE_ME_hex32
