# Traefik ingress — HTTP entrypoint only; TLS terminates at Cloudflare (matches the cluster's existing
# hello- pattern). Path: wildcard *.luminstudio.vn → Cloudflare tunnel → traefik :80 → routed by Host.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lumin
  namespace: prod
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: www.luminstudio.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: storefront, port: { number: 3000 } } }
    - host: admin.luminstudio.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: admin, port: { number: 3000 } } }
    - host: api.luminstudio.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: core-api, port: { number: 8080 } } }
    # Public S3 API — browsers presign-POST uploads straight to Garage (never proxied through
    # core-api, ADR: no POST-proxy through the tunnel). Path-style, so one host serves every bucket.
    # The tunnel's 100MB body cap is already baked into the upload MaxBytes. Admin :3903 is NOT
    # routed — it stays cluster-internal.
    - host: s3.luminstudio.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: garage, port: { number: 3900 } } }
    # Public assets — Garage website mode serves lumin-assets ANONYMOUSLY on the web endpoint (:3902),
    # bucket resolved by Host = the global alias `assets.luminstudio.vn` (v1.0.1 has no anon S3 read, so
    # product/model/pet images + the derivative .glb serve here, NOT off s3.luminstudio.vn). Path = object
    # key (bucket implied by host). Enabling website + the alias is prod-box CLI state, not this manifest —
    # see README §public asset serving. proofs stay private on s3.luminstudio.vn (never routed here).
    - host: assets.luminstudio.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: garage, port: { number: 3902 } } }
    # Ảnh đã resize + WebP (ADR-055). imgproxy đọc nguồn từ Garage qua S3 nội bộ, nên host
    # này KHÔNG serve object gốc — chỉ nhận URL đã ký. Ảnh gốc vẫn ở assets./wedding-assets.
    # Cloudflare cần cache-everything + Edge TTL dài trên host này (README §imgproxy), nếu
    # không mọi lần xem thiệp đều bắt con box decode lại từ đầu.
    - host: img.luminstudio.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: imgproxy, port: { number: 8080 } } }
