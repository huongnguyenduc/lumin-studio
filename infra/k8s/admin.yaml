# admin (Next standalone, desktop + mobile responsive). Build is hermetic (every route auth-gated/
# dynamic → no build-time backend) → imported to k3d as lumin-admin:prod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels: { app: admin }
  template:
    metadata:
      labels: { app: admin }
    spec:
      containers:
        - name: admin
          image: lumin-admin:prod
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 3000 }
          env:
            - { name: PORT, value: '3000' }
            - { name: CORE_API_URL, value: http://core-api:8080 }
            # Couple management ("Đám cưới") reaches wedding-api server-side with a
            # master bearer = wedding's ADMIN_PASSWORD (reused, no new secret). Both
            # are optional: without them the admin still boots and the page shows an
            # "unavailable" state, so the lumin admin never hard-depends on
            # wedding-secrets (which may be absent — see wedding.yaml).
            - { name: WEDDING_API_URL, value: http://wedding-api:8081 }
            - name: WEDDING_MASTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wedding-secrets
                  key: ADMIN_PASSWORD
                  optional: true
          readinessProbe:
            # `/` 307-redirects to /login (auth gate) — httpGet treats 2xx/3xx as ready.
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: prod
spec:
  selector: { app: admin }
  ports:
    - { port: 3000, targetPort: 3000 }
