# storefront (Next standalone). Image built with SITE_URL + CORE_API_URL as build args — the build
# ISR-prerenders the home against a LIVE core-api (ADR-009) → imported to k3d as lumin-storefront:prod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels: { app: storefront }
  template:
    metadata:
      labels: { app: storefront }
    spec:
      containers:
        - name: storefront
          image: lumin-storefront:prod
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 3000 }
          env:
            - { name: PORT, value: '3000' }
            # Request-time (ISR revalidate + Server Actions) reach core-api by internal DNS.
            - { name: CORE_API_URL, value: http://core-api:8080 }
            - { name: SITE_URL, value: https://www.luminstudio.vn }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: storefront
  namespace: prod
spec:
  selector: { app: storefront }
  ports:
    - { port: 3000, targetPort: 3000 }
