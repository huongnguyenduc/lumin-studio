# NATS JetStream — AssetJob WorkQueue + publish-on-commit outbox delivery. File store on a PVC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: prod
spec:
  replicas: 1
  strategy:
    type: Recreate # one PVC (JetStream file store)
  selector:
    matchLabels: { app: nats }
  template:
    metadata:
      labels: { app: nats }
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - --name=lumin-nats
            - --jetstream
            - --store_dir=/data
            - --http_port=8222 # monitoring → readiness /healthz
          ports:
            - { containerPort: 4222 }
            - { containerPort: 8222 }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /healthz, port: 8222 }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: nats-data }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nats-data
  namespace: prod
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests: { storage: 2Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: prod
spec:
  selector: { app: nats }
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }
