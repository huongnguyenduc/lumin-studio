# TEMPLATE ONLY — do NOT commit the real Secret. Kept SEPARATE from lumin-secrets on purpose: the
# restic repo password must NOT be mounted into every app pod, and backup creds rotate independently.
#
# The restic repo must be INITIALISED ONCE before the first backup (README "Backup & restore"):
#   restic init            # run with these same env vars set
# LOSE RESTIC_PASSWORD = LOSE EVERY BACKUP (restic can't decrypt without it). Store it offline too — that
# copy is the "1" of the 3-2-1 rule (ADR-018).
#
# Example uses an S3-compatible offsite bucket (Backblaze B2 / Wasabi / AWS / MinIO) — the "offsite bucket"
# ADR-018 calls for. Other backends: set RESTIC_REPOSITORY to a b2:/sftp:/rest:/gs:/azure: URL and swap the
# matching creds (see restic docs). Create it:
#
#   kubectl -n prod create secret generic lumin-backup-secrets \
#     --from-literal=RESTIC_REPOSITORY="s3:https://s3.us-west-002.backblazeb2.com/<bucket>/lumin-pg" \
#     --from-literal=RESTIC_PASSWORD="$(openssl rand -hex 32)" \
#     --from-literal=AWS_ACCESS_KEY_ID="<b2-key-id>" \
#     --from-literal=AWS_SECRET_ACCESS_KEY="<b2-app-key>"
apiVersion: v1
kind: Secret
metadata:
  name: lumin-backup-secrets
  namespace: prod
type: Opaque
stringData:
  RESTIC_REPOSITORY: s3:https://s3.<region>.backblazeb2.com/CHANGE_ME_bucket/lumin-pg
  RESTIC_PASSWORD: CHANGE_ME_hex32_STORE_THIS_OFFLINE_TOO
  AWS_ACCESS_KEY_ID: CHANGE_ME_b2_key_id
  AWS_SECRET_ACCESS_KEY: CHANGE_ME_b2_app_key
  # Optional dead-man's-switch: the backup job pings this URL only on SUCCESS. Point it at a Kuma "push"
  # monitor (or healthchecks.io) set to alert if a ping is missed — that is what catches a SILENTLY dead
  # backup (the classic failure: nobody notices the job stopped running). Leave unset to disable.
  # BACKUP_HEARTBEAT_URL: https://<kuma-host>/api/push/<token>?status=up
