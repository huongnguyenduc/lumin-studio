# Harness self-test lane (agent-harness.md §"Harness self-test (CI)" / ADR-023).
# Mọi hook self-no-op tới Phase 0 ⇒ "gate no-op" trông y hệt "gate pass"; self-test là cái phân biệt.
# `selftest` job chạy được pre-Phase-0 (không phụ thuộc toolchain app) — chỉ bash.
# `app-gates` job (Phase-0 trở đi) cài node + pnpm để chạy `pnpm verify` VÀ real-mutation-arm:
#   nếu vắng node_modules, osm-mutation.test.sh skip nhánh REAL ⇒ trên lane bash-only nó chỉ chạy
#   toy-check, "xanh" mà KHÔNG phủ source thật. app-gates đóng đúng lỗ hổng đó (audit r-PR4 A3/A4).
name: harness-selftest

on:
  push:
    paths:
      - '.claude/**'
      - 'tests/harness/**'
      - 'docs/agent-harness.md'
      - 'docs/acceptance.md'
      - '.github/workflows/harness.yml'
      # audit r3: app-code paths — để ARM-GUARD (guard.test.sh) chạy đúng PR land Phase-0. Thiếu các dòng này
      # thì PR chỉ chạm packages/services/apps KHÔNG trigger self-test ⇒ arm-check vô dụng đúng lúc cần nhất.
      - 'packages/**'
      - 'services/**'
      - 'apps/**'
      - 'package.json'
      - 'Makefile'
  pull_request:
    paths:
      - '.claude/**'
      - 'tests/harness/**'
      - 'docs/agent-harness.md'
      - 'docs/acceptance.md'
      - '.github/workflows/harness.yml'
      - 'packages/**'
      - 'services/**'
      - 'apps/**'
      - 'package.json'
      - 'Makefile'

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: guard.test.sh (chặn rm-rf/secret/contract/test-weaken/loop/special-casing…)
        run: bash tests/harness/guard.test.sh
      - name: osm-mutation.test.sh (toy self-check — bash-only, không cần node)
        run: bash tests/harness/osm-mutation.test.sh

  # Phase-0 trở đi: có node ⇒ pnpm verify + real-mutation-arm (mutate source thật → test phải đỏ).
  # Đây là nơi DUY NHẤT chứng minh test OSM/money không vacuous so với source production trong CI.
  app-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm verify (lint + typecheck + test + format:check)
        run: pnpm verify
      - name: osm-mutation real-arm (có node_modules ⇒ mutant trên source thật phải bị KILL)
        run: bash tests/harness/osm-mutation.test.sh

  # Native services (Go core-api, Rust asset-worker) live outside the JS workspace.
  # ARM-GUARD (guard.test.sh) only proves the Makefile *has* verify-go/verify-rs;
  # this job makes them actually RUN in CI so an armed gate can't sit vacuous —
  # same reason app-gates runs pnpm verify. First-party actions + pinned installs
  # only. Triggers on the services/** · Makefile paths already listed above.
  services-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: services/core-api/go.sum
      - name: install golangci-lint v2 (ADR-020)
        run: |
          # Pin the install SCRIPT to the release tag (not HEAD) so a mutated
          # upstream installer can't run via curl|sh before the version arg matters.
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          # make verify-go calls golangci-lint by bare name — put GOPATH/bin on PATH
          # explicitly so the lint step can't silently no-op as command-not-found.
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: install sqlc v1.30.0 (ADR-020/028 — verify-go runs sqlc vet + sqlc diff)
        run: |
          # Pinned release binary -> GOPATH/bin (already on PATH from the step above).
          curl -sSfL https://github.com/sqlc-dev/sqlc/releases/download/v1.30.0/sqlc_1.30.0_linux_amd64.tar.gz \
            | tar -xz -C "$(go env GOPATH)/bin" sqlc
      - name: rust components (toolchain preinstalled on runner)
        run: rustup component add clippy rustfmt
      - name: cache cargo registry + asset-worker target (keyed on Cargo.lock)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/asset-worker/target
          key: cargo-${{ runner.os }}-${{ hashFiles('services/asset-worker/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - name: make verify-go (gofmt + vet + golangci-lint + go test)
        run: make verify-go
      - name: make verify-rs (cargo fmt + clippy -D warnings + cargo test)
        run: make verify-rs
