# Harness self-test lane (agent-harness.md §"Harness self-test (CI)" / ADR-023).
# Mọi hook self-no-op tới Phase 0 ⇒ "gate no-op" trông y hệt "gate pass"; self-test là cái phân biệt.
# `selftest` job chạy được pre-Phase-0 (không phụ thuộc toolchain app) — chỉ bash.
# `app-gates` job (Phase-0 trở đi) cài node + pnpm để chạy `pnpm verify` VÀ real-mutation-arm:
#   nếu vắng node_modules, osm-mutation.test.sh skip nhánh REAL ⇒ trên lane bash-only nó chỉ chạy
#   toy-check, "xanh" mà KHÔNG phủ source thật. app-gates đóng đúng lỗ hổng đó (audit r-PR4 A3/A4).
name: harness-selftest

on:
  push:
    # PR branches already get this exact job matrix from the `pull_request` trigger below
    # (same paths) — without this filter every commit on a PR branch ran the whole matrix
    # TWICE (once for `push`, once for `pull_request`), doubling runner-minutes for zero
    # benefit. `main` still needs its own `push` trigger: deploy.yml fires off THIS
    # workflow via `workflow_run` gated on `branches: [main]`, so a merge to main has to
    # produce its own harness-selftest run for that to have anything to react to.
    branches: [main]
    paths:
      - '.claude/**'
      - 'tests/harness/**'
      - 'docs/agent-harness.md'
      - 'docs/acceptance.md'
      - '.github/workflows/harness.yml'
      # audit r3: app-code paths — để ARM-GUARD (guard.test.sh) chạy đúng PR land Phase-0. Thiếu các dòng này
      # thì PR chỉ chạm packages/services/apps KHÔNG trigger self-test ⇒ arm-check vô dụng đúng lúc cần nhất.
      - 'packages/**'
      - 'services/**'
      - 'apps/**'
      - 'package.json'
      - 'Makefile'
      # review 2026-07-18: lockfile/toolchain-config đổi hành vi build/lint mà không chạm src —
      # thiếu các dòng này thì PR bump lockfile skip toàn bộ gate.
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'eslint.config.mjs'
      - 'tsconfig.base.json'
      # deploy.yml giờ trigger bằng workflow_run sau harness → harness PHẢI chạy khi infra đổi,
      # kẻo push chỉ-chạm-infra không bao giờ deploy.
      - 'infra/k8s/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    paths:
      - '.claude/**'
      - 'tests/harness/**'
      - 'docs/agent-harness.md'
      - 'docs/acceptance.md'
      - '.github/workflows/harness.yml'
      - 'packages/**'
      - 'services/**'
      - 'apps/**'
      - 'package.json'
      - 'Makefile'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'eslint.config.mjs'
      - 'tsconfig.base.json'
      - 'infra/k8s/**'
      - '.github/workflows/deploy.yml'

jobs:
  # Cheap up-front git-diff check so services-gates (the slowest job — Go+Rust
  # toolchain install + golangci-lint + sqlc + clippy + cargo test, ~4-5min) can
  # skip itself on a diff that never touches services/ code — e.g. a pure
  # TS/React PR. Deliberately conservative: the allowlist only covers what
  # `make verify-go`/`make verify-rs` actually depend on, and any failure to
  # compute the diff (new branch, missing before-SHA, unrecognised event) falls
  # back to services=true — a silently-skipped gate is exactly the failure
  # mode this harness is built to catch (ADR-023/024 "gate no-op trông y hệt
  # gate pass"), so uncertainty always runs the gate, never skips it.
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            pull_request)
              RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
              ;;
            push)
              BEFORE="${{ github.event.before }}"
              if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
                echo "services=true" >> "$GITHUB_OUTPUT"
                echo "no usable 'before' SHA (new branch/force-push) — running services-gates to be safe"
                exit 0
              fi
              RANGE="$BEFORE..${{ github.sha }}"
              ;;
            *)
              echo "services=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          CHANGED="$(git diff --name-only "$RANGE")"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(services/|Makefile$|\.github/workflows/harness\.yml$)'; then
            echo "services=true" >> "$GITHUB_OUTPUT"
          else
            echo "services=false" >> "$GITHUB_OUTPUT"
          fi

  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: guard.test.sh (chặn rm-rf/secret/contract/test-weaken/loop/special-casing…)
        run: bash tests/harness/guard.test.sh
      - name: osm-mutation.test.sh (toy self-check — bash-only, không cần node)
        run: bash tests/harness/osm-mutation.test.sh

  # Phase-0 trở đi: có node ⇒ pnpm verify + real-mutation-arm (mutate source thật → test phải đỏ).
  # Đây là nơi DUY NHẤT chứng minh test OSM/money không vacuous so với source production trong CI.
  app-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Turborepo's own incremental cache (ADR-001 "Turborepo cache + build
      # affected-only") — persisted across CI runs so `turbo run typecheck`/
      # `turbo run test` (inside `pnpm verify`) can skip packages whose inputs
      # match a prior run instead of always executing cold. Turbo hashes task
      # inputs itself, so a stale/foreign cache entry just means more misses,
      # never a wrong result — safe to restore optimistically via prefix match.
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - name: pnpm verify (lint + typecheck + test + format:check)
        run: pnpm verify
      - name: osm-mutation real-arm (có node_modules ⇒ mutant trên source thật phải bị KILL)
        run: bash tests/harness/osm-mutation.test.sh

  # Native services (Go core-api, Rust asset-worker) live outside the JS workspace.
  # ARM-GUARD (guard.test.sh) only proves the Makefile *has* verify-go/verify-rs;
  # this job makes them actually RUN in CI so an armed gate can't sit vacuous —
  # same reason app-gates runs pnpm verify. First-party actions + pinned installs
  # only. Triggers on the services/** · Makefile paths already listed above.
  # Skipped entirely when `changes` finds no services/-relevant diff (see that
  # job's comment for the safety reasoning).
  services-gates:
    needs: changes
    if: needs.changes.outputs.services == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: |
            services/core-api/go.sum
            services/wedding-api/go.sum
      - name: install golangci-lint v2 (ADR-020)
        run: |
          # Pin the install SCRIPT to the release tag (not HEAD) so a mutated
          # upstream installer can't run via curl|sh before the version arg matters.
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          # make verify-go calls golangci-lint by bare name — put GOPATH/bin on PATH
          # explicitly so the lint step can't silently no-op as command-not-found.
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: install sqlc v1.30.0 (ADR-020/028 — verify-go runs sqlc vet + sqlc diff)
        run: |
          # Pinned release binary -> GOPATH/bin (already on PATH from the step above).
          curl -sSfL https://github.com/sqlc-dev/sqlc/releases/download/v1.30.0/sqlc_1.30.0_linux_amd64.tar.gz \
            | tar -xz -C "$(go env GOPATH)/bin" sqlc
      - name: rust components (toolchain preinstalled on runner)
        run: rustup component add clippy rustfmt
      - name: cache cargo registry + asset-worker target (keyed on Cargo.lock)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/asset-worker/target
          key: cargo-${{ runner.os }}-${{ hashFiles('services/asset-worker/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - name: make verify-go (gofmt + vet + golangci-lint + go test)
        run: make verify-go
      - name: make verify-rs (cargo fmt + clippy -D warnings + cargo test)
        run: make verify-rs
