# Deploy — a self-hosted runner ON the WSL2 box builds the app images, imports them into the k3d
# cluster `luminstudio` (no registry — `k3d image import`), and rolls the Deployments in namespace
# `prod`. Images are tagged by commit SHA so a `kubectl apply` actually triggers a rollout and an old
# SHA can be re-deployed to roll back. Manifests + runbook live in infra/k8s/.
#
# ⚠ SECURITY GUARDRAIL (D4): the runner executes on the prod box, so this triggers ONLY after CI on
# main and manual dispatch. It MUST NOT gain a `pull_request` trigger — a fork PR would then run
# attacker-controlled code on the box (RCE). The `branches: [main]` filter on workflow_run keeps that
# guarantee: only harness runs whose head branch IS main can trigger a deploy.
name: deploy

on:
  # Deploy only AFTER harness-selftest finishes on main — a straight `push` trigger raced CI and
  # could ship an untested SHA. harness.yml's paths cover everything deploy cares about (incl.
  # infra/k8s), so docs-only pushes still skip the deploy.
  workflow_run:
    workflows: [harness-selftest]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# One deploy at a time; let a running deploy finish rather than cancel mid-rollout.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

# Scripts use bash-isms (${SHA::12} substring, functions) — pin bash, not the runner's default sh.
defaults:
  run:
    shell: bash

env:
  # Box-specific (single all-home node). The runner user owns this kubeconfig + docker + k3d.
  KUBECONFIG: /home/duchuong/.config/k3d/kubeconfig-luminstudio.yaml
  CLUSTER: luminstudio
  NS: prod
  SITE_URL: https://www.luminstudio.vn
  # workflow_run: github.sha is the default-branch head at EVENT time (can race a newer push) —
  # deploy exactly the SHA CI just validated. Dispatch: current head.
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  # `harness-selftest` runs can take very different amounts of time depending on what a commit
  # touches (e.g. services-gates only runs when services/ changed — see harness.yml's `changes`
  # job), so its `workflow_run` completions don't arrive in commit order. Two pushes close
  # together can have the OLDER commit's CI finish LAST and trigger a deploy AFTER the newer
  # commit's deploy already landed — silently overwriting it with older code (this actually
  # happened: 2026-07-21, PR #200's fix got clobbered by PR #201's slower, earlier-queued run).
  # `cancel-in-progress: false` on the deploy-prod concurrency group only serialises execution,
  # it doesn't fix the ordering — this check does: bail out before doing any work unless the SHA
  # this run was asked to deploy is STILL main's actual tip. A GitHub-hosted runner (not the
  # self-hosted prod box) so a superseded run costs a few seconds, not a slot on the box.
  check-latest:
    runs-on: ubuntu-latest
    outputs:
      is_latest: ${{ steps.check.outputs.is_latest }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          LATEST="$(gh api "repos/${{ github.repository }}/git/refs/heads/main" --jq .object.sha)"
          echo "deploy_sha=${{ env.DEPLOY_SHA }} latest_main=$LATEST"
          if [ "$LATEST" = "${{ env.DEPLOY_SHA }}" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            echo "main has moved to $LATEST since this run's CI validated ${{ env.DEPLOY_SHA }} — skipping, the deploy for the newer commit covers it (or already has)."
          fi

  deploy:
    needs: check-latest
    # Gate: only deploy when the triggering CI run succeeded (manual dispatch bypasses by intent)
    # AND this SHA is still main's tip (see check-latest above).
    if: |
      needs.check-latest.outputs.is_latest == 'true' &&
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: self-hosted
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      # core-api / migrate / admin build without a live backend. (Go + baked-migrations images use the
      # default bridge network; admin is a Next build so it needs --network=host for next/font's Google
      # Fonts fetch — the docker bridge can't reach it, the host can.)
      - name: Build core-api / migrate / admin (+ import, SHA-tagged)
        run: |
          set -euo pipefail
          TAG=${DEPLOY_SHA::12}
          docker build -f services/core-api/Dockerfile -t "lumin-core-api:$TAG" services/core-api
          docker build -f infra/k8s/migrate.Dockerfile -t "lumin-migrate:$TAG"  services/core-api/db/migrations
          docker build --network=host -f apps/admin/Dockerfile -t "lumin-admin:$TAG" .
          k3d image import "lumin-core-api:$TAG" "lumin-migrate:$TAG" "lumin-admin:$TAG" -c "$CLUSTER"

      # Bring the data tier + schema + core-api to this SHA first — the storefront build (next step)
      # ISR-prerenders the home against a LIVE core-api (ADR-009), so core-api must be up before it.
      - name: Apply infra + migrate + roll core-api
        run: |
          set -euo pipefail
          TAG=${DEPLOY_SHA::12}
          img() { sed -E "s|(image: lumin-[a-z-]+):prod|\1:$TAG|g" "$1"; }
          kubectl apply -f infra/k8s/postgres.yaml -f infra/k8s/nats.yaml
          kubectl -n "$NS" rollout status deploy/postgres --timeout=180s
          kubectl -n "$NS" rollout status deploy/nats --timeout=120s
          # imgproxy (ADR-055) — ảnh đã resize/WebP. Ảnh thứ ba (không build ở đây), không
          # phụ thuộc SHA, nên apply thẳng. KHÔNG chờ rollout: thiếu `imgproxy-secrets` thì
          # pod CrashLoop vì vắng IMGPROXY_KEY, mà đó là trạng thái hợp lệ trước khi bootstrap
          # — wedding-web fail-open trả ảnh gốc. Chặn ở đây là biến một service phụ chưa dựng
          # thành deploy đỏ cho cả hệ.
          kubectl apply -f infra/k8s/imgproxy.yaml
          # Migrations: one-shot, idempotent (golang-migrate `up` no-ops when current, ADR-028). A Job's
          # pod template is immutable → delete + recreate.
          kubectl -n "$NS" delete job migrate --ignore-not-found
          img infra/k8s/migrate-job.yaml | kubectl apply -f -
          kubectl -n "$NS" wait --for=condition=complete job/migrate --timeout=180s
          img infra/k8s/core-api.yaml | kubectl apply -f -
          kubectl -n "$NS" rollout status deploy/core-api --timeout=180s

      # storefront needs the now-live core-api at build time → port-forward it (mirrors the compose
      # build.network:host + localhost core-api trick).
      - name: Build storefront against live core-api + roll storefront/admin + ingress
        run: |
          set -euo pipefail
          TAG=${DEPLOY_SHA::12}
          img() { sed -E "s|(image: lumin-[a-z-]+):prod|\1:$TAG|g" "$1"; }
          kubectl -n "$NS" port-forward svc/core-api 8080:8080 >/tmp/pf-coreapi.log 2>&1 &
          PF=$!
          for i in $(seq 1 20); do curl -sf http://localhost:8080/healthz >/dev/null 2>&1 && break; sleep 1; done
          # The loop above breaks on success but falls through on exhaustion — without this check a
          # dead core-api would let the ISR prerender bake error pages into the prod image.
          curl -sf http://localhost:8080/healthz >/dev/null || { echo "core-api healthz never came up"; exit 1; }
          docker build --network=host \
            --build-arg SITE_URL="$SITE_URL" --build-arg CORE_API_URL=http://localhost:8080 \
            -f apps/storefront/Dockerfile -t "lumin-storefront:$TAG" .
          kill "$PF" 2>/dev/null || true
          k3d image import "lumin-storefront:$TAG" -c "$CLUSTER"
          img infra/k8s/storefront.yaml | kubectl apply -f -
          img infra/k8s/admin.yaml | kubectl apply -f -
          kubectl apply -f infra/k8s/ingress.yaml
          kubectl -n "$NS" rollout status deploy/storefront --timeout=180s
          kubectl -n "$NS" rollout status deploy/admin --timeout=180s

      # Wedding site (HANDOFF §6): builds have NO live-API dependency (every page
      # is force-dynamic), so this is a plain build→import→migrate→roll block.
      # Gated on the wedding-secrets Secret existing — until the one-time box
      # bootstrap (infra/k8s/README §wedding) creates it, the whole block no-ops
      # so a lumin-only deploy never stalls on the side project.
      - name: Build + roll wedding-api / wedding-web / wedding-migrate
        run: |
          set -euo pipefail
          if ! kubectl -n "$NS" get secret wedding-secrets >/dev/null 2>&1; then
            echo "wedding-secrets absent — skipping wedding deploy (see infra/k8s/README §wedding bootstrap)"
            exit 0
          fi
          TAG=${DEPLOY_SHA::12}
          img() { sed -E "s|(image: lumin-[a-z-]+):prod|\1:$TAG|g" "$1"; }
          docker build -f services/wedding-api/Dockerfile -t "lumin-wedding-api:$TAG" services/wedding-api
          docker build -f infra/k8s/migrate.Dockerfile -t "lumin-wedding-migrate:$TAG" services/wedding-api/db/migrations
          # --network=host for next/font's Google Fonts... not needed: wedding fonts are self-hosted
          # files in the repo, but the pnpm fetch still wants the host network on this box.
          docker build --network=host --build-arg WEDDING_API_URL=http://wedding-api:8081 \
            -f apps/wedding-web/Dockerfile -t "lumin-wedding-web:$TAG" .
          k3d image import "lumin-wedding-api:$TAG" "lumin-wedding-migrate:$TAG" "lumin-wedding-web:$TAG" -c "$CLUSTER"
          kubectl -n "$NS" delete job wedding-migrate --ignore-not-found
          img infra/k8s/wedding.yaml | kubectl apply -f -
          kubectl -n "$NS" wait --for=condition=complete job/wedding-migrate --timeout=180s
          kubectl -n "$NS" rollout status deploy/wedding-api --timeout=180s
          kubectl -n "$NS" rollout status deploy/wedding-web --timeout=180s

      # Rollout status only proves pods are Ready in-cluster; this proves the apps answer from the
      # public edge (ingress + tunnel + TLS) — the thing users actually hit.
      #
      # RETRIES, because a single-shot curl here is a false-red generator: `rollout status` returns
      # the moment the new pod is Ready, while the ingress controller and the tunnel are still
      # re-pointing at it and the old pod is still terminating. A deploy where every build/rollout
      # step succeeded has failed this step on a blip more than once (run 29844417194) — and a gate
      # that cries wolf is worse than no gate, because the next real edge outage reads as "probably
      # transient again". Retrying keeps the assertion exactly as strict (the URL must answer 2xx/3xx
      # before we call the deploy good) while giving the edge a bounded window to catch up.
      #
      # Deliberately NOT fail-fast: every URL is probed even after one fails, so a red run shows the
      # full picture (one app down vs the whole edge down) instead of stopping at the first.
      - name: Smoke check (public ingress)
        run: |
          set -uo pipefail
          probe() {
            local url="$1" code deadline=$((SECONDS + 90))
            while :; do
              # curl prints its own "000" and exits non-zero when it can't connect at all —
              # `|| true` keeps that value instead of appending a second 000 to it.
              code=$(curl -s -o /dev/null -m 15 -w '%{http_code}' "$url" 2>/dev/null) || true
              code=${code:-000}
              case "$code" in
                2??|3??) echo "ok    $code  $url"; return 0 ;;
              esac
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "FAIL  $code  $url  (never answered within 90s)"
                return 1
              fi
              echo "wait  $code  $url  — retrying in 5s"
              sleep 5
            done
          }
          rc=0
          probe https://api.luminstudio.vn/healthz || rc=1
          probe https://www.luminstudio.vn/ || rc=1
          probe https://admin.luminstudio.vn/ || rc=1
          if kubectl -n "$NS" get secret wedding-secrets >/dev/null 2>&1; then
            # Subdomain changes as couples come and go (was giangvahieu, is
            # gianghieuwedding-bh) — read the live one from events instead of
            # hardcoding, so this stops going stale on every couple swap.
            WEDDING_DB_URL=$(kubectl -n "$NS" get secret wedding-secrets -o jsonpath='{.data.DATABASE_URL}' | base64 -d)
            WEDDING_HOST=$(kubectl -n "$NS" exec deploy/postgres -- psql "$WEDDING_DB_URL" -tAc \
              "select subdomain from events where subdomain is not null order by created_at desc limit 1" \
              | tr -d '[:space:]')
            if [ -n "$WEDDING_HOST" ]; then
              probe "https://$WEDDING_HOST/" || rc=1
            else
              echo "no event with a subdomain yet — skipping wedding site probe"
            fi
          fi
          exit $rc

      - name: Deployed state
        if: always()
        run: kubectl -n "$NS" get deploy,pods -o wide 2>&1 | head -30

      # Every deploy builds fresh SHA-tagged images (line 3 comment) and none of them are ever removed
      # — on this box that's the WSL2 vhdx, i.e. Windows C:. Keep the last 5 tags per repo (rollback
      # margin) and drop the rest, then clear dangling layers/build cache. Runs even on a failed deploy
      # so a broken run doesn't also skip cleanup.
      - name: Prune old image tags + build cache
        if: always()
        run: |
          set -euo pipefail
          for repo in lumin-core-api lumin-migrate lumin-admin lumin-storefront \
                      lumin-wedding-api lumin-wedding-migrate lumin-wedding-web; do
            docker images "$repo" --format '{{.Tag}}' \
              | grep -v '^prod$' \
              | tail -n +6 \
              | xargs -r -I{} docker rmi -f "$repo:{}"
          done
          docker image prune -f
          docker builder prune -f --filter until=168h
