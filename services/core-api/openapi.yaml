# Lumin Studio — core-api wire contract (single hand-authored source of truth, ADR-031).
#
# This file is THE contract: oapi-codegen (Go, strict-server) + openapi-typescript/openapi-fetch
# (TS, packages/api-client) are both generated FROM it (wiring lands in PR-3c-2). Hand-edit here;
# never hand-edit generated code. The enum sets below are kept byte-identical to four other sources
# — internal/order constants, packages/core Zod, and the Postgres native enums — by the 4-way parity
# test (internal/contract/parity_test.go); change an enum here and that test (in `make verify-go`)
# fails until all four agree.
#
# Scope = slice-3 surfaces + Phase-1 storefront catalog reads (ADR-003/031) + the public guest order
# lookup (P1-n: GET /orders/lookup — code + phone → a minimal, non-leaking timeline). Phase-1 opens the
# public catalog GETs (P1-a: GET /products/{slug} detail — product + colors + options) and Phase-2
# checkout seams (config, quote shipping, receipt upload). Money crosses the wire as int VND
# (`integer, format: int64`) — the single display formatter stays in packages/core (no Go formatVnd;
# ADR-031/§6 D6). Property names are camelCase (matches sqlc json_tags_case_style:camel + hand DTOs).
openapi: 3.0.3

info:
  title: Lumin Studio Core API
  version: 0.7.0
  description: >
    Made-to-order 3D-print lighting/decor shop. One order state machine behind four surfaces
    (storefront · admin · admin-mobile · extension). This contract covers the slice-3 HTTP surface:
    self-issued auth, order intake + transitions, the admin dashboard aggregate, and the owner-only
    settings/STK + reply-template reads. The SERVER is authoritative for money and state — clients
    never send `total`/`subtotal`/`unitPrice` and never self-transition. Phase-1 layers on the public
    storefront catalog reads (product detail, active-only).

servers:
  - url: /
    description: core-api is mounted at the root (behind the Cloudflare Tunnel edge).

tags:
  - name: auth
    description: Self-issued email+password login → JWT in an httpOnly cookie (ADR-030).
  - name: orders
    description: >
      Order intake (web public · inbox staff-gated), RBAC-gated transitions, and the public guest
      order lookup (no auth — gated by a constant-time code+phone match + a per-code rate-limit/lockout).
  - name: admin
    description: Admin-gated reads + owner-only money-out config (RBAC, ADR-010/012).
  - name: catalog
    description: Public storefront catalog reads (product detail; active-only). No auth (Phase-1).
  - name: uploads
    description: >
      Public presigned-POST bootstraps that sign a browser→Garage upload contract (the body never
      transits core-api). Persist nothing money-bearing; rate-limited, not auth-gated.

paths:
  /auth/login:
    post:
      tags: [auth]
      operationId: loginUser
      summary: Email + password login; sets the session cookie on success.
      description: >
        Verifies the credential (bcrypt, constant-time) and, on success, mints a signed JWT set as an
        httpOnly+Secure+SameSite cookie. A uniform error is returned for both unknown email and bad
        password (no user enumeration). The cookie carries the token; the body carries it too ONLY when
        `issueToken` is set (the MV3 extension — cross-origin, no cookie; ADR-043).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated. The session cookie is set via Set-Cookie.
          headers:
            Set-Cookie:
              description: Signed JWT in an httpOnly + Secure + SameSite=Strict session cookie (also returned in the body only when issueToken is set — ADR-043).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [auth]
      operationId: logoutUser
      summary: Clear the session cookie.
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Session cookie cleared.
          headers:
            Set-Cookie:
              description: Expires the session cookie immediately (logout).
              schema:
                type: string
        '401': { $ref: '#/components/responses/Unauthorized' }

  /customer/register:
    post:
      tags: [customer]
      operationId: registerCustomer
      summary: Register a storefront customer account; sets the customer session cookie on success.
      description: >
        Creates a customer account (name + phone + email + password) in the SEPARATE storefront realm
        (ADR-030) and logs it in immediately by setting a signed JWT in an httpOnly+Secure+SameSite
        customer cookie (distinct secret + name from the admin session — the token is not in the body).
        A login email already registered returns 409 (the only field the client may safely surface).
        Totals/orders are unrelated; guest orders placed before registering are NOT auto-linked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRegisterInput'
      responses:
        '201':
          description: Account created and logged in. The customer session cookie is set via Set-Cookie.
          headers:
            Set-Cookie:
              description: Signed JWT in an httpOnly + Secure + SameSite=Strict customer session cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAccount'
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /customer/login:
    post:
      tags: [customer]
      operationId: loginCustomer
      summary: Email + password login for a storefront customer; sets the customer session cookie.
      description: >
        Verifies the credential (bcrypt, constant-time) against the customer realm and, on success,
        mints a signed JWT set as the httpOnly+Secure customer cookie. A uniform error is returned for
        both unknown email and bad password (no enumeration). The cookie — not the body — carries the token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated. The customer session cookie is set via Set-Cookie.
          headers:
            Set-Cookie:
              description: Signed JWT in an httpOnly + Secure + SameSite=Strict customer session cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAccount'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /customer/logout:
    post:
      tags: [customer]
      operationId: logoutCustomer
      summary: Clear the customer session cookie.
      responses:
        '204':
          description: Customer session cookie cleared.
          headers:
            Set-Cookie:
              description: Expires the customer session cookie immediately (logout).
              schema:
                type: string

  /customer/orders:
    get:
      tags: [customer]
      operationId: getCustomerOrders
      summary: The authenticated customer's own order history (timeline projection).
      description: >
        Returns the signed-in customer's orders, newest-first, as the SAME public timeline projection
        the guest lookup returns (code + status + milestones + tracking; never internal money/PII/address
        fields). Scoped strictly by the verified session's customer id. Requires a valid customer session
        (401 otherwise) — the admin cookie does not grant it (separate realm, ADR-030).
      security:
        - customerAuth: []
      responses:
        '200':
          description: The customer's orders, newest-first (possibly empty).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerOrderList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /pet-tags/{shortId}:
    get:
      tags: [pettag]
      operationId: getPetPage
      summary: Public pet-page read by shortId — the /t/{shortId} scan target (spec §10).
      description: >
        Resolves a Pet Tag by its shortId (the URL routing key burned to the chip) for the public
        /t/{shortId} pet page (P3-t t-3/t-4a). Public — anyone who scans the chip — but resolves the
        customer session OPTIONALLY when present, so the owner is recognised. Returns the tag's lifecycle
        status and, once ACTIVATED, the profile the 3-state page renders (spec §10 §"1 URL · 3 trạng thái"):
        the display fields + medical/socials + a CONTACT block whose phone is masked (PDPL
        data-minimization) and revealed in full only when lostMode=true or the viewer is the owner. The
        onboarding gate reads status to route (ENCODED → login/onboarding, ACTIVATED → the page). Owner-only
        content (bio/gallery/favorites/theme/blocks + the in-place editor) lands in t-4c. Unknown shortId → 404.
      parameters:
        - name: shortId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The tag status, viewerIsOwner, and (when ACTIVATED) the pet-page profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetPage'
        '404': { $ref: '#/components/responses/NotFound' }

  /pet-tags/{shortId}/activate:
    post:
      tags: [pettag]
      operationId: activatePetTag
      summary: Activate an ENCODED tag — attach it to the signed-in customer + create the pet profile.
      description: >
        Onboarding completion (spec §10 step 2d, P3-t t-3): the scanned ENCODED tag auto-attaches to the
        authenticated customer (owner_account_id), a PetProfile is created from the 2-step onboarding form,
        and the tag flips to ACTIVATED — all in one tx. PDPL consent point 1 is recorded here (a
        pet_profile consent grant, ADR-042) — the request MUST carry consent=true. The vanity handle is
        derived from the pet name (accent-folded) and auto-suffixed on collision (the route key is shortId,
        so the handle is cosmetic). Requires a valid customer session (401). An already-ACTIVATED or
        not-yet-ENCODED tag → 409; an unknown shortId → 404; a bad field (name/phone/consent) → 400.
      security:
        - customerAuth: []
      parameters:
        - name: shortId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetActivateInput'
      responses:
        '200':
          description: The now-ACTIVATED pet page (status + profile summary).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetPage'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /pet-tags/{shortId}/lost-mode:
    patch:
      tags: [pettag]
      operationId: toggleLostMode
      summary: Toggle a pet's lost mode — owner only (spec §10 công tắc thất lạc).
      description: >
        Flips the profile's lostMode flag (P3-t t-4a). Only the tag's owner may toggle it — the update is
        guarded by owner_account_id in SQL, so a signed-in non-owner is a 403 (not a silent no-op). lostMode
        drives the public page's view-state (spec §10: false = at-home read-only, true = rescue) and the
        contact reveal (a masked phone becomes callable in lost mode). Requires a valid customer session
        (401). Unknown shortId → 404; a tag the caller does not own → 403. Returns the updated pet page.
      security:
        - customerAuth: []
      parameters:
        - name: shortId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetLostModeInput'
      responses:
        '200':
          description: The updated pet page (lostMode now reflects the requested value).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetPage'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /pet-tags/{shortId}/share-location:
    post:
      tags: [pettag]
      operationId: sharePetLocation
      summary: Finder shares their location once for a lost pet (spec §10 rescue 4a→4b).
      description: >
        The rescue send-once (spec §10 "Cứu hộ → gửi vị trí", P3-t t-4b). PUBLIC + unauthenticated — the
        finder is a stranger who scanned a lost pet, not an account. Records ONE lost_events row carrying the
        finder's {lat,lng}; that row IS the PDPL consent artifact (consent point 2) — it exists only because
        the finder saw the stated purpose, tapped "send", and granted the browser geolocation permission, so
        {scope=location_share, channel=web, timestamp=scanned_at} is captured (compliance.md §2). The owner is
        notified in-app (the scan surfaces on the owner's own page as recentScans); email push is a later
        slice (it needs a NATS stream + a notification worker). Guarded: the pet MUST be in lost mode (409
        PET_NOT_LOST otherwise — an at-home pet's location is never pinged), coords MUST be in range (400),
        the shortId MUST resolve (404). Rate-limited (429) — a public write.
      parameters:
        - name: shortId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetShareLocationInput'
      responses:
        '200':
          description: The location was recorded (a lost_events row was created).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetShareLocationResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /pet-tags/{shortId}/profile:
    patch:
      tags: [pettag]
      operationId: updatePetProfile
      summary: Owner edits the pet page content in place (spec §10 sửa-tại-chỗ, P3-t t-4c).
      description: >
        The WYSIWYG in-place editor's save (P3-t t-4c-1): the owner replaces the page's editable content —
        the display fields (name/species/breed/age/weight/photo), the new content blocks (bio, gallery,
        favorites), medical, socials, and the owner contact — in one PATCH. Owner-only: the update is guarded
        by owner_account_id in SQL, so a signed-in non-owner is a 403 (not a silent no-op), exactly like the
        lost-mode toggle. This does NOT touch theme or block order (the theme sheet + reorder mode land in
        t-4c-2), lostMode (its own endpoint), the handle (derived, cosmetic), or consent (granted once at
        onboarding). petName/species/ownerContact.phone follow the same validation as onboarding. Requires a
        valid customer session (401). Unknown shortId → 404; a tag the caller does not own → 403; a bad field
        → 400. Returns the updated pet page.
      security:
        - customerAuth: []
      parameters:
        - name: shortId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetProfileUpdateInput'
      responses:
        '200':
          description: The updated pet page (the profile now reflects the edited content).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetPage'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /pet-tags/{shortId}/appearance:
    patch:
      tags: [pettag]
      operationId: updatePetAppearance
      summary: Owner changes the pet page theme + block order (spec §10 giao diện + sắp xếp, P3-t t-4c-2).
      description: >
        The theme sheet (🎨) + reorder mode (⠿) save (P3-t t-4c-2): the owner sets the page appearance —
        the colorway/background/opacity/name-font theme and the content-block order + visibility — in one
        PATCH. This is a full replace of BOTH theme and blocks (the client holds the loaded appearance and
        sends it back, like the content editor), kept separate from the content PATCH so a theme change
        never risks the page text and vice versa. Owner-only: guarded by owner_account_id in SQL, so a
        signed-in non-owner is a 403 (not a silent no-op), exactly like the content edit + lost-mode toggle.
        Safety is enforced on render, not here (the allergy warning, lost banner + emergency call are never
        themed; the photo_name block is always first + visible). Requires a valid customer session (401).
        Unknown shortId → 404; a tag the caller does not own → 403; a bad theme/block field → 400. Returns
        the updated pet page.
      security:
        - customerAuth: []
      parameters:
        - name: shortId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetAppearanceInput'
      responses:
        '200':
          description: The updated pet page (the profile now reflects the new theme + block order).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetPage'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /orders:
    post:
      tags: [orders]
      operationId: createOrder
      summary: Create an order (web → PENDING_CONFIRM, public; inbox → PAID, staff/owner only).
      description: >
        Runs behind optional-auth: `channel=web` is public and creates a PENDING_CONFIRM order from a
        validated `paymentProofUrl`; `channel=inbox` mints a born-PAID order with no payment record and
        therefore REQUIRES a resolved staff/owner actor (rejected 403 otherwise — conventions §17,
        ADR-012). Totals are computed server-side; any client `total`/`subtotal`/`unitPrice` is rejected.
      security:
        - {}
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderInput'
      responses:
        '201':
          description: Order created — the order plus its phone-less tracking token (P2-i).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /orders/{id}/transitions:
    post:
      tags: [orders]
      operationId: transitionOrder
      summary: Advance an order's status (RBAC-gated; reconcile→PAID and →REFUNDED are owner-only).
      description: >
        Applies one OrderStatus transition through the domain guard. The reconcile edge
        PENDING_CONFIRM→PAID is dispatched to ConfirmPaymentTx (the only `order.paid` emitter); every
        other edge goes through AdvanceStatusTx. `reason` is required for CANCELLED/REFUNDED;
        `refundProofUrl` for REFUNDED; `trackingCode` + `qcPhotoUrl` for →SHIPPING. Actor/role/timestamp
        come from the auth context + server clock, never the body.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionRequest'
      responses:
        '200':
          description: Transition applied; the updated order is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /orders/lookup:
    get:
      tags: [orders]
      operationId: lookupOrder
      summary: Public guest order lookup by code + phone — a minimal, non-leaking timeline.
      description: >
        Public order tracking for a guest who has no account (no auth). BOTH the order code AND the
        phone used on the order must match; an unknown code and a phone mismatch return the SAME 404
        NOT_FOUND (no order-existence enumeration). The phone is compared in constant time and a
        per-code token-bucket + lockout guards against brute-forcing the phone for a known code
        (conventions §Bảo mật; the Cloudflare WAF is the per-IP layer). Returns a deliberately minimal
        PublicOrderTimeline — NEVER the internal Order: no customer PII, address, line items, money,
        payment/refund proof, internal note, or the statusHistory actor/reason fields (ADR-032). The
        `phone` param carries NO schema pattern on purpose — a malformed phone must funnel to the same
        404, never a 400 (which would be an enumeration signal).
      parameters:
        - name: code
          in: query
          required: true
          description: The order code shown at checkout (e.g. "#LMN-1000").
          schema:
            type: string
        - name: phone
          in: query
          required: true
          description: >
            The phone number used on the order. No format constraint — a mismatch (or malformed value)
            returns the uniform 404, never a 400.
          schema:
            type: string
      responses:
        '200':
          description: The code + phone matched; the public order timeline is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicOrderTimeline'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /orders/track:
    get:
      tags: [orders]
      operationId: trackOrder
      summary: Public phone-less order tracking by code + HMAC capability token.
      description: >
        Phone-less order tracking (P2-i, D-P2-8) behind the confirmation-screen link
        `/o/{code}-{token}`. The token is an HMAC capability the server returned once from POST /orders
        (CreateOrderResult.trackingToken); it is verified in constant time and IS the authorization — no
        phone, no account. Returns the SAME minimal PublicOrderTimeline as GET /orders/lookup — NEVER the
        internal Order (no customer PII, address, line items, money, payment/refund proof, note, or the
        statusHistory actor/reason; ADR-032). An unknown code and a present-but-wrong token return the
        SAME 404 NOT_FOUND (no order-existence enumeration); an ABSENT `code`/`token` is a 400 VALIDATION
        (required param), fired before any DB read so it is uniform regardless of whether the code exists.
        A per-code token bucket (shared with lookup) throttles token-guessing (the Cloudflare WAF is the
        per-IP layer). The `token` param carries NO schema pattern on purpose — a present malformed token
        must funnel to the same 404, not a 400.
      parameters:
        - name: code
          in: query
          required: true
          description: The order code shown at checkout (e.g. "#LMN-1000").
          schema:
            type: string
        - name: token
          in: query
          required: true
          description: >
            The trackingToken returned from the order-create response. A present but mismatched (or
            malformed) value returns the uniform 404; an ABSENT token is a 400 (required param).
          schema:
            type: string
      responses:
        '200':
          description: The code + token matched; the public order timeline is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicOrderTimeline'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /products:
    get:
      tags: [catalog]
      operationId: getProducts
      summary: Public storefront catalog list (active-only) — paginated card projection.
      description: >
        Public catalog list (no auth). Returns ACTIVE products only as a lightweight card projection
        (no colors/options/description body → no N+1), paginated and sortable, optionally filtered by
        category slug. Draft/archived products are NEVER listed (no catalog-existence leak, matching the
        detail read). Money (basePrice) is raw int-VND; the client formats via @lumin/core (always-must
        #2). The response carries a weak ETag + a provisional Cache-Control (the storefront ISR/purge
        strategy is finalized with the frontend PR, P1-f); a matching If-None-Match returns 304. The `q`
        full-text parameter (P1-e, ADR-016) filters by an accent-insensitive search over the product
        name/description ("den" matches "đèn"); it is ANDed inside the active-only scope so it never surfaces
        a hidden product, and the sort/pagination are unchanged (no relevance ranking — small catalog).
      parameters:
        - name: category
          in: query
          required: false
          description: Filter by category slug (spec §02). An unknown slug yields an empty page, not a 404.
          schema:
            type: string
        - name: sort
          in: query
          required: false
          description: Sort order. Default `newest` (created_at desc, id desc tiebreak for stable paging).
          schema:
            type: string
            enum: [newest, price_asc, price_desc, rating]
            default: newest
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Items per page. Capped at 48 to bound the query on this public, unauthenticated endpoint.
          schema:
            type: integer
            minimum: 1
            maximum: 48
            default: 12
        - name: q
          in: query
          required: false
          description: >
            Full-text search term (accent-insensitive, ADR-016) over the product name/description. Filters
            within the active-only + category scope; an empty/whitespace value means "no search" (the full
            catalog). Bounded to 100 characters on this public endpoint (over-length → 400).
          schema:
            type: string
            maxLength: 100
        - name: If-None-Match
          in: header
          required: false
          description: Conditional GET — when it matches the current ETag the server returns 304 with no body.
          schema:
            type: string
      responses:
        '200':
          description: A page of active product cards.
          headers:
            ETag:
              description: Weak validator over the response body; echo it in If-None-Match to revalidate.
              schema:
                type: string
            Cache-Control:
              description: Public cache directive (provisional — the ISR/purge strategy is finalized in P1-f).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'
        '304':
          description: Not Modified — the client's If-None-Match matched the current ETag.
          headers:
            ETag:
              description: The current weak validator (unchanged).
              schema:
                type: string
            Cache-Control:
              description: Public cache directive (provisional — finalized in P1-f).
              schema:
                type: string
        '400': { $ref: '#/components/responses/BadRequest' }

  /products/{slug}:
    get:
      tags: [catalog]
      operationId: getProductBySlug
      summary: Public storefront product detail (active-only) — product + colors + options.
      description: >
        Public catalog read (no auth). Returns the ACTIVE product for the slug, bundled with its named
        print colors and customization options. A draft/archived product OR an unknown slug both return
        404 NOT_FOUND — the public surface must not distinguish a hidden product from a missing one (no
        catalog-existence leak). Money fields (basePrice, colors[].priceDelta, options[].priceDelta) are
        raw int-VND; the client formats via @lumin/core (always-must #2). No productType in Phase 1
        (D-P1-1; Pet Tag activation lands later with its own migration + parity update).
      parameters:
        - name: slug
          in: path
          required: true
          description: URL slug of the product (spec §02, unique).
          schema:
            type: string
      responses:
        '200':
          description: The active product with its colors and options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404': { $ref: '#/components/responses/NotFound' }

  /products/{slug}/reviews:
    get:
      tags: [catalog]
      operationId: getProductReviews
      summary: Public storefront product reviews (published-only) — paginated, newest first.
      description: >
        Public review list (no auth) for a product, newest first, paginated. Returns ONLY published
        reviews — the status='published' filter lives at the SQL source, so a moderated-away (hidden)
        review can NEVER leak (the same non-leak stance as the active-only product reads). An unknown
        slug OR a draft/archived product both return 404 NOT_FOUND, identical to the detail read (no
        catalog-existence probe). The reviewer's identity is deliberately NOT exposed (PDPL — reviews
        carry a nullable customer_id and guests may review; no public PII), so only the review content
        crosses the wire. The response carries a weak ETag + a provisional Cache-Control (the storefront
        ISR/purge strategy is finalized with the frontend PR, P1-f), consistent with the /products list;
        a matching If-None-Match returns 304 with no body. No sort param in Phase 1 (newest first only;
        an additive `sort` is a later PR if the reviews section design needs it).
      parameters:
        - name: slug
          in: path
          required: true
          description: URL slug of the product (spec §02, unique).
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Items per page. Capped at 48 to bound the query on this public, unauthenticated endpoint.
          schema:
            type: integer
            minimum: 1
            maximum: 48
            default: 12
        - name: If-None-Match
          in: header
          required: false
          description: Conditional GET — when it matches the current ETag the server returns 304 with no body.
          schema:
            type: string
      responses:
        '200':
          description: A page of published reviews for the product (newest first).
          headers:
            ETag:
              description: Weak validator over the response body; echo it in If-None-Match to revalidate.
              schema:
                type: string
            Cache-Control:
              description: Public cache directive (provisional — the ISR/purge strategy is finalized in P1-f).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewList'
        '304':
          description: Not Modified — the client's If-None-Match matched the current ETag.
          headers:
            ETag:
              description: The current weak validator (unchanged).
              schema:
                type: string
            Cache-Control:
              description: Public cache directive (provisional — finalized in P1-f).
              schema:
                type: string
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /categories:
    get:
      tags: [catalog]
      operationId: getCategories
      summary: Public storefront category list — the browsable taxonomy for the catalog-browse chips.
      description: >
        Public category list (no auth). Returns the BROWSABLE category taxonomy (spec §02) A→Z — only
        categories that contain at least one ACTIVE product. Categories inherit visibility transitively
        through their products, so a category whose only products are draft/archived is NOT listed (no
        dead-end chip, and no leak of an unreleased category name — the same non-leak stance as the product
        reads). It is a small, admin-curated set, so there is no filter or pagination. When no category is
        browsable the response is an empty array `[]`, NEVER a 404. The response carries a weak ETag + a
        provisional Cache-Control (the storefront ISR/purge strategy is finalized with the frontend PR,
        P1-f), consistent with the /products list; a matching If-None-Match returns 304 with no body.
      parameters:
        - name: If-None-Match
          in: header
          required: false
          description: Conditional GET — when it matches the current ETag the server returns 304 with no body.
          schema:
            type: string
      responses:
        '200':
          description: The full category taxonomy (may be empty).
          headers:
            ETag:
              description: Weak validator over the response body; echo it in If-None-Match to revalidate.
              schema:
                type: string
            Cache-Control:
              description: Public cache directive (provisional — the ISR/purge strategy is finalized in P1-f).
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '304':
          description: Not Modified — the client's If-None-Match matched the current ETag.
          headers:
            ETag:
              description: The current weak validator (unchanged).
              schema:
                type: string
            Cache-Control:
              description: Public cache directive (provisional — finalized in P1-f).
              schema:
                type: string

  /price/quote:
    post:
      tags: [catalog]
      operationId: quotePrice
      summary: Server-authoritative line/subtotal quote; optional province adds shippingFee + total.
      description: >
        Public storefront pricing (no auth). Re-derives each line's unitPrice from the catalog via the
        same authority gate as checkout — never trusts a client price (always-must #2). Returns per-line
        unitPrice + lineTotal and the subtotal. When the request carries a `province` (P2-b), the response
        also resolves `shippingFee` from settings.shipping_rules — the SAME pricing.ShippingFee the checkout
        charge path uses, so a quote's fee/total equal what POST /orders will charge for the same cart +
        province — and `total` (subtotal + shippingFee). An unshippable province is 422 NO_SHIPPING_RULE
        (never a silent ₫0). WITHOUT a province the response is line/subtotal only, byte-identical to the
        pre-P2-b shape. A non-active or unknown product is 422 PRODUCT_UNAVAILABLE (no catalog-existence
        leak, matching checkout). Engrave maxChars is enforced server-side by rune count. All money is raw
        int-VND; the client formats via @lumin/core. The request reuses OrderItemInput, which has no price
        field, so a client cannot declare a price (schema-level guarantee; unlike checkout this endpoint
        persists nothing and its response IS the authoritative price, so no loud money-key reject is needed).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceQuoteInput'
      responses:
        '200':
          description: The computed line prices and subtotal (plus shippingFee + total when a province was given).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceQuote'
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /checkout/config:
    get:
      tags: [checkout]
      operationId: getCheckoutConfig
      summary: Public checkout config — STK + server-built VietQR image URL + shippable provinces + refund policy.
      description: >
        Public storefront checkout config (no auth) — the anonymous data the payment step (C2) and the
        pre-purchase disclosure need, and NOTHING else: the VietQR STK the buyer transfers to, a
        server-built `img.vietqr.io` image URL derived from that STK (D-P2-1: no client input, no memo,
        no amount — the QR can't be swapped by a client param, conventions §Bảo mật/ADR-010), the list of
        provinces the shop ships to (the keys of settings.shipping_rules, the "*" wildcard excluded — it
        is a flat-fee fallback, not a selectable destination), and the refund/return policy text shown
        BEFORE purchase for every order (compliance §3, Luật BVNTD 19/2023). It is a deliberate whitelist:
        it NEVER leaks shopInfo contact PII, the shipping fee table, or any other settings field. When the
        shop has no bank account configured (bank_account unset / no bin+accountNumber), there is no way to
        take a web payment, so this returns 422 NO_STK_CONFIGURED — the SAME signal POST /orders gives on a
        web create — rather than a half-config with an unrenderable QR.
      responses:
        '200':
          description: The public checkout config (STK, VietQR image URL, shippable provinces, refund policy).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutConfig'
        '422': { $ref: '#/components/responses/Unprocessable' }

  /checkout/payment-proof-upload:
    post:
      tags: [checkout]
      operationId: createPaymentProofUpload
      summary: Create a presigned POST form for one payment-proof image upload.
      description: >
        Public checkout upload bootstrap (P2-c). Returns a browser-ready S3/Garage presigned POST form
        for exactly one receipt image, plus the host-pinned `finalUrl` the storefront will later send as
        `paymentProofUrl` to POST /orders. The server generates a random, non-PII object key and signs a
        POST policy with `content-length-range` (≤10MB by default) and exact `Content-Type`
        (`image/jpeg`, `image/png`, or `image/webp`). The policy TTL is short (≤5 minutes by default).
        The browser MUST upload directly to `uploadUrl` with every returned field and the file part; the
        core-api never proxies the image body through the Cloudflare tunnel. Retention is handled by the
        dedicated bucket lifecycle / GC runbook (ADR-035): receipt images are kept only long enough for
        dispute handling, then deleted about 90 days after the order reaches a terminal state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentProofUploadInput'
      responses:
        '200':
          description: Browser-ready POST target, form fields, and the host-pinned final object URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentProofUpload'
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /uploads/image:
    post:
      tags: [uploads]
      operationId: createImageUpload
      summary: Create a presigned POST form for one public image upload.
      description: >
        Public bootstrap for uploading ONE permanent, world-readable image — a pet-page photo (P3-t) or a
        product-gallery photo (P3-l). Mirrors POST /checkout/payment-proof-upload (random non-PII object
        key; a signed POST policy pinning `content-length-range` ≤10MB and an exact `Content-Type` of
        `image/jpeg`, `image/png`, or `image/webp`; short TTL; the browser uploads straight to Garage). The
        one difference: the object lands in the world-readable `lumin-assets` bucket with NO retention
        sweeper — these images are permanent, unlike payment receipts (P3-t t-6). The host-pinned `finalUrl`
        is what the caller stores as the photo/gallery URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageUploadInput'
      responses:
        '200':
          description: Browser-ready POST target, form fields, and the host-pinned final object URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageUpload'
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /admin/dashboard:
    get:
      tags: [admin]
      operationId: getDashboard
      summary: Admin dashboard aggregates (counts + net revenue + recent orders + todos).
      description: >
        Returns raw int-VND amounts, counts, and OrderStatus enums — no server-formatted money, no
        translated labels (label keys stay i18n, resolved client-side). Net revenue follows spec §04
        (PAID/PRINTING/SHIPPING/COMPLETED minus REFUNDED, scoped to the Asia/Ho_Chi_Minh day).
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Dashboard snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSnapshot'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/orders:
    get:
      tags: [admin]
      operationId: getAdminOrders
      summary: Admin orders list — paginated, optionally filtered by status (admin-gated).
      description: >
        Returns one page of orders as an admin SUMMARY projection (code, customer name, a first-item name
        + item count for the "sản phẩm" column, channel, status, total, created date), newest first,
        optionally filtered to a single OrderStatus (omit the param for all statuses, "Tất cả"). This is
        the INTERNAL admin projection: it carries customer PII (name), the channel and the money that the
        public PublicOrderTimeline whitelist deliberately omits (ADR-032) — so it is admin-gated (cookieAuth;
        owner AND staff read). Money (total) is raw int-VND, never formatted server-side (always-must #2);
        status/channel cross the wire as enums the client maps to i18n labels (always-must #3).
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter to a single order status (spec §04). Omit for all statuses ("Tất cả").
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Items per page. Capped at 50 to bound the query on this admin endpoint.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: A page of admin order summaries (newest first).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrderList'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/orders/{id}:
    get:
      tags: [admin]
      operationId: getAdminOrder
      summary: Admin order detail by id — the full internal order (admin-gated).
      description: >
        Returns one order as the full INTERNAL Order projection: customer PII (name, phone, social
        handle, email), the line items, shipping address, money (subtotal/shippingFee/total, raw
        int-VND), the payment/refund proof URLs, the internal note, the tracking code, and the complete
        statusHistory (actor + reason). This is the admin detail read behind the orders table (P3-d) —
        admin-gated (cookieAuth; owner AND staff read), NOT the public PublicOrderTimeline whitelist,
        which omits every one of those fields (ADR-032). Read-only; status changes go through
        POST /orders/{id}/transitions (RBAC-gated). An unknown id → 404 NOT_FOUND.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The full internal order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/orders/by-code/{code}:
    get:
      tags: [admin]
      operationId: getAdminOrderByCode
      summary: Admin order detail by human code — staff paste-to-lookup (admin-gated).
      description: >
        Resolves a human order code (e.g. "LMN-0042" or "#LMN-0042") to the full INTERNAL Order — the same
        projection as GET /admin/orders/{id} (customer PII, items, address, money, proof, tracking, note,
        full statusHistory). This is the staff paste-a-code lookup behind the browser extension (Phase 4
        e-3): staff have a code, not a uuid, so they cannot use the by-id read. Admin-gated (owner AND
        staff; cookie OR Bearer per ADR-043) — NOT the public /orders/lookup, which needs the phone and
        returns only the PublicOrderTimeline whitelist (ADR-032). The code is matched case-insensitively
        with the leading "#" optional (staff paste loosely); no phone is required because the caller is an
        authenticated staffer (no enumeration boundary to defend). An unknown code → 404 NOT_FOUND.
        Read-only; status changes go through POST /orders/{id}/transitions (RBAC-gated).
      security:
        - cookieAuth: []
      parameters:
        - name: code
          in: path
          required: true
          description: The human order code shown at checkout, with or without the leading "#" (e.g. "LMN-0042").
          schema:
            type: string
      responses:
        '200':
          description: The full internal order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/customers:
    get:
      tags: [admin]
      operationId: getAdminCustomers
      summary: Admin customers list — every customer with order aggregates (admin-gated).
      description: >
        Lists every customer with their order roll-up (order count, total spent, most-recent order
        date) for the Khách hàng screen (P3-p). The INTERNAL admin projection carrying the phone +
        social handle the public API never exposes, so it is admin-gated (cookieAuth; owner AND staff
        read — PDPL: customer PII is never public). Money (totalSpent) is raw int-VND, never formatted
        server-side (always-must #2). NOT paginated — a made-to-order shop's customer base is small and
        the client searches the whole set in memory (mirrors the products list). Most-recently-active
        first (a customer with a recent order floats up); a customer with no orders sorts last.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Every customer with order aggregates (most-recently-active first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminCustomer'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/customers/{id}:
    get:
      tags: [admin]
      operationId: getAdminCustomer
      summary: Admin customer detail — contact, addresses + order history (admin-gated).
      description: >
        Returns one customer's full profile (P3-p): contact (name, phone, email, social handle), the
        saved addresses, the summed lifetime spend, and their order history (code, total, status, date —
        newest first). Admin-gated (cookieAuth; owner AND staff — PDPL: never public). Money is raw
        int-VND (always-must #2); status crosses the wire as an OrderStatus enum the client maps to an
        i18n label (always-must #3). An unknown id → 404 NOT_FOUND.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The customer's full profile with order history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCustomerDetail'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/pet-tags:
    get:
      tags: [admin]
      operationId: getAdminPetTags
      summary: Admin Pet Tag roster — every tag with its lifecycle + linked pet (admin-gated).
      description: >
        Lists every Pet Tag for the /pet-tag roster (P3-t t-5, spec §10): the display code, lifecycle
        status (UNENCODED/ENCODED/ACTIVATED), the pet-page URL, the chip UID, and — once ACTIVATED — the
        linked pet's @handle, name, species and lost-mode flag (a LEFT JOIN; the profile-derived fields
        are absent for a tag with no pet yet). Admin-gated (cookieAuth; owner AND staff — fulfillment
        work, mirrors the print board + customers). The tag lifecycle is SEPARATE from OrderStatus (no
        statusHistory). NOT paginated — the client filters the whole set by status in memory (mirrors the
        customers list). Newest tag first.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Every Pet Tag with its lifecycle + linked pet (newest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminPetTag'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/print-queue:
    get:
      tags: [admin]
      operationId: getPrintQueue
      summary: Admin print queue — every print job across all stages, enriched (admin-gated).
      description: >
        Returns the whole print board (P3-f): one enriched card per print job across all four stages
        (NEED_PRINT/PRINTING/PACKING/SHIPPED), each carrying the order code, product name, quantity,
        color, printer and ETA a fulfiller needs — the join the bare print_jobs row (ids only) cannot
        give. Ordered by stage then created_at; the client groups into the kanban columns and derives
        per-column counts. Admin-gated (cookieAuth; owner AND staff — the print board is fulfillment
        work, not a money-out edge). Stage is a PrintStage enum the client maps to an i18n label
        (always-must #3); ETA/color/printer are optional. NOT paginated (the active queue is small).
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Every print job as an enriched queue card, ordered by stage then age.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PrintQueueJob'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/print-jobs/{id}:
    patch:
      tags: [admin]
      operationId: advancePrintJobStage
      summary: Move a print job to a new queue stage (admin-gated; stage-only, no order transition).
      description: >
        Sets the print job's board stage (P3-f) — the staff drag-drop between kanban columns. The print
        queue is STORED and staff-driven, finer-grained than order status and advanced INDEPENDENTLY of
        it (D6): this endpoint moves ONLY the print stage, it does NOT transition the customer's
        OrderStatus. Order status changes go through POST /orders/{id}/transitions, which enforces the
        RBAC + statusHistory + →SHIPPING QC-photo/tracking gate (P3-e) that dragging a card must never
        bypass. The target stage must be a valid PrintStage; an unknown value → 400, an unknown job id →
        404. Admin-gated (cookieAuth; owner AND staff). Returns the updated card (same shape as the
        board list).
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrintStageUpdate'
      responses:
        '200':
          description: The updated print queue card.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrintQueueJob'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/print-jobs/{id}/encode:
    post:
      tags: [admin]
      operationId: encodePrintJobTag
      summary: NFC-encode a Pet Tag print job — mint/return the tag, then confirm the chip write.
      description: >
        The "Ghi chip NFC" step (spec §10, P3-t t-2) for an nfc_tag print job sitting in the NFC_ENCODE
        stage. TWO-PHASE, one endpoint (ADR-041): call with NO chipUid to PREPARE — get-or-create the pet
        tag (mint code + shortId) and return the URL to burn to the chip, leaving the board stage
        untouched; call WITH chipUid to CONFIRM — record the chip UID, mark the tag ENCODED, and advance
        the print job to PACKING. The tag is minted lazily here because no order→print_job wiring exists
        yet; a qty>1 line gets ONE tag for now (ADR-041). Admin-gated (cookieAuth; owner AND staff —
        fulfillment work, mirrors the print board). A non-nfc_tag job → 400; an unknown job id → 404. Does
        NOT transition OrderStatus — the tag lifecycle is separate (spec §10).
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrintTagEncodeInput'
      responses:
        '200':
          description: The pet tag (URL to burn + status) and the print-queue card in its current state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrintTagEncodeResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/settings:
    get:
      tags: [admin]
      operationId: getSettings
      summary: Read the settings singleton (admin-gated).
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/settings/bank-account:
    patch:
      tags: [admin]
      operationId: updateBankAccount
      summary: Change the VietQR STK (owner-only; persisted with an append-only audit row).
      description: >
        Owner-only (requireOwner). Updates `settings.bank_account` AND appends a setting_bank_audit row
        in one transaction (UpdateBankAccountTx) — an STK change can never land without its audit trail
        (conventions §57).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountUpdate'
      responses:
        '200':
          description: Updated settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/settings/shipping-rules:
    patch:
      tags: [admin]
      operationId: updateShippingRules
      summary: Replace the per-region shipping-fee table (owner-only).
      description: >
        Owner-only. Replaces settings.shipping_rules wholesale with the given array — the SAME jsonb the
        server resolves shippingFee from at checkout (pricing.ShippingFee), so a bad shape here misroutes
        every order's fee. The handler validates province/fee before persisting. Not audited (only the STK
        is; P3-i open-q #2).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShippingRulesUpdate'
      responses:
        '200':
          description: Updated settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/settings/refund-policy:
    patch:
      tags: [admin]
      operationId: updateRefundPolicy
      summary: Change the refund-policy text shown pre-purchase (owner-only, ADR-012).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundPolicyUpdate'
      responses:
        '200':
          description: Updated settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/reply-templates:
    get:
      tags: [admin]
      operationId: listReplyTemplates
      summary: List the extension reply templates (admin-gated read).
      security:
