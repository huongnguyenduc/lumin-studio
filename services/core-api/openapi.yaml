          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/products/{id}/options/{optionId}/choices:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: optionId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [admin]
      operationId: createOptionChoice
      summary: Add a choice to a `choice` option (owner-only, ADR-037).
      description: The option must belong to the product (else 404).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptionChoiceInput'
      responses:
        '201':
          description: The created choice.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionChoice'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/products/{id}/options/{optionId}/choices/{choiceId}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: optionId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: choiceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [admin]
      operationId: updateOptionChoice
      summary: Edit an option choice (owner-only, ADR-037).
      description: Scoped by (option, choice) under the product; a mismatched id → 404.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptionChoiceInput'
      responses:
        '200':
          description: The updated choice.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionChoice'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [admin]
      operationId: deleteOptionChoice
      summary: Remove an option choice (owner-only, ADR-037).
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/products/{id}/model-upload:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [admin]
      operationId: createProductModelUpload
      summary: Create a presigned POST form for one source-model upload (owner-only).
      description: >
        Admin editor upload bootstrap (P3-j-b, ADR-036). Returns a browser-ready S3/Garage presigned POST
        form for exactly one source 3D model (.glb/.stl/.3mf), plus the host-pinned `finalUrl` the editor
        later sends as `sourceModelUrl` to POST /admin/products/{id}/asset-jobs. The server generates a
        random, non-PII object key and signs a POST policy with `content-length-range` (≤100MB — the
        Cloudflare Tunnel body cap, ADR-005) and an exact model `Content-Type` (`model/gltf-binary`,
        `model/stl`, or `model/3mf`). A single POST, NOT S3 multipart (ADR-036): a web-ready model sits
        well under 100MB and minio-go cannot presign multipart parts. The policy TTL is short (≤5 minutes).
        The browser MUST upload directly to `uploadUrl` with every returned field and the file part;
        core-api never proxies the model body through the tunnel. Owner-only (spec §08 — catalog is an
        owner power). Unknown product id → 404.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelUploadInput'
      responses:
        '200':
          description: Browser-ready POST target, form fields, and the host-pinned final object URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelUpload'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/products/{id}/asset-jobs:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [admin]
      operationId: getProductAssetJobs
      summary: List a product's render/ingest jobs, newest first (admin-gated read).
      description: >
        Returns every asset job (model ingest / sprite render) for one product, newest first, so the
        editor can show the current render status (queued / processing / ready / failed). Admin-gated
        (cookieAuth; owner AND staff read — mirrors the product reads). Unknown product id → 404.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: The product's asset jobs (newest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetJob'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [admin]
      operationId: createProductAssetJob
      summary: Enqueue a render/ingest job from an uploaded source model (owner-only).
      description: >
        Enqueues one asset job (`model_ingest` or `sprite_render`) for a product from a model already
        uploaded via POST /admin/products/{id}/model-upload (owner-only — spec §08). The `sourceModelUrl`
        MUST be a host-pinned URL this server minted (else 400); `sourceVersion` is the content hash of
        the uploaded object (ADR-004 — Garage has no versioning). The job is created `queued` and its
        `asset_job.created` event is enqueued on the same tx (publish-on-commit, ADR-006); the slice-3
        worker drains it and later writes the rendered outputs onto the product. Unknown product id → 404.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetJobInput'
      responses:
        '201':
          description: The queued asset job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetJob'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: lumin_session
      description: Signed JWT in an httpOnly+Secure cookie (ADR-030; cookie name finalized in PR-3e-1).
    customerAuth:
      type: apiKey
      in: cookie
      name: lumin_customer
      description: >
        Storefront customer session JWT in an httpOnly+Secure cookie (PR-P1-r). SEPARATE realm from
        cookieAuth — signed with a different secret, so an admin token can never authenticate here.

  responses:
    BadRequest:
      description: Malformed request (bad JSON, missing/invalid field).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated but not allowed (RBAC).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Invalid state transition (edge not allowed from the current status).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unprocessable:
      description: Semantically invalid (e.g. missing reason/refund-proof/tracking-code, empty cart).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: >
        Rate limit tripped (RATE_LIMITED) — too many requests to a public guarded endpoint.
        The client should back off. No Retry-After is exposed so the exact limiter window is not leaked.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    # --- Enums (byte-identical across OpenAPI · internal/order · packages/core Zod · Postgres) -----
    OrderStatus:
      type: string
      description: Order lifecycle status (spec §04). 5 progress milestones + 2 close states.
      enum:
        - PENDING_CONFIRM
        - PAID
        - PRINTING
        - SHIPPING
        - COMPLETED
        - CANCELLED
        - REFUNDED

    PrintStage:
      type: string
      description: >
        Print queue stage (spec §02 PrintJob). STORED and staff-driven — finer-grained than OrderStatus
        (one PRINTING order spans the PRINTING + PACKING print stages) and advanced independently of it
        (D6): a stage move is NOT an OrderStatus transition.
      enum:
        - NEED_PRINT
        - PRINTING
        - PACKING
        - SHIPPED

    Channel:
      type: string
      description: Order origin (spec §04).
      enum:
        - web
        - inbox

    Role:
      type: string
      description: >
        Actor role for a transition (spec §08). `system` is a runtime-only actor (e.g. delivery
        auto-complete) — it is NEVER a stored user role; see UserRole.
      enum:
        - owner
        - staff
        - system

    UserRole:
      type: string
      description: >
        Stored user role (Postgres `user_role`). The subset of Role that a logged-in user can hold —
        `system` is excluded (a runtime actor, never persisted).
      enum:
        - owner
        - staff

    # --- Catalog (Phase-1 storefront reads) -------------------------------------------------------
    # ProductStatus / OptionType are kept byte-identical to the Postgres native enums (product_status /
    # option_type, migration 000001) by internal/contract/parity_test.go — change one here and the
    # parity test (in `make verify-go`) fails until they agree. `material` is deliberately NOT an enum:
    # spec §02 leaves it open-ended (PLA · PETG · recycled-PLA …) so it is TEXT+CHECK, not a wire enum
    # (ADR-028).
    ProductStatus:
      type: string
      description: Product lifecycle (spec §02, Postgres `product_status`). The detail read returns `active` only.
      enum:
        - active
        - draft
        - archived

    OptionType:
      type: string
      description: Customization option kind (spec §02, Postgres `option_type`). `text` carries an engraving char limit (maxChars).
      enum:
        - text
        - choice

    Dimensions:
      type: object
      description: Product bounding size in millimetres (spec §02; displayed "180 × 180 × 240 mm").
      required: [w, d, h]
      properties:
        w:
          type: integer
          description: Width in mm.
        d:
          type: integer
          description: Depth in mm.
        h:
          type: integer
          description: Height in mm.

    Color:
      type: object
      description: A named print colour for a product (spec §02). priceDelta is int-VND (may be 0).
      required: [id, name, hex, available, priceDelta]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Display name, e.g. "Kem sữa".
        hex:
          type: string
          description: Swatch colour as a hex string.
        available:
          type: boolean
          description: Whether the filament is currently in stock.
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0).
        partId:
          type: string
          format: uuid
          nullable: true
          description: >
            Part this colour belongs to (ADR-037); null = flat product-level colour (default). When set,
            the customer picks one colour per part.

    Option:
      type: object
      description: 'A customization option (spec §02). type: text carries an engraving char limit (maxChars).'
      required: [id, label, description, type, priceDelta, choices]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        description:
          type: string
        type:
          $ref: '#/components/schemas/OptionType'
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0).
        maxChars:
          type: integer
          nullable: true
          description: Engraving character limit; null unless a limit applies.
        choices:
          type: array
          description: >
            Enumerated choices for a `choice` option (ADR-037), each with its own priceDelta. Empty = a
            legacy toggle priced by this option's priceDelta; non-empty = the customer picks exactly one.
          items:
            $ref: '#/components/schemas/OptionChoice'

    Product:
      type: object
      description: >
        Storefront product detail (spec §02). Money fields (basePrice, colors[].priceDelta,
        options[].priceDelta) are raw int-VND — the client formats via @lumin/core (always-must #2).
        images[0] is the card cover (sprite-first, ADR-007). No productType in Phase 1 (D-P1-1).
      required:
        - id
        - slug
        - name
        - description
        - categoryId
        - basePrice
        - dimensions
        - material
        - model3dUrl
        - images
        - colors
        - options
        - parts
        - status
        - reviewCount
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Unique URL slug (spec §02).
        name:
          type: string
        description:
          type: string
          description: Markdown stored as text (spec §02 richtext).
        categoryId:
          type: string
          format: uuid
        basePrice:
          type: integer
          format: int64
          description: Starting price in int-VND (>= 0); options may add to it.
        dimensions:
          $ref: '#/components/schemas/Dimensions'
        material:
          type: string
          description: Print material (spec §02; open-ended TEXT+CHECK, ADR-028 — not a wire enum).
        model3dUrl:
          type: string
          description: .glb URL for the on-demand model viewer; empty string when none.
        images:
          type: array
          description: Shop photos; images[0] is the card cover (sprite-first, ADR-007). May be empty.
          items:
            type: string
            format: uri
        colors:
          type: array
          items:
            $ref: '#/components/schemas/Color'
        options:
          type: array
          items:
            $ref: '#/components/schemas/Option'
        parts:
          type: array
          description: >
            Named parts (ADR-037), each grouping a subset of colors[] via Color.partId. Empty = a
            single-piece product (flat colours). The customer picks one colour per part.
          items:
            $ref: '#/components/schemas/Part'
        status:
          $ref: '#/components/schemas/ProductStatus'
        ratingAvg:
          type: number
          format: float
          nullable: true
          description: Denormalized average rating; null until the first review.
        reviewCount:
          type: integer
          description: Denormalized review count (spec §02).
        createdAt:
          type: string
          format: date-time

    Part:
      type: object
      description: >
        A named part of a product (ADR-037) — e.g. "Chao đèn". colors[] belong to a part via Color.partId;
        the customer picks one colour per part.
      required: [id, name, displayOrder]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Display name, e.g. "Chao đèn".
        displayOrder:
          type: integer
          description: Sort order within the product's parts.

    OptionChoice:
      type: object
      description: >
        One enumerated choice of a `choice` option (ADR-037) — e.g. size "M". priceDelta is int-VND (may
        be 0); the customer picks exactly one choice per choice-option.
      required: [id, label, description, priceDelta, displayOrder]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          description: Display label, e.g. "M".
        description:
          type: string
          description: Optional detail, e.g. "12×9 cm · ~160g".
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0).
        displayOrder:
          type: integer
          description: Sort order within the option's choices.

    ProductCard:
      type: object
      description: >
        Lightweight catalog-list projection of a product (spec §02) — the fields a grid card needs, WITHOUT
        colors/options/description body (the list avoids the per-product reads the detail read makes → no
        N+1). basePrice is raw int-VND; images[0] is the card cover (sprite-first, ADR-007). Only ACTIVE
        products are ever listed, so status is implied and omitted.
      required:
        - id
        - slug
        - name
        - basePrice
        - categoryId
        - images
        - reviewCount
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Unique URL slug (spec §02).
        name:
          type: string
        basePrice:
          type: integer
          format: int64
          description: Starting price in int-VND (>= 0).
        categoryId:
          type: string
          format: uuid
        images:
          type: array
          description: Shop photos; images[0] is the card cover (ADR-007). May be empty.
          items:
            type: string
            format: uri
        ratingAvg:
          type: number
          format: float
          nullable: true
          description: Denormalized average rating; null until the first review.
        reviewCount:
          type: integer
          description: Denormalized review count (spec §02).

    ProductList:
      type: object
      description: >
        One page of catalog cards plus the pagination envelope (spec §03 list state). `total` is the count
        of active products matching the filter across all pages; the client derives the page count.
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductCard'
        page:
          type: integer
          description: 1-based page number echoed from the request.
        pageSize:
          type: integer
          description: Items per page echoed from the request.
        total:
          type: integer
          description: Total active products matching the filter, across all pages.

    AdminProductSummary:
      type: object
      description: >
        Admin catalog-list projection (P3-j): the fields the admin product grid needs across ALL statuses —
        like ProductCard but WITH status (for the tab badges) and createdAt, and without colors/options (the
        list makes no per-product read → no N+1). basePrice is raw int-VND (always-must #2); the detail read
        (getAdminProduct) returns the full Product.
      required:
        - id
        - slug
        - name
        - basePrice
        - categoryId
        - status
        - images
        - reviewCount
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        basePrice:
          type: integer
          format: int64
          description: Starting price in int-VND (>= 0).
        categoryId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ProductStatus'
        images:
          type: array
          description: Shop photos; images[0] is the card cover (ADR-007). May be empty.
          items:
            type: string
            format: uri
        ratingAvg:
          type: number
          format: float
          nullable: true
          description: Denormalized average rating; null until the first review.
        reviewCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      description: >
        Create/replace body for a product (P3-j, owner-only). Same editable fields as Product MINUS the
        server/pipeline-owned ones: no id/createdAt/ratingAvg/reviewCount (server-owned), no colors/options
        (managed via their own nested endpoints), and no model3dUrl (owned by the asset pipeline, P3-j-b —
        the editor form can never set or blank it). basePrice is raw int-VND (always-must #2). description
        and images are optional (default "" / []).
      required:
        - slug
        - name
        - categoryId
        - basePrice
        - dimensions
        - material
        - status
      properties:
        slug:
          type: string
          description: Unique URL slug (spec §02); a duplicate → 400 with a `slug` field error.
        name:
          type: string
        description:
          type: string
          description: Markdown stored as text (spec §02). Optional; defaults to "".
        categoryId:
          type: string
          format: uuid
        basePrice:
          type: integer
          format: int64
          description: Starting price in int-VND (>= 0).
        dimensions:
          $ref: '#/components/schemas/Dimensions'
        material:
          type: string
          description: Print material (spec §02; open-ended TEXT+CHECK — PLA · PETG · recycled-PLA).
        images:
          type: array
          description: Shop photos; images[0] is the card cover (ADR-007). Optional; defaults to [].
          items:
            type: string
            format: uri
        status:
          $ref: '#/components/schemas/ProductStatus'

    ColorInput:
      type: object
      description: Create/replace body for a product colour (P3-j). priceDelta is int-VND (default 0).
      required: [name, hex, available]
      properties:
        name:
          type: string
        hex:
          type: string
          description: Swatch colour as a hex string (e.g. #C9A24B).
        available:
          type: boolean
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0). Optional; defaults to 0.
        partId:
          type: string
          format: uuid
          nullable: true
          description: >
            Assign this colour to a part (ADR-037); omit/null = flat product-level colour. The part must
            belong to the same product (else 400 partId).

    OptionInput:
      type: object
      description: Create/replace body for a customization option (P3-j). priceDelta is int-VND (default 0).
      required: [label, type]
      properties:
        label:
          type: string
        description:
          type: string
          description: Optional; defaults to "".
        type:
          $ref: '#/components/schemas/OptionType'
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0). Optional; defaults to 0.
        maxChars:
          type: integer
          nullable: true
          description: Engraving character limit for a `text` option; null/omitted for no limit.

    PartInput:
      type: object
      description: Create/replace body for a product part (ADR-037, owner-only).
      required: [name]
      properties:
        name:
          type: string
        displayOrder:
          type: integer
          description: Sort order within the product's parts; optional, defaults to 0.

    OptionChoiceInput:
      type: object
      description: Create/replace body for an option choice (ADR-037). priceDelta is int-VND (default 0).
      required: [label]
      properties:
        label:
          type: string
        description:
          type: string
          description: Optional; defaults to "".
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0). Optional; defaults to 0.
        displayOrder:
          type: integer
          description: Sort order within the option's choices; optional, defaults to 0.

    AssetJobStatus:
      type: string
      enum: [queued, processing, ready, failed]
      description: Lifecycle of a render/ingest job (migration 000006). The client maps it to an i18n label.

    AssetJobType:
      type: string
      enum: [model_ingest, sprite_render]
      description: >
        Which asset pipeline a job runs (D3): `model_ingest` normalizes geometry + builds the LOD .glb,
        `sprite_render` renders the 360° sprite alone. The client maps it to an i18n label.

    ModelUploadInput:
      type: object
      description: >
        Admin editor upload bootstrap for one source 3D model. No file name or client-declared size: the
        object key is generated server-side with no PII, and the size/type gate lives in the signed S3
        POST policy. The editor maps the file extension (.glb/.stl/.3mf) to the exact model MIME below.
      required: [contentType]
      properties:
        contentType:
          type: string
          enum: [model/gltf-binary, model/stl, model/3mf]
          description: Exact source-model MIME type the returned POST policy will allow.

    ModelUpload:
      type: object
      description: >
        A short-lived, browser-ready S3/Garage POST form for one source model. Submit every `fields`
        entry and the file part to `uploadUrl`; after a successful direct upload, send `finalUrl` as
        `sourceModelUrl` to POST /admin/products/{id}/asset-jobs. `finalUrl` is host-pinned by the server
        and never derived from browser input.
      required: [uploadUrl, fields, finalUrl, expiresAt, maxBytes]
      properties:
        uploadUrl:
          type: string
          format: uri
          description: S3/Garage form POST target, usually the bucket endpoint.
        fields:
          type: object
          additionalProperties:
            type: string
          description: Exact form fields to include before the file part.
        finalUrl:
          type: string
          format: uri
          description: Host-pinned object URL later passed as `sourceModelUrl` to the asset-job create.
        expiresAt:
          type: string
          format: date-time
          description: Policy expiration timestamp.
        maxBytes:
          type: integer
          format: int64
          description: Maximum object size enforced by the signed POST policy (≤100MB).

    AssetJobInput:
      type: object
      description: >
        Enqueue body for one render/ingest job. `sourceModelUrl` MUST be a host-pinned URL minted by
        POST /admin/products/{id}/model-upload; `sourceVersion` is the content hash of that uploaded
        object (ADR-004). The productId comes from the path, not the body.
      required: [jobType, sourceModelUrl, sourceVersion]
      properties:
        jobType:
          $ref: '#/components/schemas/AssetJobType'
        sourceModelUrl:
          type: string
          format: uri
          description: Host-pinned URL of the uploaded source model (from the model-upload finalUrl).
        sourceVersion:
          type: string
          description: Content hash of the uploaded source object (ADR-004 — Garage has no versioning).

    AssetJob:
      type: object
      description: >
        One render/ingest job for a product (migration 000006). The admin editor reads this to show render
        status. attempts/lastError/completedAt are written by the slice-3 worker; a freshly enqueued job is
        `queued` with 0 attempts and null lastError/completedAt.
      required: [id, productId, jobType, status, sourceModelUrl, sourceVersion, attempts, createdAt]
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        jobType:
          $ref: '#/components/schemas/AssetJobType'
        status:
          $ref: '#/components/schemas/AssetJobStatus'
        sourceModelUrl:
          type: string
          format: uri
        sourceVersion:
          type: string
        attempts:
          type: integer
          description: Worker retry count (0 until the worker runs).
        lastError:
          type: string
          nullable: true
          description: Failure reason; set on `failed`, cleared on `ready`, null otherwise.
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Set when the job reaches `ready` or `failed`; null while pending.

    Review:
      type: object
      description: >
        One PUBLISHED product review as it crosses the public wire (spec §02). The author's identity is
        deliberately omitted — reviews carry a nullable customer_id and guests may review, so exposing a
        reviewer name would be public PII (PDPL); only the review content is returned. `reply` is the
        shop's public reply, null until the shop replies (no Phase-1 write path populates it yet). Hidden
        reviews are filtered at the SQL source and never appear here.
      required: [id, rating, body, images, createdAt]
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Star rating 1–5 (spec §02).
        body:
          type: string
          description: The review text (may be empty).
        images:
          type: array
          description: Reviewer photos (spec §02). May be empty.
          items:
            type: string
            format: uri
        reply:
          nullable: true
          description: The shop's public reply, or null until the shop has replied.
          allOf:
            - $ref: '#/components/schemas/ReviewReply'
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 UTC when the review was posted.

    ReviewReply:
      type: object
      description: The shop's public reply to a review (spec §02 `reply?`). Null on the parent until replied.
      required: [body, at]
      properties:
        body:
          type: string
          description: The shop reply text.
        at:
          type: string
          format: date-time
          description: ISO-8601 UTC when the reply was posted.

    ReviewList:
      type: object
      description: >
        One page of published reviews plus the pagination envelope (spec §03 list state). `total` is the
        count of PUBLISHED reviews for the product across all pages; the client derives the page count.
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        page:
          type: integer
          description: 1-based page number echoed from the request.
        pageSize:
          type: integer
          description: Items per page echoed from the request.
        total:
          type: integer
          description: Total published reviews for the product, across all pages.

    Category:
      type: object
      description: >
        A catalog category (spec §02) — the taxonomy a product belongs to (Product.categoryId references
        Category.id) and the storefront browse chips render. No visibility axis: every category is public.
      required: [id, slug, name]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Unique URL slug — the value passed to GET /products?category={slug}.
        name:
          type: string
          description: Human-friendly display name (sentence case).

    # --- Value objects ----------------------------------------------------------------------------
    StatusEvent:
      type: object
      description: One appended statusHistory record (spec §02/§04). `from` is null only at creation.
      required: [from, to, at, byUser]
      properties:
        from:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/OrderStatus'
        to:
          $ref: '#/components/schemas/OrderStatus'
        at:
          type: string
          format: date-time
          description: ISO-8601 UTC, trailing Z (e.g. 2026-06-25T00:00:00.000Z).
        byUser:
          type: string
          description: Actor — a `users.id` for staff/owner, the sentinel "customer" for guest web-create.
          minLength: 1
        reason:
          type: string
          description: Required when `to` is CANCELLED or REFUNDED.
        refundProofUrl:
          type: string
          format: uri
          description: Required when `to` is REFUNDED (transfer-back proof image).

    Address:
      type: object
      description: Vietnamese shipping address — no district level (ADR-017).
      required: [province, ward, street]
      properties:
        province: { type: string }
        ward: { type: string }
        street: { type: string }

    Personalization:
      type: object
      description: Per-item engraving (distinct from a Review's text — that field is `body`).
      required: [text, zoneId]
      properties:
        text:
          type: string
          minLength: 1
        zoneId:
          type: string
          minLength: 1

    Customer:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
        phone:
          type: string
          description: Vietnamese mobile — `0` or `+84` prefix + 9 digits.
          pattern: '^(0|\+84)\d{9}$'
        email:
          type: string
          format: email
        socialHandle:
          type: string

    PartColorSelection:
      type: object
      description: >
        One part's chosen colour (ADR-037). For a product with named parts the client sends one of
        these per part instead of the flat `colorId`. The server validates the colour belongs to that
        part (not merely the product) before pricing — a cross-part colour is rejected 422.
      required: [partId, colorId]
      properties:
        partId:
          type: string
          format: uuid
        colorId:
          type: string
          format: uuid

    OptionChoiceSelection:
      type: object
      description: >
        One choice-option's picked choice (ADR-037). For an option that offers enumerated choices the
        client sends the picked choice here (priced by the choice's own delta — the option base is
        ignored); text and legacy toggle options stay in `optionIds`.
      required: [optionId, choiceId]
      properties:
        optionId:
          type: string
          format: uuid
        choiceId:
          type: string
          format: uuid

    OrderItem:
      type: object
      description: A priced line item as returned in an Order (unitPrice is server-derived).
      required: [productId, optionIds, quantity, unitPrice]
      properties:
        productId:
          type: string
          format: uuid
        colorId:
          type: string
          format: uuid
        optionIds:
          type: array
          items:
            type: string
            format: uuid
        personalization:
          $ref: '#/components/schemas/Personalization'
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: integer
          format: int64
          description: Server-derived int VND (base + color/option deltas). Never accepted from the client.
        productName:
          type: string
          description: Human product name, joined for the admin order-detail view (P3-e). Read-only.
        colorName:
          type: string
          description: Human color name when the line has a color, joined for the admin detail. Read-only.
        optionLabels:
          type: array
          items:
            type: string
          description: Selected option labels, joined for the admin detail (empty when none). Read-only.
        partColors:
          type: array
          items:
            $ref: '#/components/schemas/PartColorSelection'
          description: >
            The colour chosen for each named part (ADR-037), snapshotted from the order. Omitted for a flat
            product (which uses colorId). Read-only.
        optionChoices:
          type: array
          items:
            $ref: '#/components/schemas/OptionChoiceSelection'
          description: >
            The picked choice for each choice-option that offers choices (ADR-037), snapshotted from the
            order. Omitted when the line has none. Read-only.

    OrderItemInput:
      type: object
      description: >
        A requested line item. Deliberately has NO unitPrice — the server re-derives every price from
        the catalog (always-must #2); a client price is never trusted.
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        colorId:
          type: string
          format: uuid
        optionIds:
          type: array
          items:
            type: string
            format: uuid
          default: []
          description: >
            Text options + legacy toggle choice-options (no choices). A choice-option that offers choices
            is picked via optionChoices instead — toggling it here is rejected 422.
        partColors:
          type: array
          items:
            $ref: '#/components/schemas/PartColorSelection'
          description: >
            Per-part colour picks for a product with named parts (ADR-037): exactly one per part. A flat
            product uses colorId instead; mixing the two (or a per-part colour on a flat product) is 422.
            OPTIONAL (not defaulted): absent = a flat product with no per-part colours, so an existing flat
            client needs no change — the configurator storefront (Stage 2c) starts sending it.
        optionChoices:
          type: array
          items:
            $ref: '#/components/schemas/OptionChoiceSelection'
          description: >
            Picked choices for choice-options that offer them (ADR-037). Text/toggle options use optionIds.
            OPTIONAL (not defaulted): absent = the line picks no choices.
        personalization:
          $ref: '#/components/schemas/Personalization'
        quantity:
          type: integer
          minimum: 1

    # --- Price quote (P1-b: server-authoritative pricing preview; no order, no persistence) -------
    PriceQuoteInput:
      type: object
      description: >
        One or more selections to price. Reuses OrderItemInput (which has NO unitPrice — the server
        re-derives every price from the catalog). An optional `province` folds in shipping + total.
        Capped at 50 items: this is a public, unauthenticated read (no rate limit until the edge WAF),
        and each line costs a catalog round-trip, so the cap bounds the per-request work.
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: '#/components/schemas/OrderItemInput'
        province:
          type: string
          description: >
            Optional VN destination province (no district, ADR-017). When present, the response adds
            shippingFee (resolved server-side from settings.shipping_rules, same authority as checkout)
            and total (subtotal + shippingFee). Omitted or blank → line/subtotal only, byte-identical to
            the pre-P2-b response. An unshippable province → 422 NO_SHIPPING_RULE (never a silent ₫0).

    PriceQuote:
      type: object
      description: >
        Server-computed line prices + subtotal (raw int-VND). `lines` is positionally aligned with the
        request `items` (same index) — a line carries no product reference, so a client maps a line back
        to its selection by array index. `shippingFee` and `total` are present ONLY when the request
        carried a province (P2-b); without one the response is line/subtotal only.
      required: [lines, subtotal]
      properties:
        lines:
          type: array
          items:
            $ref: '#/components/schemas/PriceQuoteLine'
        subtotal:
          type: integer
          format: int64
          description: Sum of line totals, raw int VND (no shipping).
        shippingFee:
          type: integer
          format: int64
          description: >
            Server-resolved shipping fee (settings.shipping_rules), raw int VND. Present ONLY when the
            request carried a province — same authority as the checkout charge path.
        total:
          type: integer
          format: int64
          description: >
            subtotal + shippingFee, overflow-checked. Present ONLY when the request carried a province.

    PriceQuoteLine:
      type: object
      description: >
        One priced line, positionally aligned with the request item at the same index. Carries the
        server-derived unit price, its quantity, and the line total — no product ref (map back by index).
      required: [unitPrice, quantity, lineTotal]
      properties:
        unitPrice:
          type: integer
          format: int64
          description: Server-derived int VND (base + color delta + Σ option deltas). Never accepted from the client.
        quantity:
          type: integer
          minimum: 1
        lineTotal:
          type: integer
          format: int64
          description: unitPrice × quantity, overflow-checked server-side.

    # --- Order DTO (nested; assembled by handlers — NOT the flat sqlc row) ------------------------
    Order:
      type: object
      required:
        - id
        - code
        - channel
        - status
        - customer
        - shippingAddress
        - items
        - subtotal
        - shippingFee
        - total
        - statusHistory
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          description: Human order code, e.g. #LMN-0042.
        channel:
          $ref: '#/components/schemas/Channel'
        status:
          $ref: '#/components/schemas/OrderStatus'
        customer:
          $ref: '#/components/schemas/Customer'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'
        subtotal:
          type: integer
          format: int64
        shippingFee:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        paymentProofUrl:
          type: string
          format: uri
        paymentConfirmedAt:
          type: string
          format: date-time
        refundProofUrl:
          type: string
          format: uri
        trackingCode:
          type: string
        qcPhotoUrl:
          type: string
          format: uri
          description: QC packing photo attached on the PRINTING→SHIPPING transition (D-P3-6).
        note:
          type: string
        statusHistory:
          type: array
          items:
            $ref: '#/components/schemas/StatusEvent'
        createdAt:
          type: string
          format: date-time

    CreateOrderResult:
      type: object
      description: >
        The POST /orders 201 body: the created Order plus its phone-less tracking token (P2-i, D-P2-8).
        trackingToken is an HMAC capability derived from the order code and is returned ONLY here — never
        on the Order schema or any read endpoint — so it stays out of every surface that echoes an order.
        The storefront keeps it from this response to build the confirmation-screen link /o/{code}-{token}
        that GET /orders/track verifies without a phone. It is NOT stored (recomputed on the read), so no
        migration is needed and rotating TRACKING_SECRET invalidates every outstanding link.
      required: [order, trackingToken]
      properties:
        order:
          $ref: '#/components/schemas/Order'
        trackingToken:
          type: string
          description: HMAC capability token for GET /orders/track. Opaque; treat as a bearer secret.

    # --- Inputs -----------------------------------------------------------------------------------
    CreateOrderInput:
      description: >
        Order intake, discriminated on `channel`: `web` (public → PENDING_CONFIRM) vs `inbox`
        (staff/owner-only → PAID). This is a NAMED schema, not an inline oneOf, so oapi-codegen
        (strict-server) emits a usable discriminated union (AsCreateWebOrderInput /
        ValueByDiscriminator) instead of an opaque raw-message body the handler cannot read.
      oneOf:
        - $ref: '#/components/schemas/CreateWebOrderInput'
        - $ref: '#/components/schemas/CreateInboxOrderInput'
      discriminator:
        propertyName: channel
        mapping:
          web: '#/components/schemas/CreateWebOrderInput'
          inbox: '#/components/schemas/CreateInboxOrderInput'

    CreateWebOrderInput:
      type: object
      description: >
        Public web order → PENDING_CONFIRM. `paymentProofUrl` (the CK receipt image) is required.
        If any item carries `personalization`, both `personalizationAck` and `engraveEchoConfirmed`
        MUST be true (the no-return acknowledgement + engrave-echo step, ADR-012) — enforced server-side.
      required: [channel, customer, shippingAddress, items, paymentProofUrl]
      properties:
        channel:
          type: string
          enum: [web]
        customer:
          $ref: '#/components/schemas/Customer'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemInput'
        paymentProofUrl:
          type: string
          format: uri
        personalizationAck:
          type: boolean
        engraveEchoConfirmed:
          type: boolean

    CreateInboxOrderInput:
      type: object
      description: >
        Staff/owner-created inbox order → born PAID with no payment record (the staff already verified
        money landed, conventions §17). Requires a resolved staff/owner actor; no `paymentProofUrl`.
      required: [channel, customer, shippingAddress, items]
      properties:
        channel:
          type: string
          enum: [inbox]
        customer:
          $ref: '#/components/schemas/Customer'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemInput'
        note:
          type: string

    TransitionRequest:
      type: object
      description: >
        One requested status change. `reason` required for CANCELLED/REFUNDED; `refundProofUrl` for
        REFUNDED; `trackingCode` + `qcPhotoUrl` for →SHIPPING. Actor/role/time are NOT in the body
        (server-sourced).
      required: [to]
      properties:
        to:
          $ref: '#/components/schemas/OrderStatus'
        reason:
          type: string
        refundProofUrl:
          type: string
          format: uri
        trackingCode:
          type: string
        qcPhotoUrl:
          type: string
          format: uri

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    AuthUser:
      type: object
      description: The authenticated user (no credential material).
      required: [id, name, email, role]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'

    # --- Storefront customer account (PR-P1-r) ----------------------------------------------------
    CustomerAccount:
      type: object
      description: >
        The authenticated storefront customer (no credential material). Distinct from AuthUser (admin):
        a customer has no role, and carries the phone captured at registration.
      required: [id, name, email, phone]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string

    CustomerRegisterInput:
      type: object
      description: New storefront account registration (ADR-030 realm riêng). Money/orders unrelated.
      required: [name, email, phone, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          description: Plaintext password; bcrypt-hashed server-side (never stored/returned in clear).

    CustomerOrderList:
      type: array
      description: >
        A customer's own orders, newest-first, each as the public timeline projection (the same shape
        the guest lookup returns) — deliberately NO internal money/PII/address fields (ADR-032). P1-s
        reuses the P1-o timeline renderer over this list.
      items:
        $ref: '#/components/schemas/PublicOrderTimeline'

    # --- Settings / STK (PR-3k) -------------------------------------------------------------------
    BankAccount:
      type: object
      description: VietQR STK the server renders the static QR from (conventions §57). May be unset.
      properties:
        bin:
          type: string
          description: Bank BIN (VietQR napas bank id).
        accountNumber:
          type: string
        accountName:
          type: string

    BankAccountUpdate:
      type: object
      description: Owner-only STK change (PATCH). `reason` is the optional audit note.
      required: [bin, accountNumber, accountName]
      properties:
        bin:
          type: string
        accountNumber:
          type: string
        accountName:
          type: string
        reason:
          type: string

    Settings:
      type: object
      description: >
        The settings singleton. `shopInfo` and `shippingRules` are free-form jsonb whose precise
        shapes are pinned in the Phase-1 storefront slice; typed loosely here on purpose.
      required: [bankAccount, refundPolicy, updatedAt]
      properties:
        shopInfo:
          type: object
          additionalProperties: true
        bankAccount:
          $ref: '#/components/schemas/BankAccount'
        shippingRules:
          type: array
          items:
            $ref: '#/components/schemas/ShippingRule'
        refundPolicy:
          type: string
        updatedAt:
          type: string
          format: date-time

    ShippingRule:
      type: object
      description: >
        One per-region shipping-fee row (settings.shipping_rules). VN address model, no district
        (ADR-017). Province "*" is the wildcard default fee (applied when no exact province matches).
      required: [province, fee]
      properties:
        province:
          type: string
          description: Destination province name, or "*" for the wildcard default.
        fee:
          type: integer
          format: int64
          description: Shipping fee for this province, raw int VND (≥ 0). Server resolves shippingFee from this table.

    ShippingRulesUpdate:
      type: object
      description: Owner-only wholesale replace of the shipping-fee table (PATCH).
      required: [shippingRules]
      properties:
        shippingRules:
          type: array
          items:
            $ref: '#/components/schemas/ShippingRule'

    RefundPolicyUpdate:
      type: object
      description: Owner-only refund-policy text change (PATCH, ADR-012).
      required: [refundPolicy]
      properties:
        refundPolicy:
          type: string

    ReplyTemplateInput:
      type: object
      description: >
        Create/replace body for a reply template. `variables` is DERIVED server-side from the {token}
        placeholders in `body` (spec §02) — it is NOT accepted here, so the stored hint list can never
        drift from the body text. The client sends title + body only.
      required: [title, body]
      properties:
        title:
          type: string
        body:
          type: string

    CheckoutConfig:
      type: object
      description: >
        Public checkout config (GET /checkout/config). A whitelist of the anonymous data the payment
        step and pre-purchase disclosure need — never the full Settings singleton (no shopInfo PII, no
        shipping-fee table).
      required: [bankAccount, vietqrUrl, shippableProvinces, refundPolicy]
      properties:
        bankAccount:
          $ref: '#/components/schemas/BankAccount'
        vietqrUrl:
          type: string
          description: >
            Server-built img.vietqr.io image URL for the STK static QR (D-P2-1). Derived entirely from
            the stored bank_account — no client-controllable field, no amount, no memo.
        shippableProvinces:
          type: array
          description: Provinces the shop ships to (settings.shipping_rules keys; the "*" wildcard excluded).
          items:
            type: string
        refundPolicy:
          type: string
          description: Refund/return policy text shown before purchase (compliance §3). May be empty if unset.

    PaymentProofUploadInput:
      type: object
      description: >
        Browser upload bootstrap for one payment-proof receipt image. The server does not accept a file
        name or client-declared size here: the object key is generated server-side with no PII, and the
        actual size/type gate lives in the signed S3 POST policy.
      required: [contentType]
      properties:
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp]
          description: Exact image MIME type the returned POST policy will allow.

    PaymentProofUpload:
      type: object
      description: >
        A short-lived, browser-ready S3/Garage POST form. Submit every `fields` entry and the file part
        to `uploadUrl`; after a successful direct upload, send `finalUrl` as `paymentProofUrl` in
        POST /orders. `finalUrl` is host-pinned by the server and never derived from browser input.
      required: [uploadUrl, fields, finalUrl, expiresAt, maxBytes]
      properties:
        uploadUrl:
          type: string
          format: uri
          description: S3/Garage form POST target, usually the bucket endpoint.
        fields:
          type: object
          additionalProperties:
            type: string
          description: Exact form fields to include before the file part.
        finalUrl:
          type: string
          format: uri
          description: Host-pinned object URL later passed as `paymentProofUrl` to POST /orders.
        expiresAt:
          type: string
          format: date-time
          description: Policy expiration timestamp.
        maxBytes:
          type: integer
          format: int64
          description: Maximum object size enforced by the signed POST policy.

    ReplyTemplate:
      type: object
      description: An extension reply template (spec §02).
      required: [id, title, body, variables, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        variables:
          type: array
          items: { type: string }
          description: Placeholder tokens, e.g. ["{tên}", "{mã đơn}", "{STK}"].
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # --- Dashboard (PR-3i) ------------------------------------------------------------------------
    DashboardSnapshot:
      type: object
      required: [stats, recentOrders, todos]
      properties:
        stats:
          $ref: '#/components/schemas/DashboardStats'
        recentOrders:
          type: array
          items:
            $ref: '#/components/schemas/RecentOrder'
        todos:
          $ref: '#/components/schemas/DashboardTodos'

    DashboardStats:
      type: object
      required: [newOrdersToday, revenueToday, printing, reviewsWaiting]
      properties:
        newOrdersToday:
          type: integer
        revenueToday:
          type: integer
          format: int64
          description: Net revenue (int VND) for the Asia/Ho_Chi_Minh day (spec §04).
        printing:
          type: integer
        reviewsWaiting:
          type: integer

    RecentOrder:
      type: object
      required: [id, code, customerName, status, total, createdAt]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        customerName:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        total:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time

    DashboardTodos:
      type: object
      required: [pendingConfirm, paidWaitingPrint]
      properties:
        pendingConfirm:
          type: integer
        paidWaitingPrint:
          type: integer

    # --- Admin orders list (P3-b) -----------------------------------------------------------------
    AdminOrderSummary:
      type: object
      description: >
        One order row in the admin orders table (P3-b). The INTERNAL admin projection — unlike the public
        PublicOrderTimeline it carries the customer name, the channel and the total. firstItemName +
        itemCount back the "sản phẩm" column (the client renders e.g. "Đèn Mochi +1" when itemCount > 1);
        total is raw int-VND (never formatted server-side, always-must #2).
      required: [id, code, customerName, firstItemName, itemCount, channel, status, total, createdAt]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        customerName:
          type: string
        firstItemName:
          type: string
          description: Product name of the order's first line item — the "sản phẩm" column anchor.
        itemCount:
          type: integer
          description: Number of line items on the order; the client renders "+N" (itemCount − 1) when > 1.
        channel:
          $ref: '#/components/schemas/Channel'
        status:
          $ref: '#/components/schemas/OrderStatus'
        total:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time

    AdminOrderList:
      type: object
      description: >
        One page of admin order summaries plus the pagination envelope. `total` is the count of orders
        matching the status filter across all pages; the client derives the page count.
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminOrderSummary'
        page:
          type: integer
          description: 1-based page number echoed from the request.
        pageSize:
          type: integer
          description: Items per page echoed from the request.
        total:
          type: integer
          description: Total orders matching the status filter, across all pages.

    PrintQueueJob:
      type: object
      description: >
        One enriched print-queue card (P3-f), returned by GET /admin/print-queue and the stage PATCH.
        The bare print_jobs row (spec §02: orderItemRef · stage · printer · colorName · eta) joined to
        the order code, product name and quantity so a card at the printer says WHAT to make for WHICH
        order. colorName/printer/eta are optional (nullable columns). Stage is a PrintStage enum the
        client maps to the kanban column label (always-must #3).
      required: [id, stage, orderCode, productName, quantity]
      properties:
        id:
          type: string
          format: uuid
        stage:
          $ref: '#/components/schemas/PrintStage'
        orderCode:
          type: string
          description: Display code of the owning order (e.g. #LMN-2261) — the card's "which order" anchor.
        productName:
          type: string
          description: Product name of the print job's order line — what to make.
        quantity:
          type: integer
          description: Quantity of the order line (the card renders "×N").
        colorName:
          type: string
          description: Denormalized color name for the queue card (spec colorName); absent if the line has no color.
        printer:
          type: string
          description: Assigned printer, when staff have set one.
        eta:
          type: string
          format: date-time
          description: Estimated handoff, when set.

    PrintStageUpdate:
      type: object
      description: PATCH body for /admin/print-jobs/{id} — the target print stage (staff drag-drop).
      required: [stage]
      properties:
        stage:
          $ref: '#/components/schemas/PrintStage'

    # --- Public guest order lookup (P1-n) ---------------------------------------------------------
    PublicOrderTimeline:
      type: object
      description: >
        The guest-facing order timeline returned by GET /orders/lookup. It is a SEPARATE schema from
        Order (never a $ref) and exposes ONLY what a customer who already knows their code + phone may
        see: the code they typed, the current status, a status→time milestone list, an optional carrier
        tracking code, and the creation instant. It deliberately OMITS every internal field — customer
        PII, shipping address, line items, money (subtotal/shippingFee/total/unitPrice), payment/refund
        proof URLs, the internal note, the order uuid, the channel, and the statusHistory actor (byUser)
        + reason (ADR-032 non-leak).
      required: [code, status, milestones, createdAt]
      properties:
        code:
          type: string
          description: The human order code the guest supplied (e.g. "#LMN-1000").
        status:
          $ref: '#/components/schemas/OrderStatus'
        milestones:
          type: array
          description: >
            Reached statuses with the instant each was entered, oldest-first — the progress milestones
            plus any CANCELLED/REFUNDED close state. The frontend (P1-o) renders labels and shows the
            close states apart from the 5-step progress track (spec §04).
          items:
            $ref: '#/components/schemas/OrderMilestone'
        trackingCode:
          type: string
          description: Carrier waybill, present only from SHIPPING onward (spec §04). Omitted before then.
        createdAt:
          type: string
          format: date-time

    OrderMilestone:
      type: object
      description: >
        One reached order status with the instant it was entered — a whitelist projection of a
        statusHistory event that drops the actor (byUser), reason, and proof fields (ADR-032 non-leak).
      required: [status, at]
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'
        at:
          type: string
          format: date-time

    # --- Errors -----------------------------------------------------------------------------------
    ErrorEnvelope:
      type: object
      description: >
        The one error shape every endpoint returns (ADR-032). `code` is a stable machine code
        (e.g. NOT_FOUND, INVALID_EDGE, RBAC, REASON_REQUIRED, VALIDATION); `messageKey` is a next-intl
        key (the domain's Vietnamese prose is NEVER forwarded). `fields` maps a field path → messageKey
        for per-field validation errors.
      required: [code, messageKey]
      properties:
        code:
          type: string
        messageKey:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
