          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReplyTemplate'
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [admin]
      operationId: createReplyTemplate
      summary: Create an extension reply template (owner-only).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplyTemplateInput'
      responses:
        '201':
          description: The created template.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyTemplate'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/reply-templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [admin]
      operationId: updateReplyTemplate
      summary: Replace an extension reply template (owner-only).
      security:
        - cookieAuth: []
