        (cookieAuth; owner AND staff read — mirrors the product reads). Unknown product id → 404.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: The product's asset jobs (newest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetJob'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [admin]
      operationId: createProductAssetJob
      summary: Enqueue a render/ingest job from an uploaded source model (owner-only).
      description: >
        Enqueues one asset job (`model_ingest` or `sprite_render`) for a product from a model already
        uploaded via POST /admin/products/{id}/model-upload (owner-only — spec §08). The `sourceModelUrl`
        MUST be a host-pinned URL this server minted (else 400); `sourceVersion` is the content hash of
        the uploaded object (ADR-004 — Garage has no versioning). The job is created `queued` and its
        `asset_job.created` event is enqueued on the same tx (publish-on-commit, ADR-006); the slice-3
        worker drains it and later writes the rendered outputs onto the product. Unknown product id → 404.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetJobInput'
      responses:
        '201':
          description: The queued asset job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetJob'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /internal/asset-jobs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [internal]
      operationId: reportAssetJobResult
      summary: Asset-worker render callback — report a job's lifecycle result (service-auth).
      description: >
        The in-cluster asset-worker calls this to report an AssetJob's progress/result (ADR-045). It is
        the OUTPUT half of the pipeline: the worker drains `asset_job.created` off the JetStream
        WorkQueue, renders/ingests, then reports `processing` → `ready` (with the derivative `model3dUrl`
        for a `model_ingest` job) or `failed` (with `lastError`). On a `ready` `model_ingest` the server
        writes the LOD `model3d_url` onto the product (D3) — the ONE writer of that column.

        Auth is `serviceAuth` (a static worker bearer), NOT a user session — the worker has no identity.
        Idempotent + at-least-once safe: `ready` is terminal + sticky, so a redelivered callback returns
        the job unchanged and never clobbers the stored result. `model3dUrl`, when present, MUST be a URL
        under this store's assets origin (a stored content-injection guard — it becomes a client-side
        `<model-viewer src>`); a `ready` `model_ingest` with no `model3dUrl` is a 400. Unknown job → 404.
      security:
        - serviceAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetJobResultInput'
      responses:
        '200':
          description: The updated asset job (or the unchanged job when it was already `ready`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetJob'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

