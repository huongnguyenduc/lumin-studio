# Lumin Studio — core-api wire contract (single hand-authored source of truth, ADR-031).
#
# This file is THE contract: oapi-codegen (Go, strict-server) + openapi-typescript/openapi-fetch
# (TS, packages/api-client) are both generated FROM it (wiring lands in PR-3c-2). Hand-edit here;
# never hand-edit generated code. The enum sets below are kept byte-identical to four other sources
# — internal/order constants, packages/core Zod, and the Postgres native enums — by the 4-way parity
# test (internal/contract/parity_test.go); change an enum here and that test (in `make verify-go`)
# fails until all four agree.
#
# Scope = slice-3 surfaces + Phase-1 storefront catalog reads (ADR-003/031) + the public guest order
# lookup (P1-n: GET /orders/lookup — code + phone → a minimal, non-leaking timeline). Phase-1 opens the
# public catalog GETs (P1-a: GET /products/{slug} detail — product + colors + options); checkout, payment,
# and address (POST /orders / QR / receipt) stay OUT (Phase-2). Money crosses the wire as int VND
# (`integer, format: int64`) — the single display formatter stays in packages/core (no Go formatVnd;
# ADR-031/§6 D6). Property names are camelCase (matches sqlc json_tags_case_style:camel + hand DTOs).
openapi: 3.0.3

info:
  title: Lumin Studio Core API
  version: 0.7.0
  description: >
    Made-to-order 3D-print lighting/decor shop. One order state machine behind four surfaces
    (storefront · admin · admin-mobile · extension). This contract covers the slice-3 HTTP surface:
    self-issued auth, order intake + transitions, the admin dashboard aggregate, and the owner-only
    settings/STK + reply-template reads. The SERVER is authoritative for money and state — clients
    never send `total`/`subtotal`/`unitPrice` and never self-transition. Phase-1 layers on the public
    storefront catalog reads (product detail, active-only).

servers:
  - url: /
    description: core-api is mounted at the root (behind the Cloudflare Tunnel edge).

tags:
  - name: auth
    description: Self-issued email+password login → JWT in an httpOnly cookie (ADR-030).
  - name: orders
    description: >
      Order intake (web public · inbox staff-gated), RBAC-gated transitions, and the public guest
      order lookup (no auth — gated by a constant-time code+phone match + a per-code rate-limit/lockout).
  - name: admin
    description: Admin-gated reads + owner-only money-out config (RBAC, ADR-010/012).
  - name: catalog
    description: Public storefront catalog reads (product detail; active-only). No auth (Phase-1).

paths:
  /auth/login:
    post:
      tags: [auth]
      operationId: loginUser
      summary: Email + password login; sets the session cookie on success.
      description: >
        Verifies the credential (bcrypt, constant-time) and, on success, mints a signed JWT set as an
        httpOnly+Secure+SameSite cookie. A uniform error is returned for both unknown email and bad
        password (no user enumeration). The cookie — not the body — carries the token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated. The session cookie is set via Set-Cookie.
          headers:
            Set-Cookie:
              description: Signed JWT in an httpOnly + Secure + SameSite=Strict session cookie (the token is not in the body).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [auth]
      operationId: logoutUser
      summary: Clear the session cookie.
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Session cookie cleared.
          headers:
            Set-Cookie:
              description: Expires the session cookie immediately (logout).
              schema:
                type: string
        '401': { $ref: '#/components/responses/Unauthorized' }

  /customer/register:
    post:
      tags: [customer]
      operationId: registerCustomer
      summary: Register a storefront customer account; sets the customer session cookie on success.
      description: >
        Creates a customer account (name + phone + email + password) in the SEPARATE storefront realm
        (ADR-030) and logs it in immediately by setting a signed JWT in an httpOnly+Secure+SameSite
        customer cookie (distinct secret + name from the admin session — the token is not in the body).
        A login email already registered returns 409 (the only field the client may safely surface).
        Totals/orders are unrelated; guest orders placed before registering are NOT auto-linked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRegisterInput'
      responses:
        '201':
          description: Account created and logged in. The customer session cookie is set via Set-Cookie.
          headers:
            Set-Cookie:
              description: Signed JWT in an httpOnly + Secure + SameSite=Strict customer session cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAccount'
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /customer/login:
    post:
      tags: [customer]
      operationId: loginCustomer
      summary: Email + password login for a storefront customer; sets the customer session cookie.
      description: >
        Verifies the credential (bcrypt, constant-time) against the customer realm and, on success,
        mints a signed JWT set as the httpOnly+Secure customer cookie. A uniform error is returned for
        both unknown email and bad password (no enumeration). The cookie — not the body — carries the token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated. The customer session cookie is set via Set-Cookie.
          headers:
            Set-Cookie:
              description: Signed JWT in an httpOnly + Secure + SameSite=Strict customer session cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAccount'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /customer/logout:
    post:
      tags: [customer]
      operationId: logoutCustomer
      summary: Clear the customer session cookie.
      responses:
        '204':
          description: Customer session cookie cleared.
          headers:
            Set-Cookie:
              description: Expires the customer session cookie immediately (logout).
              schema:
                type: string

  /customer/orders:
    get:
      tags: [customer]
      operationId: getCustomerOrders
      summary: The authenticated customer's own order history (timeline projection).
      description: >
        Returns the signed-in customer's orders, newest-first, as the SAME public timeline projection
        the guest lookup returns (code + status + milestones + tracking; never internal money/PII/address
        fields). Scoped strictly by the verified session's customer id. Requires a valid customer session
        (401 otherwise) — the admin cookie does not grant it (separate realm, ADR-030).
      security:
        - customerAuth: []
      responses:
        '200':
          description: The customer's orders, newest-first (possibly empty).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerOrderList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /orders:
    post:
      tags: [orders]
      operationId: createOrder
      summary: Create an order (web → PENDING_CONFIRM, public; inbox → PAID, staff/owner only).
      description: >
        Runs behind optional-auth: `channel=web` is public and creates a PENDING_CONFIRM order from a
        validated `paymentProofUrl`; `channel=inbox` mints a born-PAID order with no payment record and
        therefore REQUIRES a resolved staff/owner actor (rejected 403 otherwise — conventions §17,
        ADR-012). Totals are computed server-side; any client `total`/`subtotal`/`unitPrice` is rejected.
      security:
        - {}
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderInput'
      responses:
        '201':
          description: Order created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /orders/{id}/transitions:
    post:
      tags: [orders]
      operationId: transitionOrder
      summary: Advance an order's status (RBAC-gated; reconcile→PAID and →REFUNDED are owner-only).
      description: >
        Applies one OrderStatus transition through the domain guard. The reconcile edge
        PENDING_CONFIRM→PAID is dispatched to ConfirmPaymentTx (the only `order.paid` emitter); every
        other edge goes through AdvanceStatusTx. `reason` is required for CANCELLED/REFUNDED;
        `refundProofUrl` for REFUNDED; `trackingCode` for →SHIPPING. Actor/role/timestamp come from the
        auth context + server clock, never the body.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionRequest'
      responses:
        '200':
          description: Transition applied; the updated order is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /orders/lookup:
    get:
      tags: [orders]
      operationId: lookupOrder
      summary: Public guest order lookup by code + phone — a minimal, non-leaking timeline.
      description: >
        Public order tracking for a guest who has no account (no auth). BOTH the order code AND the
        phone used on the order must match; an unknown code and a phone mismatch return the SAME 404
        NOT_FOUND (no order-existence enumeration). The phone is compared in constant time and a
        per-code token-bucket + lockout guards against brute-forcing the phone for a known code
        (conventions §Bảo mật; the Cloudflare WAF is the per-IP layer). Returns a deliberately minimal
        PublicOrderTimeline — NEVER the internal Order: no customer PII, address, line items, money,
        payment/refund proof, internal note, or the statusHistory actor/reason fields (ADR-032). The
        `phone` param carries NO schema pattern on purpose — a malformed phone must funnel to the same
        404, never a 400 (which would be an enumeration signal).
      parameters:
        - name: code
          in: query
          required: true
          description: The order code shown at checkout (e.g. "#LMN-1000").
          schema:
            type: string
        - name: phone
          in: query
          required: true
          description: >
            The phone number used on the order. No format constraint — a mismatch (or malformed value)
            returns the uniform 404, never a 400.
          schema:
            type: string
      responses:
        '200':
          description: The code + phone matched; the public order timeline is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicOrderTimeline'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /products:
    get:
      tags: [catalog]
      operationId: getProducts
      summary: Public storefront catalog list (active-only) — paginated card projection.
      description: >
        Public catalog list (no auth). Returns ACTIVE products only as a lightweight card projection
        (no colors/options/description body → no N+1), paginated and sortable, optionally filtered by
        category slug. Draft/archived products are NEVER listed (no catalog-existence leak, matching the
        detail read). Money (basePrice) is raw int-VND; the client formats via @lumin/core (always-must
        #2). The response carries a weak ETag + a provisional Cache-Control (the storefront ISR/purge
        strategy is finalized with the frontend PR, P1-f); a matching If-None-Match returns 304. The `q`
        full-text parameter (P1-e, ADR-016) filters by an accent-insensitive search over the product
        name/description ("den" matches "đèn"); it is ANDed inside the active-only scope so it never surfaces
        a hidden product, and the sort/pagination are unchanged (no relevance ranking — small catalog).
      parameters:
        - name: category
          in: query
          required: false
          description: Filter by category slug (spec §02). An unknown slug yields an empty page, not a 404.
          schema:
            type: string
        - name: sort
          in: query
          required: false
          description: Sort order. Default `newest` (created_at desc, id desc tiebreak for stable paging).
          schema:
            type: string
            enum: [newest, price_asc, price_desc, rating]
            default: newest
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Items per page. Capped at 48 to bound the query on this public, unauthenticated endpoint.
          schema:
            type: integer
            minimum: 1
            maximum: 48
            default: 12
        - name: q
          in: query
          required: false
          description: >
            Full-text search term (accent-insensitive, ADR-016) over the product name/description. Filters
            within the active-only + category scope; an empty/whitespace value means "no search" (the full
            catalog). Bounded to 100 characters on this public endpoint (over-length → 400).
          schema:
            type: string
            maxLength: 100
        - name: If-None-Match
          in: header
          required: false
          description: Conditional GET — when it matches the current ETag the server returns 304 with no body.
          schema:
            type: string
      responses:
        '200':
          description: A page of active product cards.
          headers:
            ETag:
              description: Weak validator over the response body; echo it in If-None-Match to revalidate.
              schema:
                type: string
            Cache-Control:
              description: Public cache directive (provisional — the ISR/purge strategy is finalized in P1-f).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'
        '304':
          description: Not Modified — the client's If-None-Match matched the current ETag.
          headers:
            ETag:
              description: The current weak validator (unchanged).
              schema:
                type: string
            Cache-Control:
              description: Public cache directive (provisional — finalized in P1-f).
              schema:
                type: string
        '400': { $ref: '#/components/responses/BadRequest' }

  /products/{slug}:
    get:
      tags: [catalog]
      operationId: getProductBySlug
      summary: Public storefront product detail (active-only) — product + colors + options.
      description: >
        Public catalog read (no auth). Returns the ACTIVE product for the slug, bundled with its named
        print colors and customization options. A draft/archived product OR an unknown slug both return
        404 NOT_FOUND — the public surface must not distinguish a hidden product from a missing one (no
        catalog-existence leak). Money fields (basePrice, colors[].priceDelta, options[].priceDelta) are
        raw int-VND; the client formats via @lumin/core (always-must #2). No productType in Phase 1
        (D-P1-1; Pet Tag activation lands later with its own migration + parity update).
      parameters:
        - name: slug
          in: path
          required: true
          description: URL slug of the product (spec §02, unique).
          schema:
            type: string
      responses:
        '200':
          description: The active product with its colors and options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404': { $ref: '#/components/responses/NotFound' }

  /products/{slug}/reviews:
    get:
      tags: [catalog]
      operationId: getProductReviews
      summary: Public storefront product reviews (published-only) — paginated, newest first.
      description: >
        Public review list (no auth) for a product, newest first, paginated. Returns ONLY published
        reviews — the status='published' filter lives at the SQL source, so a moderated-away (hidden)
        review can NEVER leak (the same non-leak stance as the active-only product reads). An unknown
        slug OR a draft/archived product both return 404 NOT_FOUND, identical to the detail read (no
        catalog-existence probe). The reviewer's identity is deliberately NOT exposed (PDPL — reviews
        carry a nullable customer_id and guests may review; no public PII), so only the review content
        crosses the wire. The response carries a weak ETag + a provisional Cache-Control (the storefront
        ISR/purge strategy is finalized with the frontend PR, P1-f), consistent with the /products list;
        a matching If-None-Match returns 304 with no body. No sort param in Phase 1 (newest first only;
        an additive `sort` is a later PR if the reviews section design needs it).
      parameters:
        - name: slug
          in: path
          required: true
          description: URL slug of the product (spec §02, unique).
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Items per page. Capped at 48 to bound the query on this public, unauthenticated endpoint.
          schema:
            type: integer
            minimum: 1
            maximum: 48
            default: 12
        - name: If-None-Match
          in: header
          required: false
          description: Conditional GET — when it matches the current ETag the server returns 304 with no body.
          schema:
            type: string
      responses:
        '200':
          description: A page of published reviews for the product (newest first).
          headers:
            ETag:
              description: Weak validator over the response body; echo it in If-None-Match to revalidate.
              schema:
                type: string
            Cache-Control:
              description: Public cache directive (provisional — the ISR/purge strategy is finalized in P1-f).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewList'
        '304':
          description: Not Modified — the client's If-None-Match matched the current ETag.
          headers:
            ETag:
              description: The current weak validator (unchanged).
              schema:
                type: string
            Cache-Control:
              description: Public cache directive (provisional — finalized in P1-f).
              schema:
                type: string
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /categories:
    get:
      tags: [catalog]
      operationId: getCategories
      summary: Public storefront category list — the browsable taxonomy for the catalog-browse chips.
      description: >
        Public category list (no auth). Returns the BROWSABLE category taxonomy (spec §02) A→Z — only
        categories that contain at least one ACTIVE product. Categories inherit visibility transitively
        through their products, so a category whose only products are draft/archived is NOT listed (no
        dead-end chip, and no leak of an unreleased category name — the same non-leak stance as the product
        reads). It is a small, admin-curated set, so there is no filter or pagination. When no category is
        browsable the response is an empty array `[]`, NEVER a 404. The response carries a weak ETag + a
        provisional Cache-Control (the storefront ISR/purge strategy is finalized with the frontend PR,
        P1-f), consistent with the /products list; a matching If-None-Match returns 304 with no body.
      parameters:
        - name: If-None-Match
          in: header
          required: false
          description: Conditional GET — when it matches the current ETag the server returns 304 with no body.
          schema:
            type: string
      responses:
        '200':
          description: The full category taxonomy (may be empty).
          headers:
            ETag:
              description: Weak validator over the response body; echo it in If-None-Match to revalidate.
              schema:
                type: string
            Cache-Control:
              description: Public cache directive (provisional — the ISR/purge strategy is finalized in P1-f).
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '304':
          description: Not Modified — the client's If-None-Match matched the current ETag.
          headers:
            ETag:
              description: The current weak validator (unchanged).
              schema:
                type: string
            Cache-Control:
              description: Public cache directive (provisional — finalized in P1-f).
              schema:
                type: string

  /price/quote:
    post:
      tags: [catalog]
      operationId: quotePrice
      summary: Server-authoritative line/subtotal quote for a selection (no shipping/address).
      description: >
        Public storefront pricing (no auth). Re-derives each line's unitPrice from the catalog via the
        same authority gate as checkout — never trusts a client price (always-must #2). Returns per-line
        unitPrice + lineTotal and the subtotal ONLY: no shipping, address, or tax (those enter at order
        creation, Phase 2). A non-active or unknown product is 422 PRODUCT_UNAVAILABLE (no catalog-existence
        leak, matching checkout). Engrave maxChars is enforced server-side by rune count. All money is raw
        int-VND; the client formats via @lumin/core. The request reuses OrderItemInput, which has no price
        field, so a client cannot declare a price (schema-level guarantee; unlike checkout this endpoint
        persists nothing and its response IS the authoritative price, so no loud money-key reject is needed).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceQuoteInput'
      responses:
        '200':
          description: The computed line prices and subtotal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceQuote'
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /admin/dashboard:
    get:
      tags: [admin]
      operationId: getDashboard
      summary: Admin dashboard aggregates (counts + net revenue + recent orders + todos).
      description: >
        Returns raw int-VND amounts, counts, and OrderStatus enums — no server-formatted money, no
        translated labels (label keys stay i18n, resolved client-side). Net revenue follows spec §04
        (PAID/PRINTING/SHIPPING/COMPLETED minus REFUNDED, scoped to the Asia/Ho_Chi_Minh day).
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Dashboard snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSnapshot'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/settings:
    get:
      tags: [admin]
      operationId: getSettings
      summary: Read the settings singleton (admin-gated).
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/settings/bank-account:
    patch:
      tags: [admin]
      operationId: updateBankAccount
      summary: Change the VietQR STK (owner-only; persisted with an append-only audit row).
      description: >
        Owner-only (requireOwner). Updates `settings.bank_account` AND appends a setting_bank_audit row
        in one transaction (UpdateBankAccountTx) — an STK change can never land without its audit trail
        (conventions §57).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountUpdate'
      responses:
        '200':
          description: Updated settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/reply-templates:
    get:
      tags: [admin]
      operationId: listReplyTemplates
      summary: List the extension reply templates (admin-gated read).
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Reply templates, ordered by title.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReplyTemplate'
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: lumin_session
      description: Signed JWT in an httpOnly+Secure cookie (ADR-030; cookie name finalized in PR-3e-1).
    customerAuth:
      type: apiKey
      in: cookie
      name: lumin_customer
      description: >
        Storefront customer session JWT in an httpOnly+Secure cookie (PR-P1-r). SEPARATE realm from
        cookieAuth — signed with a different secret, so an admin token can never authenticate here.

  responses:
    BadRequest:
      description: Malformed request (bad JSON, missing/invalid field).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated but not allowed (RBAC).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Invalid state transition (edge not allowed from the current status).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unprocessable:
      description: Semantically invalid (e.g. missing reason/refund-proof/tracking-code, empty cart).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: >
        Rate limit or lockout tripped (RATE_LIMITED) — too many lookup attempts for this order code.
        The client should back off (P1-o auto-poll respects this). No Retry-After is exposed so the
        exact lockout window is not leaked.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    # --- Enums (byte-identical across OpenAPI · internal/order · packages/core Zod · Postgres) -----
    OrderStatus:
      type: string
      description: Order lifecycle status (spec §04). 5 progress milestones + 2 close states.
      enum:
        - PENDING_CONFIRM
        - PAID
        - PRINTING
        - SHIPPING
        - COMPLETED
        - CANCELLED
        - REFUNDED

    Channel:
      type: string
      description: Order origin (spec §04).
      enum:
        - web
        - inbox

    Role:
      type: string
      description: >
        Actor role for a transition (spec §08). `system` is a runtime-only actor (e.g. delivery
        auto-complete) — it is NEVER a stored user role; see UserRole.
      enum:
        - owner
        - staff
        - system

    UserRole:
      type: string
      description: >
        Stored user role (Postgres `user_role`). The subset of Role that a logged-in user can hold —
        `system` is excluded (a runtime actor, never persisted).
      enum:
        - owner
        - staff

    # --- Catalog (Phase-1 storefront reads) -------------------------------------------------------
    # ProductStatus / OptionType are kept byte-identical to the Postgres native enums (product_status /
    # option_type, migration 000001) by internal/contract/parity_test.go — change one here and the
    # parity test (in `make verify-go`) fails until they agree. `material` is deliberately NOT an enum:
    # spec §02 leaves it open-ended (PLA · PETG · recycled-PLA …) so it is TEXT+CHECK, not a wire enum
    # (ADR-028).
    ProductStatus:
      type: string
      description: Product lifecycle (spec §02, Postgres `product_status`). The detail read returns `active` only.
      enum:
        - active
        - draft
        - archived

    OptionType:
      type: string
      description: Customization option kind (spec §02, Postgres `option_type`). `text` carries an engraving char limit (maxChars).
      enum:
        - text
        - choice

    Dimensions:
      type: object
      description: Product bounding size in millimetres (spec §02; displayed "180 × 180 × 240 mm").
      required: [w, d, h]
      properties:
        w:
          type: integer
          description: Width in mm.
        d:
          type: integer
          description: Depth in mm.
        h:
          type: integer
          description: Height in mm.

    Color:
      type: object
      description: A named print colour for a product (spec §02). priceDelta is int-VND (may be 0).
      required: [id, name, hex, available, priceDelta]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Display name, e.g. "Kem sữa".
        hex:
          type: string
          description: Swatch colour as a hex string.
        available:
          type: boolean
          description: Whether the filament is currently in stock.
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0).

    Option:
      type: object
      description: 'A customization option (spec §02). type: text carries an engraving char limit (maxChars).'
      required: [id, label, description, type, priceDelta]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        description:
          type: string
        type:
          $ref: '#/components/schemas/OptionType'
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0).
        maxChars:
          type: integer
          nullable: true
          description: Engraving character limit; null unless a limit applies.

    Product:
      type: object
      description: >
        Storefront product detail (spec §02). Money fields (basePrice, colors[].priceDelta,
        options[].priceDelta) are raw int-VND — the client formats via @lumin/core (always-must #2).
        images[0] is the card cover (sprite-first, ADR-007). No productType in Phase 1 (D-P1-1).
      required:
        - id
        - slug
        - name
        - description
        - categoryId
        - basePrice
        - dimensions
        - material
        - model3dUrl
        - images
        - colors
        - options
        - status
        - reviewCount
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Unique URL slug (spec §02).
        name:
          type: string
        description:
          type: string
          description: Markdown stored as text (spec §02 richtext).
        categoryId:
          type: string
          format: uuid
        basePrice:
          type: integer
          format: int64
          description: Starting price in int-VND (>= 0); options may add to it.
        dimensions:
          $ref: '#/components/schemas/Dimensions'
        material:
          type: string
          description: Print material (spec §02; open-ended TEXT+CHECK, ADR-028 — not a wire enum).
        model3dUrl:
          type: string
          description: .glb URL for the on-demand model viewer; empty string when none.
        images:
          type: array
          description: Shop photos; images[0] is the card cover (sprite-first, ADR-007). May be empty.
          items:
            type: string
            format: uri
        colors:
          type: array
          items:
            $ref: '#/components/schemas/Color'
        options:
          type: array
          items:
            $ref: '#/components/schemas/Option'
        status:
          $ref: '#/components/schemas/ProductStatus'
        ratingAvg:
          type: number
          format: float
          nullable: true
          description: Denormalized average rating; null until the first review.
        reviewCount:
          type: integer
          description: Denormalized review count (spec §02).
        createdAt:
          type: string
          format: date-time

    ProductCard:
      type: object
      description: >
        Lightweight catalog-list projection of a product (spec §02) — the fields a grid card needs, WITHOUT
        colors/options/description body (the list avoids the per-product reads the detail read makes → no
        N+1). basePrice is raw int-VND; images[0] is the card cover (sprite-first, ADR-007). Only ACTIVE
        products are ever listed, so status is implied and omitted.
      required:
        - id
        - slug
        - name
        - basePrice
        - categoryId
        - images
        - reviewCount
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Unique URL slug (spec §02).
        name:
          type: string
        basePrice:
          type: integer
          format: int64
          description: Starting price in int-VND (>= 0).
        categoryId:
          type: string
          format: uuid
        images:
          type: array
          description: Shop photos; images[0] is the card cover (ADR-007). May be empty.
          items:
            type: string
            format: uri
        ratingAvg:
          type: number
          format: float
          nullable: true
          description: Denormalized average rating; null until the first review.
        reviewCount:
          type: integer
          description: Denormalized review count (spec §02).

    ProductList:
      type: object
      description: >
        One page of catalog cards plus the pagination envelope (spec §03 list state). `total` is the count
        of active products matching the filter across all pages; the client derives the page count.
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductCard'
        page:
          type: integer
          description: 1-based page number echoed from the request.
        pageSize:
          type: integer
          description: Items per page echoed from the request.
        total:
          type: integer
          description: Total active products matching the filter, across all pages.

    Review:
      type: object
      description: >
        One PUBLISHED product review as it crosses the public wire (spec §02). The author's identity is
        deliberately omitted — reviews carry a nullable customer_id and guests may review, so exposing a
        reviewer name would be public PII (PDPL); only the review content is returned. `reply` is the
        shop's public reply, null until the shop replies (no Phase-1 write path populates it yet). Hidden
        reviews are filtered at the SQL source and never appear here.
      required: [id, rating, body, images, createdAt]
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Star rating 1–5 (spec §02).
        body:
          type: string
          description: The review text (may be empty).
        images:
          type: array
          description: Reviewer photos (spec §02). May be empty.
          items:
            type: string
            format: uri
        reply:
          nullable: true
          description: The shop's public reply, or null until the shop has replied.
          allOf:
            - $ref: '#/components/schemas/ReviewReply'
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 UTC when the review was posted.

    ReviewReply:
      type: object
      description: The shop's public reply to a review (spec §02 `reply?`). Null on the parent until replied.
      required: [body, at]
      properties:
        body:
          type: string
          description: The shop reply text.
        at:
          type: string
          format: date-time
          description: ISO-8601 UTC when the reply was posted.

    ReviewList:
      type: object
      description: >
        One page of published reviews plus the pagination envelope (spec §03 list state). `total` is the
        count of PUBLISHED reviews for the product across all pages; the client derives the page count.
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        page:
          type: integer
          description: 1-based page number echoed from the request.
        pageSize:
          type: integer
          description: Items per page echoed from the request.
        total:
          type: integer
          description: Total published reviews for the product, across all pages.

    Category:
      type: object
      description: >
        A catalog category (spec §02) — the taxonomy a product belongs to (Product.categoryId references
        Category.id) and the storefront browse chips render. No visibility axis: every category is public.
      required: [id, slug, name]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Unique URL slug — the value passed to GET /products?category={slug}.
        name:
          type: string
          description: Human-friendly display name (sentence case).

    # --- Value objects ----------------------------------------------------------------------------
    StatusEvent:
      type: object
      description: One appended statusHistory record (spec §02/§04). `from` is null only at creation.
      required: [from, to, at, byUser]
      properties:
        from:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/OrderStatus'
        to:
          $ref: '#/components/schemas/OrderStatus'
        at:
          type: string
          format: date-time
          description: ISO-8601 UTC, trailing Z (e.g. 2026-06-25T00:00:00.000Z).
        byUser:
          type: string
          description: Actor — a `users.id` for staff/owner, the sentinel "customer" for guest web-create.
          minLength: 1
        reason:
          type: string
          description: Required when `to` is CANCELLED or REFUNDED.
        refundProofUrl:
          type: string
          format: uri
          description: Required when `to` is REFUNDED (transfer-back proof image).

    Address:
      type: object
      description: Vietnamese shipping address — no district level (ADR-017).
      required: [province, ward, street]
      properties:
        province: { type: string }
        ward: { type: string }
        street: { type: string }

    Personalization:
      type: object
      description: Per-item engraving (distinct from a Review's text — that field is `body`).
      required: [text, zoneId]
      properties:
        text:
          type: string
          minLength: 1
        zoneId:
          type: string
          minLength: 1

    Customer:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
        phone:
          type: string
          description: Vietnamese mobile — `0` or `+84` prefix + 9 digits.
          pattern: '^(0|\+84)\d{9}$'
        email:
          type: string
          format: email
        socialHandle:
          type: string

    OrderItem:
      type: object
      description: A priced line item as returned in an Order (unitPrice is server-derived).
      required: [productId, optionIds, quantity, unitPrice]
      properties:
        productId:
          type: string
          format: uuid
        colorId:
          type: string
          format: uuid
        optionIds:
          type: array
          items:
            type: string
            format: uuid
        personalization:
          $ref: '#/components/schemas/Personalization'
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: integer
          format: int64
          description: Server-derived int VND (base + color/option deltas). Never accepted from the client.

    OrderItemInput:
      type: object
      description: >
        A requested line item. Deliberately has NO unitPrice — the server re-derives every price from
        the catalog (always-must #2); a client price is never trusted.
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        colorId:
          type: string
          format: uuid
        optionIds:
          type: array
          items:
            type: string
            format: uuid
          default: []
        personalization:
          $ref: '#/components/schemas/Personalization'
        quantity:
          type: integer
          minimum: 1

    # --- Price quote (P1-b: server-authoritative pricing preview; no order, no persistence) -------
    PriceQuoteInput:
      type: object
      description: >
        One or more selections to price. Reuses OrderItemInput (which has NO unitPrice — the server
        re-derives every price from the catalog). Returns line/subtotal only; carries no address/shipping.
        Capped at 50 items: this is a public, unauthenticated read (no rate limit until the edge WAF),
        and each line costs a catalog round-trip, so the cap bounds the per-request work.
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: '#/components/schemas/OrderItemInput'

    PriceQuote:
      type: object
      description: >
        Server-computed line prices + subtotal (raw int-VND; no shipping/tax). `lines` is positionally
        aligned with the request `items` (same index) — a line carries no product reference, so a client
        maps a line back to its selection by array index.
      required: [lines, subtotal]
      properties:
        lines:
          type: array
          items:
            $ref: '#/components/schemas/PriceQuoteLine'
        subtotal:
          type: integer
          format: int64
          description: Sum of line totals, raw int VND. No shipping/tax (added at order creation, Phase 2).

    PriceQuoteLine:
      type: object
      description: >
        One priced line, positionally aligned with the request item at the same index. Carries the
        server-derived unit price, its quantity, and the line total — no product ref (map back by index).
      required: [unitPrice, quantity, lineTotal]
      properties:
        unitPrice:
          type: integer
          format: int64
          description: Server-derived int VND (base + color delta + Σ option deltas). Never accepted from the client.
        quantity:
          type: integer
          minimum: 1
        lineTotal:
          type: integer
          format: int64
          description: unitPrice × quantity, overflow-checked server-side.

    # --- Order DTO (nested; assembled by handlers — NOT the flat sqlc row) ------------------------
    Order:
      type: object
      required:
        - id
        - code
        - channel
        - status
        - customer
        - shippingAddress
        - items
        - subtotal
        - shippingFee
        - total
        - statusHistory
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          description: Human order code, e.g. #LMN-0042.
        channel:
          $ref: '#/components/schemas/Channel'
        status:
          $ref: '#/components/schemas/OrderStatus'
        customer:
          $ref: '#/components/schemas/Customer'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'
        subtotal:
          type: integer
          format: int64
        shippingFee:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        paymentProofUrl:
          type: string
          format: uri
        paymentConfirmedAt:
          type: string
          format: date-time
        refundProofUrl:
          type: string
          format: uri
        trackingCode:
          type: string
        note:
          type: string
        statusHistory:
          type: array
          items:
            $ref: '#/components/schemas/StatusEvent'
        createdAt:
          type: string
          format: date-time

    # --- Inputs -----------------------------------------------------------------------------------
    CreateOrderInput:
      description: >
        Order intake, discriminated on `channel`: `web` (public → PENDING_CONFIRM) vs `inbox`
        (staff/owner-only → PAID). This is a NAMED schema, not an inline oneOf, so oapi-codegen
        (strict-server) emits a usable discriminated union (AsCreateWebOrderInput /
        ValueByDiscriminator) instead of an opaque raw-message body the handler cannot read.
      oneOf:
        - $ref: '#/components/schemas/CreateWebOrderInput'
        - $ref: '#/components/schemas/CreateInboxOrderInput'
      discriminator:
        propertyName: channel
        mapping:
          web: '#/components/schemas/CreateWebOrderInput'
          inbox: '#/components/schemas/CreateInboxOrderInput'

    CreateWebOrderInput:
      type: object
      description: >
        Public web order → PENDING_CONFIRM. `paymentProofUrl` (the CK receipt image) is required.
        If any item carries `personalization`, both `personalizationAck` and `engraveEchoConfirmed`
        MUST be true (the no-return acknowledgement + engrave-echo step, ADR-012) — enforced server-side.
      required: [channel, customer, shippingAddress, items, paymentProofUrl]
      properties:
        channel:
          type: string
          enum: [web]
        customer:
          $ref: '#/components/schemas/Customer'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemInput'
        paymentProofUrl:
          type: string
          format: uri
        personalizationAck:
          type: boolean
        engraveEchoConfirmed:
          type: boolean

    CreateInboxOrderInput:
      type: object
      description: >
        Staff/owner-created inbox order → born PAID with no payment record (the staff already verified
        money landed, conventions §17). Requires a resolved staff/owner actor; no `paymentProofUrl`.
      required: [channel, customer, shippingAddress, items]
      properties:
        channel:
          type: string
          enum: [inbox]
        customer:
          $ref: '#/components/schemas/Customer'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemInput'
        note:
          type: string

    TransitionRequest:
      type: object
      description: >
        One requested status change. `reason` required for CANCELLED/REFUNDED; `refundProofUrl` for
        REFUNDED; `trackingCode` for →SHIPPING. Actor/role/time are NOT in the body (server-sourced).
      required: [to]
      properties:
        to:
          $ref: '#/components/schemas/OrderStatus'
        reason:
          type: string
        refundProofUrl:
          type: string
          format: uri
        trackingCode:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    AuthUser:
      type: object
      description: The authenticated user (no credential material).
      required: [id, name, email, role]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'

    # --- Storefront customer account (PR-P1-r) ----------------------------------------------------
    CustomerAccount:
      type: object
      description: >
        The authenticated storefront customer (no credential material). Distinct from AuthUser (admin):
        a customer has no role, and carries the phone captured at registration.
      required: [id, name, email, phone]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string

    CustomerRegisterInput:
      type: object
      description: New storefront account registration (ADR-030 realm riêng). Money/orders unrelated.
      required: [name, email, phone, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          description: Plaintext password; bcrypt-hashed server-side (never stored/returned in clear).

    CustomerOrderList:
      type: array
      description: >
        A customer's own orders, newest-first, each as the public timeline projection (the same shape
        the guest lookup returns) — deliberately NO internal money/PII/address fields (ADR-032). P1-s
        reuses the P1-o timeline renderer over this list.
      items:
        $ref: '#/components/schemas/PublicOrderTimeline'

    # --- Settings / STK (PR-3k) -------------------------------------------------------------------
    BankAccount:
      type: object
      description: VietQR STK the server renders the static QR from (conventions §57). May be unset.
      properties:
        bin:
          type: string
          description: Bank BIN (VietQR napas bank id).
        accountNumber:
          type: string
        accountName:
          type: string

    BankAccountUpdate:
      type: object
      description: Owner-only STK change (PATCH). `reason` is the optional audit note.
      required: [bin, accountNumber, accountName]
      properties:
        bin:
          type: string
        accountNumber:
          type: string
        accountName:
          type: string
        reason:
          type: string

    Settings:
      type: object
      description: >
        The settings singleton. `shopInfo` and `shippingRules` are free-form jsonb whose precise
        shapes are pinned in the Phase-1 storefront slice; typed loosely here on purpose.
      required: [bankAccount, refundPolicy, updatedAt]
      properties:
        shopInfo:
          type: object
          additionalProperties: true
        bankAccount:
          $ref: '#/components/schemas/BankAccount'
        shippingRules:
          type: array
          items:
            type: object
            additionalProperties: true
        refundPolicy:
          type: string
        updatedAt:
          type: string
          format: date-time

    ReplyTemplate:
      type: object
      description: An extension reply template (spec §02).
      required: [id, title, body, variables, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        variables:
          type: array
          items: { type: string }
          description: Placeholder tokens, e.g. ["{tên}", "{mã đơn}", "{STK}"].
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # --- Dashboard (PR-3i) ------------------------------------------------------------------------
    DashboardSnapshot:
      type: object
      required: [stats, recentOrders, todos]
      properties:
        stats:
          $ref: '#/components/schemas/DashboardStats'
        recentOrders:
          type: array
          items:
            $ref: '#/components/schemas/RecentOrder'
        todos:
          $ref: '#/components/schemas/DashboardTodos'

    DashboardStats:
      type: object
      required: [newOrdersToday, revenueToday, printing, reviewsWaiting]
      properties:
        newOrdersToday:
          type: integer
        revenueToday:
          type: integer
          format: int64
          description: Net revenue (int VND) for the Asia/Ho_Chi_Minh day (spec §04).
        printing:
          type: integer
        reviewsWaiting:
          type: integer

    RecentOrder:
      type: object
      required: [id, code, customerName, status, total, createdAt]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        customerName:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        total:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time

    DashboardTodos:
      type: object
      required: [pendingConfirm, paidWaitingPrint]
      properties:
        pendingConfirm:
          type: integer
        paidWaitingPrint:
          type: integer

    # --- Public guest order lookup (P1-n) ---------------------------------------------------------
    PublicOrderTimeline:
      type: object
      description: >
        The guest-facing order timeline returned by GET /orders/lookup. It is a SEPARATE schema from
        Order (never a $ref) and exposes ONLY what a customer who already knows their code + phone may
        see: the code they typed, the current status, a status→time milestone list, an optional carrier
        tracking code, and the creation instant. It deliberately OMITS every internal field — customer
        PII, shipping address, line items, money (subtotal/shippingFee/total/unitPrice), payment/refund
        proof URLs, the internal note, the order uuid, the channel, and the statusHistory actor (byUser)
        + reason (ADR-032 non-leak).
      required: [code, status, milestones, createdAt]
      properties:
        code:
          type: string
          description: The human order code the guest supplied (e.g. "#LMN-1000").
        status:
          $ref: '#/components/schemas/OrderStatus'
        milestones:
          type: array
          description: >
            Reached statuses with the instant each was entered, oldest-first — the progress milestones
            plus any CANCELLED/REFUNDED close state. The frontend (P1-o) renders labels and shows the
            close states apart from the 5-step progress track (spec §04).
          items:
            $ref: '#/components/schemas/OrderMilestone'
        trackingCode:
          type: string
          description: Carrier waybill, present only from SHIPPING onward (spec §04). Omitted before then.
        createdAt:
          type: string
          format: date-time

    OrderMilestone:
      type: object
      description: >
        One reached order status with the instant it was entered — a whitelist projection of a
        statusHistory event that drops the actor (byUser), reason, and proof fields (ADR-032 non-leak).
      required: [status, at]
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'
        at:
          type: string
          format: date-time

    # --- Errors -----------------------------------------------------------------------------------
    ErrorEnvelope:
      type: object
      description: >
        The one error shape every endpoint returns (ADR-032). `code` is a stable machine code
        (e.g. NOT_FOUND, INVALID_EDGE, RBAC, REASON_REQUIRED, VALIDATION); `messageKey` is a next-intl
        key (the domain's Vietnamese prose is NEVER forwarded). `fields` maps a field path → messageKey
        for per-field validation errors.
      required: [code, messageKey]
      properties:
        code:
          type: string
        messageKey:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
