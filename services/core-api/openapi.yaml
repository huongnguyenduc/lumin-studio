components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: lumin_session
      description: Signed JWT in an httpOnly+Secure cookie (ADR-030; cookie name finalized in PR-3e-1).
    customerAuth:
      type: apiKey
      in: cookie
      name: lumin_customer
      description: >
        Storefront customer session JWT in an httpOnly+Secure cookie (PR-P1-r). SEPARATE realm from
        cookieAuth — signed with a different secret, so an admin token can never authenticate here.
    serviceAuth:
      type: http
      scheme: bearer
      description: >
        Static shared-secret bearer for the in-cluster asset-worker's render callback (ADR-045). A
        THIRD realm, distinct from cookieAuth/customerAuth: it carries no user identity — it only
        proves the caller is the trusted worker. Compared in constant time; an unset secret rejects
        every request (fail-closed). Never a user credential, never issued to a browser.

  responses:
    BadRequest:
      description: Malformed request (bad JSON, missing/invalid field).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated but not allowed (RBAC).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Invalid state transition (edge not allowed from the current status).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unprocessable:
      description: Semantically invalid (e.g. missing reason/refund-proof/tracking-code, empty cart).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: >
        Rate limit tripped (RATE_LIMITED) — too many requests to a public guarded endpoint.
        The client should back off. No Retry-After is exposed so the exact limiter window is not leaked.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    # --- Enums (byte-identical across OpenAPI · internal/order · packages/core Zod · Postgres) -----
    OrderStatus:
      type: string
      description: Order lifecycle status (spec §04). 5 progress milestones + 2 close states.
      enum:
        - PENDING_CONFIRM
        - PAID
        - PRINTING
        - SHIPPING
        - COMPLETED
        - CANCELLED
        - REFUNDED

    PrintStage:
      type: string
      description: >
        Print queue stage (spec §02 PrintJob). STORED and staff-driven — finer-grained than OrderStatus
        (one PRINTING order spans the PRINTING + PACKING print stages) and advanced independently of it
        (D6): a stage move is NOT an OrderStatus transition. NFC_ENCODE (spec §10, "Ghi chip NFC") sits
        between PRINTING and PACKING and routes ONLY nfc_tag products (P3-t t-2) — a standard product's
        board path skips it. Order matches the Postgres enum so the client lays the columns out in order.
      enum:
        - NEED_PRINT
        - PRINTING
        - NFC_ENCODE
        - PACKING
        - SHIPPED

    ProductType:
      type: string
      description: >
        What kind of product a line is (spec §10). `standard` is every ordinary made-to-order item;
        `nfc_tag` is a Pet Tag NFC ring, which needs the extra NFC-encode print stage + a per-pet page.
        Carried on a print-queue card so the board can route nfc_tag cards through NFC_ENCODE.
      enum:
        - standard
        - nfc_tag

    PetTagStatus:
      type: string
      description: >
        Pet Tag fulfillment lifecycle (spec §10 "Trạng thái tag") — PARALLEL to but SEPARATE from
        OrderStatus (the order still runs PENDING_CONFIRM→…→COMPLETED). UNENCODED = printed, blank chip;
        ENCODED = chip written + locked, ready to pack + ship; ACTIVATED = customer logged in + a pet
        profile exists (t-3). Not a packages/core state machine (DB-only, no statusHistory).
      enum:
        - UNENCODED
        - ENCODED
        - ACTIVATED

    Channel:
      type: string
      description: Order origin (spec §04).
      enum:
        - web
        - inbox

    Role:
      type: string
      description: >
        Actor role for a transition (spec §08). `system` is a runtime-only actor (e.g. delivery
        auto-complete) — it is NEVER a stored user role; see UserRole.
      enum:
        - owner
        - staff
        - system

    UserRole:
      type: string
      description: >
        Stored user role (Postgres `user_role`). The subset of Role that a logged-in user can hold —
        `system` is excluded (a runtime actor, never persisted).
      enum:
        - owner
        - staff

    # --- Catalog (Phase-1 storefront reads) -------------------------------------------------------
    # ProductStatus / OptionType are kept byte-identical to the Postgres native enums (product_status /
    # option_type, migration 000001) by internal/contract/parity_test.go — change one here and the
    # parity test (in `make verify-go`) fails until they agree. `material` is deliberately NOT an enum:
    # spec §02 leaves it open-ended (PLA · PETG · recycled-PLA …) so it is TEXT+CHECK, not a wire enum
    # (ADR-028).
    ProductStatus:
      type: string
      description: Product lifecycle (spec §02, Postgres `product_status`). The detail read returns `active` only.
      enum:
        - active
        - draft
        - archived

    OptionType:
      type: string
      description: Customization option kind (spec §02, Postgres `option_type`). `text` carries an engraving char limit (maxChars).
      enum:
        - text
        - choice

    Dimensions:
      type: object
      description: Product bounding size in millimetres (spec §02; displayed "180 × 180 × 240 mm").
      required: [w, d, h]
      properties:
        w:
          type: integer
          description: Width in mm.
        d:
          type: integer
          description: Depth in mm.
        h:
          type: integer
          description: Height in mm.

    Color:
      type: object
      description: A named print colour for a product (spec §02). priceDelta is int-VND (may be 0).
      required: [id, name, hex, available, priceDelta]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Display name, e.g. "Kem sữa".
        hex:
          type: string
          description: Swatch colour as a hex string.
        available:
          type: boolean
          description: Whether the filament is currently in stock.
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0).
        partId:
          type: string
          format: uuid
          nullable: true
          description: >
            Part this colour belongs to (ADR-037); null = flat product-level colour (default). When set,
            the customer picks one colour per part.
        filamentMaterialId:
          type: string
          format: uuid
          nullable: true
          description: >
            Shop filament (ADR-039) this colour prints in; null = unlinked, so deduct-on-print skips it.
            Owner-set in the editor and used by the print-queue draw — not shown to customers.

    Option:
      type: object
      description: 'A customization option (spec §02). type: text carries an engraving char limit (maxChars).'
      required: [id, label, description, type, priceDelta, choices]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        description:
          type: string
        type:
          $ref: '#/components/schemas/OptionType'
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0).
        maxChars:
          type: integer
          nullable: true
          description: Engraving character limit; null unless a limit applies.
        choices:
          type: array
          description: >
            Enumerated choices for a `choice` option (ADR-037), each with its own priceDelta. Empty = a
            legacy toggle priced by this option's priceDelta; non-empty = the customer picks exactly one.
          items:
            $ref: '#/components/schemas/OptionChoice'

    Product:
      type: object
      description: >
        Storefront product detail (spec §02). Money fields (basePrice, colors[].priceDelta,
        options[].priceDelta) are raw int-VND — the client formats via @lumin/core (always-must #2).
        images[0] is the card cover (sprite-first, ADR-007). No productType in Phase 1 (D-P1-1).
      required:
        - id
        - slug
        - name
        - description
        - categoryId
        - basePrice
        - dimensions
        - material
        - model3dUrl
        - images
        - colors
        - options
        - parts
        - status
        - reviewCount
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Unique URL slug (spec §02).
        name:
          type: string
        description:
          type: string
          description: Markdown stored as text (spec §02 richtext).
        categoryId:
          type: string
          format: uuid
        basePrice:
          type: integer
          format: int64
          description: Starting price in int-VND (>= 0); options may add to it.
        dimensions:
          $ref: '#/components/schemas/Dimensions'
        material:
          type: string
          description: Print material (spec §02; open-ended TEXT+CHECK, ADR-028 — not a wire enum).
        estFilamentQty:
          type: integer
          format: int64
          description: >
            Internal print standard (ADR-039): estimated filament per unit for a FLAT product (a product with
            parts estimates per-part instead), in the linked material's unit (gram|ml). Drives deduct-on-print
            and the admin editor; 0 = no estimate (the draw is skipped). Not shown to customers.
        estPrintHours:
          type: number
          format: double
          description: >
            Internal print standard (ADR-039 pt 3): estimated machine hours per unit (per-item — one job = one
            physical print). Drives the COGS snapshot's machineVnd = estPrintHours × the primary machine's
            ₫/hour; 0 = no estimate (machineVnd 0). Stored as exact minutes server-side. Not shown to customers.
        model3dUrl:
          type: string
          description: .glb URL for the on-demand model viewer; empty string when none.
        model3dView:
          $ref: '#/components/schemas/Model3dView'
        spriteSheetUrl:
          type: string
          format: uri
          description: >
            360° sprite-sheet URL (ADR-049) — the card-hover turntable and the model-viewer's no-WebGL
            fallback. Omitted until a `sprite_render` job has produced one. Grid is the fixed shared const
            (24 frames, 6 cols).
        images:
          type: array
          description: Shop photos; images[0] is the card cover (sprite-first, ADR-007). May be empty.
          items:
            type: string
            format: uri
        colors:
          type: array
          items:
            $ref: '#/components/schemas/Color'
        options:
          type: array
          items:
            $ref: '#/components/schemas/Option'
        parts:
          type: array
          description: >
            Named parts (ADR-037), each grouping a subset of colors[] via Color.partId. Empty = a
            single-piece product (flat colours). The customer picks one colour per part.
          items:
            $ref: '#/components/schemas/Part'
        status:
          $ref: '#/components/schemas/ProductStatus'
        ratingAvg:
          type: number
          format: float
          nullable: true
          description: Denormalized average rating; null until the first review.
        reviewCount:
          type: integer
          description: Denormalized review count (spec §02).
        createdAt:
          type: string
          format: date-time

    Model3dView:
      type: object
      description: >
        Owner-saved default camera pose for the storefront 3D viewer (ADR-038). Maps 1:1 to a
        <model-viewer> camera-orbit (orbitTheta deg · orbitPhi deg · orbitRadius %) plus camera-target
        (targetX/Y/Z metres). Absent on a Product = no saved pose, so the viewer auto-frames. Display
        metadata, not money — plain floats (not int-VND). The worker recenters geometry, so target is
        usually ~origin; it is kept so an off-centre framing needs no later migration.
      required: [orbitTheta, orbitPhi, orbitRadius, targetX, targetY, targetZ]
      properties:
        orbitTheta:
          type: number
          format: double
          description: Azimuth in degrees, [-360, 360] → camera-orbit theta.
        orbitPhi:
          type: number
          format: double
          description: Polar angle in degrees, [0, 180] (model-viewer clamps polar) → camera-orbit phi.
        orbitRadius:
          type: number
          format: double
          description: Camera distance as a percent of the auto-frame radius, (0, 1000] → camera-orbit radius%.
        targetX:
          type: number
          format: double
          description: camera-target x in metres, [-100, 100].
        targetY:
          type: number
          format: double
          description: camera-target y in metres, [-100, 100].
        targetZ:
          type: number
          format: double
          description: camera-target z in metres, [-100, 100].

    Part:
      type: object
      description: >
        A named part of a product (ADR-037) — e.g. "Chao đèn". colors[] belong to a part via Color.partId;
        the customer picks one colour per part.
      required: [id, name, displayOrder]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Display name, e.g. "Chao đèn".
        displayOrder:
          type: integer
          description: Sort order within the product's parts.
        estFilamentQty:
          type: integer
          format: int64
          description: >
            Internal print standard (ADR-039): estimated filament per unit for THIS part (ADR-037 two-tone),
            in the part colour's material unit (gram|ml). Drives deduct-on-print; 0 = no estimate (skipped).

    OptionChoice:
      type: object
      description: >
        One enumerated choice of a `choice` option (ADR-037) — e.g. size "M". priceDelta is int-VND (may
        be 0); the customer picks exactly one choice per choice-option.
      required: [id, label, description, priceDelta, displayOrder]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          description: Display label, e.g. "M".
        description:
          type: string
          description: Optional detail, e.g. "12×9 cm · ~160g".
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0).
        displayOrder:
          type: integer
          description: Sort order within the option's choices.

    ProductCard:
      type: object
      description: >
        Lightweight catalog-list projection of a product (spec §02) — the fields a grid card needs, WITHOUT
        colors/options/description body (the list avoids the per-product reads the detail read makes → no
        N+1). basePrice is raw int-VND; images[0] is the card cover (sprite-first, ADR-007). Only ACTIVE
        products are ever listed, so status is implied and omitted.
      required:
        - id
        - slug
        - name
        - basePrice
        - categoryId
        - images
        - reviewCount
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Unique URL slug (spec §02).
        name:
          type: string
        basePrice:
          type: integer
          format: int64
          description: Starting price in int-VND (>= 0).
        categoryId:
          type: string
          format: uuid
        images:
          type: array
          description: Shop photos; images[0] is the card cover (ADR-007). May be empty.
          items:
            type: string
            format: uri
        spriteSheetUrl:
          type: string
          format: uri
          description: >
            360° sprite-sheet URL for the card hover (ADR-049). Omitted until a `sprite_render` job has
            produced one. Grid is the fixed shared const (24 frames, 6 cols).
        ratingAvg:
          type: number
          format: float
          nullable: true
          description: Denormalized average rating; null until the first review.
        reviewCount:
          type: integer
          description: Denormalized review count (spec §02).

    ProductList:
      type: object
      description: >
        One page of catalog cards plus the pagination envelope (spec §03 list state). `total` is the count
        of active products matching the filter across all pages; the client derives the page count.
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductCard'
        page:
          type: integer
          description: 1-based page number echoed from the request.
        pageSize:
          type: integer
          description: Items per page echoed from the request.
        total:
          type: integer
          description: Total active products matching the filter, across all pages.

    AdminProductSummary:
      type: object
      description: >
        Admin catalog-list projection (P3-j): the fields the admin product grid needs across ALL statuses —
        like ProductCard but WITH status (for the tab badges) and createdAt, and without colors/options (the
        list makes no per-product read → no N+1). basePrice is raw int-VND (always-must #2); the detail read
        (getAdminProduct) returns the full Product.
      required:
        - id
        - slug
        - name
        - basePrice
        - categoryId
        - status
        - images
        - reviewCount
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        basePrice:
          type: integer
          format: int64
          description: Starting price in int-VND (>= 0).
        categoryId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ProductStatus'
        images:
          type: array
          description: Shop photos; images[0] is the card cover (ADR-007). May be empty.
          items:
            type: string
            format: uri
        ratingAvg:
          type: number
          format: float
          nullable: true
          description: Denormalized average rating; null until the first review.
        reviewCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    FilamentMaterial:
      type: object
      description: >
        A shop-wide filament colour (ADR-039). stockQty + avgCostPerUnit are DERIVED from the import batches
        (weighted average by remaining qty). stockQty is int unit-qty (grams/ml); avgCostPerUnit is a display
        RATE (₫ per unit, may be fractional), NOT stored money (frozen to int only at the print-time snapshot,
        slice 4b). lowStockThreshold drives the "sắp hết" badge; hex is an optional swatch. material/unit are
        validated server-side against a fixed set (ADR-028: TEXT+CHECK, not a native enum).
      required:
        - id
        - name
        - material
        - unit
        - lowStockThreshold
        - archived
        - stockQty
        - avgCostPerUnit
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        name: { type: string, description: 'Display colour name, e.g. "Cam Lumin".' }
        material: { type: string, description: 'One of PLA · PETG · recycled-PLA · Resin.' }
        unit: { type: string, description: 'gram or ml.' }
        hex: { type: string, nullable: true, description: 'Swatch hex (#rgb/#rrggbb); null = no chip.' }
        lowStockThreshold: { type: integer, format: int64, description: 'Warn below this stock (unit qty, >= 0).' }
        archived: { type: boolean }
        stockQty: { type: integer, format: int64, description: 'Remaining stock in unit qty (Σ batch remaining).' }
        avgCostPerUnit: { type: number, format: double, description: 'Weighted-average ₫ per unit (derived display rate).' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    FilamentBatch:
      type: object
      description: >
        One import lot of a filament material (ADR-039). qtyOriginal/qtyRemaining are unit qty; totalCostVnd
        is the lot's int-VND cost. Per-unit ₫ = totalCostVnd / qtyOriginal (derived, never stored).
      required: [id, materialId, importedAt, qtyOriginal, qtyRemaining, totalCostVnd]
      properties:
        id: { type: string, format: uuid }
        materialId: { type: string, format: uuid }
        importedAt: { type: string, format: date-time }
        qtyOriginal: { type: integer, format: int64 }
        qtyRemaining: { type: integer, format: int64 }
        totalCostVnd: { type: integer, format: int64, description: 'Lot cost in int-VND (>= 0).' }

    FilamentMaterialDetail:
      type: object
      description: A filament material plus its import-lot breakdown (the weighted-average panel).
      required: [material, batches]
      properties:
        material: { $ref: '#/components/schemas/FilamentMaterial' }
        batches:
          type: array
          description: Import lots, oldest first. Empty until the first import.
          items: { $ref: '#/components/schemas/FilamentBatch' }

    FilamentMaterialInput:
      type: object
      description: >
        Create/replace body for a filament material (ADR-039, owner-only). archived is optional (default
        false on create; set true to soft-delete). Cost/stock are never set here — they come from imports.
      required: [name, material, unit, lowStockThreshold]
      properties:
        name: { type: string }
        material: { type: string, description: 'One of PLA · PETG · recycled-PLA · Resin.' }
        unit: { type: string, description: 'gram or ml.' }
        hex: { type: string, nullable: true }
        lowStockThreshold: { type: integer, format: int64 }
        archived: { type: boolean }

    FilamentImportInput:
      type: object
      description: >
        A "nhập cuộn" import (ADR-039, owner-only): spoolCount spools × qtyPerSpool unit each, at
        pricePerSpoolVnd int-VND per spool. The server derives the lot qtyOriginal = spoolCount × qtyPerSpool
        and totalCostVnd = spoolCount × pricePerSpoolVnd.
      required: [spoolCount, qtyPerSpool, pricePerSpoolVnd]
      properties:
        spoolCount: { type: integer, format: int64, description: 'Number of spools imported (>= 1).' }
        qtyPerSpool: { type: integer, format: int64, description: 'Unit qty per spool (grams/ml, >= 1).' }
        pricePerSpoolVnd: { type: integer, format: int64, description: 'Price per spool in int-VND (>= 0).' }

    FilamentScrapInput:
      type: object
      description: >
        Log a scrap draw against a material (ADR-039 hao-hụt tab, owner-only). Draws qty FIFO through the
        deduct helper (kind='scrap') so scrap moves stock + writes the same consumption ledger; a shortfall
        clamps to available stock (never errors).
      required: [qty]
      properties:
        qty: { type: integer, format: int64, description: 'Scrap quantity in the material unit (>= 1).' }
        reason: { type: string, description: 'Optional scrap reason.' }
        note: { type: string, description: 'Optional note.' }

    Machine:
      type: object
      description: >
        A printer for machine-hour costing (ADR-039 pt 6). costPerHour is DERIVED = purchasePriceVnd /
        (depreciationMonths × expectedHoursPerMonth) — a rate (float, not stored money); the 4c snapshot
        attributes hours to the primary machine. active=false hides it from the cost rollup.
      required: [id, name, purchasePriceVnd, depreciationMonths, expectedHoursPerMonth, isPrimary, active, costPerHour]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        purchasePriceVnd: { type: integer, format: int64, description: 'Purchase price in int-VND (>= 0).' }
        depreciationMonths: { type: integer, description: 'Depreciation window in months (> 0).' }
        expectedHoursPerMonth: { type: integer, description: 'Expected run hours per month (> 0).' }
        isPrimary: { type: boolean, description: 'The machine the snapshot attributes hours to.' }
        active: { type: boolean, description: 'Excluded from the cost rollup when false.' }
        costPerHour:
          type: number
          format: double
          description: Derived ₫/hour = purchasePriceVnd / (depreciationMonths × expectedHoursPerMonth). A rate, not stored money.

    MachineInput:
      type: object
      description: Create/replace body for a machine (ADR-039, owner-only). isPrimary/active default false/true.
      required: [name, purchasePriceVnd, depreciationMonths, expectedHoursPerMonth]
      properties:
        name: { type: string }
        purchasePriceVnd: { type: integer, format: int64, description: 'Purchase price in int-VND (>= 0).' }
        depreciationMonths: { type: integer, description: 'Depreciation window in months (> 0).' }
        expectedHoursPerMonth: { type: integer, description: 'Expected run hours per month (> 0).' }
        isPrimary: { type: boolean, description: 'Mark as the primary machine; optional, defaults false.' }
        active: { type: boolean, description: 'Optional, defaults true.' }

    AuxCost:
      type: object
      description: An auxiliary/overhead cost line (ADR-039 pt 7). amountVnd is int-VND; the per-order allocation is derived at rollup time.
      required: [id, label, kind, amountVnd]
      properties:
        id: { type: string, format: uuid }
        label: { type: string }
        kind:
          type: string
          description: 'per_order (a flat cost each order) | per_month (amortized over the 30-day order count). Validated server-side (ADR-028), not a wire enum.'
        amountVnd: { type: integer, format: int64, description: 'Amount in int-VND (>= 0).' }

    AuxCostInput:
      type: object
      description: Create/replace body for an overhead line (ADR-039, owner-only).
      required: [label, kind, amountVnd]
      properties:
        label: { type: string }
        kind: { type: string, description: 'per_order | per_month.' }
        amountVnd: { type: integer, format: int64, description: 'Amount in int-VND (>= 0).' }

    CostSnapshot:
      type: object
      description: >
        The per-order-item COGS frozen when its print job first enters PRINTING (ADR-039 pt 5, /vat-tu
        design screen 8). Money fields are int-VND, frozen — a later filament/machine price change never
        rewrites a sold order. totalVnd = filamentVnd + machineVnd + wasteVnd + auxVnd. Read-only (owner+staff);
        the margin (salePrice − totalVnd) is derived client-side from the line's unitPrice × quantity. Present
        only once costed — an uncosted line (unprinted / old order) omits it entirely, which a margin read must
        NOT treat as ₫0 COGS. The rate inputs (estPrintHours, machineVndPerHour, wasteFactor) are frozen too so
        the card can show "6.5h × ₫2,380" / "+8.4%" exactly as at print time.
      required: [filamentVnd, machineVnd, wasteVnd, auxVnd, totalVnd, estPrintHours, machineVndPerHour, wasteFactor, at]
      properties:
        filamentVnd:
          type: integer
          format: int64
          description: FIFO filament cost frozen at print (Σ of the line's filament_consumption.cost_vnd). 0 if the spool was starved.
        machineVnd:
          type: integer
          format: int64
          description: Machine-depreciation cost = estPrintHours × machineVndPerHour, rounded to int-VND. 0 if no estimate or no primary machine.
        wasteVnd:
          type: integer
          format: int64
          description: Waste/reprint cost = (filamentVnd + machineVnd) × wasteFactor, rounded to int-VND.
        auxVnd:
          type: integer
          format: int64
          description: Allocated overhead = Σ(per_order) + Σ(per_month) ÷ real-orders-30d (0 when no real orders).
        totalVnd:
          type: integer
          format: int64
          description: True COGS = filamentVnd + machineVnd + wasteVnd + auxVnd (int-VND).
        estPrintHours:
          type: number
          format: double
          description: Machine hours used for machineVnd, frozen (the product's estimate at print time).
        machineVndPerHour:
          type: number
          format: double
          description: The primary machine's derived ₫/hour at print time, frozen (0 if none).
        wasteFactor:
          type: number
          format: double
          description: The 30-day waste factor (Σscrap ÷ Σprint grams) applied, frozen (e.g. 0.084 = +8.4%).
        at:
          type: string
          format: date-time
          description: When the snapshot was frozen (first →PRINTING).

    CostingSummary:
      type: object
      description: >
        Shop-wide derived costing KPIs for the /vat-tu dashboard (ADR-039 pt 7, design screen 8) — the same
        rolling-30-day inputs the per-order snapshot uses, so a margin can never drift from this dashboard.
        Read-only (owner+staff). Rates are floats (not stored money).
      required: [wasteFactor, auxPerOrderVnd, realOrders30d]
      properties:
        wasteFactor:
          type: number
          format: double
          description: 30-day waste factor = Σscrap ÷ Σprint grams (0 when no prints). Shown as "+8.4%".
        auxPerOrderVnd:
          type: integer
          format: int64
          description: Overhead allocated per order = Σ(per_order) + Σ(per_month) ÷ real-orders-30d (int-VND, rounded).
        realOrders30d:
          type: integer
          format: int64
          description: Paid, non-refunded orders in the last 30 days — the aux amortization denominator.
        primaryMachineVndPerHour:
          type: number
          format: double
          nullable: true
          description: The primary machine's derived ₫/hour; null when no active primary machine is set.

    ProductInput:
      type: object
      description: >
        Create/replace body for a product (P3-j, owner-only). Same editable fields as Product MINUS the
        server/pipeline-owned ones: no id/createdAt/ratingAvg/reviewCount (server-owned), no colors/options
        (managed via their own nested endpoints), and no model3dUrl (owned by the asset pipeline, P3-j-b —
        the editor form can never set or blank it). basePrice is raw int-VND (always-must #2). description
        and images are optional (default "" / []).
      required:
        - slug
        - name
        - categoryId
        - basePrice
        - dimensions
        - material
        - status
      properties:
        slug:
          type: string
          description: Unique URL slug (spec §02); a duplicate → 400 with a `slug` field error.
        name:
          type: string
        description:
          type: string
          description: Markdown stored as text (spec §02). Optional; defaults to "".
        categoryId:
          type: string
          format: uuid
        basePrice:
          type: integer
          format: int64
          description: Starting price in int-VND (>= 0).
        dimensions:
          $ref: '#/components/schemas/Dimensions'
        material:
          type: string
          description: Print material (spec §02; open-ended TEXT+CHECK — PLA · PETG · recycled-PLA).
        estFilamentQty:
          type: integer
          format: int64
          description: >
            Estimated filament per unit for a FLAT product (ADR-039), in the linked material's unit. Optional,
            defaults to 0 (no estimate → deduct-on-print skips). A product with parts estimates per-part instead.
        estPrintHours:
          type: number
          format: double
          description: >
            Estimated machine hours per unit (ADR-039 pt 3) — drives the COGS snapshot's machineVnd. Optional,
            defaults to 0 (no estimate → machineVnd 0). Stored as exact minutes server-side.
        images:
          type: array
          description: Shop photos; images[0] is the card cover (ADR-007). Optional; defaults to [].
          items:
            type: string
            format: uri
        status:
          $ref: '#/components/schemas/ProductStatus'

    ColorInput:
      type: object
      description: Create/replace body for a product colour (P3-j). priceDelta is int-VND (default 0).
      required: [name, hex, available]
      properties:
        name:
          type: string
        hex:
          type: string
          description: Swatch colour as a hex string (e.g. #C9A24B).
        available:
          type: boolean
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0). Optional; defaults to 0.
        partId:
          type: string
          format: uuid
          nullable: true
          description: >
            Assign this colour to a part (ADR-037); omit/null = flat product-level colour. The part must
            belong to the same product (else 400 partId).
        filamentMaterialId:
          type: string
          format: uuid
          nullable: true
          description: >
            Link this colour to a shop filament (ADR-039) so deduct-on-print knows which spool it draws;
            omit/null = unlinked. An unknown id → 400 filamentMaterialId.

    OptionInput:
      type: object
      description: Create/replace body for a customization option (P3-j). priceDelta is int-VND (default 0).
      required: [label, type]
      properties:
        label:
          type: string
        description:
          type: string
          description: Optional; defaults to "".
        type:
          $ref: '#/components/schemas/OptionType'
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0). Optional; defaults to 0.
        maxChars:
          type: integer
          nullable: true
          description: Engraving character limit for a `text` option; null/omitted for no limit.

    PartInput:
      type: object
      description: Create/replace body for a product part (ADR-037, owner-only).
      required: [name]
      properties:
        name:
          type: string
        displayOrder:
          type: integer
          description: Sort order within the product's parts; optional, defaults to 0.
        estFilamentQty:
          type: integer
          format: int64
          description: >
            Estimated filament per unit for this part (ADR-039), in the part colour's material unit. Optional,
            defaults to 0 (no estimate → the deduct-on-print draw skips this part).

    OptionChoiceInput:
      type: object
      description: Create/replace body for an option choice (ADR-037). priceDelta is int-VND (default 0).
      required: [label]
      properties:
        label:
          type: string
        description:
          type: string
          description: Optional; defaults to "".
        priceDelta:
          type: integer
          format: int64
          description: Added price in int-VND (>= 0). Optional; defaults to 0.
        displayOrder:
          type: integer
          description: Sort order within the option's choices; optional, defaults to 0.

    AssetJobStatus:
      type: string
      enum: [queued, processing, ready, failed]
      description: Lifecycle of a render/ingest job (migration 000006). The client maps it to an i18n label.

    AssetJobType:
      type: string
      enum: [model_ingest, sprite_render]
      description: >
        Which asset pipeline a job runs (D3): `model_ingest` normalizes geometry + builds the LOD .glb,
        `sprite_render` renders the 360° sprite alone. The client maps it to an i18n label.

    ModelUploadInput:
      type: object
      description: >
        Admin editor upload bootstrap for one source 3D model. No file name or client-declared size: the
        object key is generated server-side with no PII, and the size/type gate lives in the signed S3
        POST policy. The editor maps the file extension (.glb/.stl/.3mf) to the exact model MIME below.
      required: [contentType]
      properties:
        contentType:
          type: string
          enum: [model/gltf-binary, model/stl, model/3mf]
          description: Exact source-model MIME type the returned POST policy will allow.

    ModelUpload:
      type: object
      description: >
        A short-lived, browser-ready S3/Garage POST form for one source model. Submit every `fields`
        entry and the file part to `uploadUrl`; after a successful direct upload, send `finalUrl` as
        `sourceModelUrl` to POST /admin/products/{id}/asset-jobs. `finalUrl` is host-pinned by the server
        and never derived from browser input.
      required: [uploadUrl, fields, finalUrl, expiresAt, maxBytes]
      properties:
        uploadUrl:
          type: string
          format: uri
          description: S3/Garage form POST target, usually the bucket endpoint.
        fields:
          type: object
          additionalProperties:
            type: string
          description: Exact form fields to include before the file part.
        finalUrl:
          type: string
          format: uri
          description: Host-pinned object URL later passed as `sourceModelUrl` to the asset-job create.
        expiresAt:
          type: string
          format: date-time
          description: Policy expiration timestamp.
        maxBytes:
          type: integer
          format: int64
          description: Maximum object size enforced by the signed POST policy (≤100MB).

    AssetJobInput:
      type: object
      description: >
        Enqueue body for one render/ingest job. `sourceModelUrl` MUST be a host-pinned URL minted by
        POST /admin/products/{id}/model-upload; `sourceVersion` is the content hash of that uploaded
        object (ADR-004). The productId comes from the path, not the body.
      required: [jobType, sourceModelUrl, sourceVersion]
      properties:
        jobType:
          $ref: '#/components/schemas/AssetJobType'
        sourceModelUrl:
          type: string
          format: uri
          description: Host-pinned URL of the uploaded source model (from the model-upload finalUrl).
        sourceVersion:
          type: string
          description: Content hash of the uploaded source object (ADR-004 — Garage has no versioning).

    AssetJobResultInput:
      type: object
      description: >
        The asset-worker's render-callback body (PATCH /internal/asset-jobs/{id}, ADR-045). `status` is the
        worker-reachable lifecycle subset (never `queued` — that is the initial state). `model3dUrl` is the
        derivative LOD glb a `model_ingest` uploaded; `spriteSheetUrl` is the 360° sprite sheet a
        `sprite_render` uploaded (ADR-049). Each is required on a `ready` job OF ITS KIND, written to the
        matching product column, and MUST be under this store's assets origin. `lastError` accompanies
        `failed`. The productId is resolved from the job row, never the body.
      required: [status]
      properties:
        status:
          type: string
          enum: [processing, ready, failed]
          description: The worker-reported lifecycle state (a subset of AssetJobStatus — never `queued`).
        model3dUrl:
          type: string
          format: uri
          description: >
            The uploaded derivative LOD glb URL. Required on a `ready` `model_ingest`; must be a `.glb` under
            this store's assets origin (host-pinned). Ignored for `sprite_render` (which reports `spriteSheetUrl`).
        spriteSheetUrl:
          type: string
          format: uri
          description: >
            The uploaded 360° sprite-sheet URL (ADR-049). Required on a `ready` `sprite_render`; must be a
            `.webp` under this store's assets origin (host-pinned). Ignored for `model_ingest` (which reports `model3dUrl`).
        lastError:
          type: string
          maxLength: 2000
          description: Failure reason, set with `failed`. Cleared when the job reaches `ready`.

    AssetJob:
      type: object
      description: >
        One render/ingest job for a product (migration 000006). The admin editor reads this to show render
        status. attempts/lastError/completedAt are written by the slice-3 worker; a freshly enqueued job is
        `queued` with 0 attempts and null lastError/completedAt.
      required: [id, productId, jobType, status, sourceModelUrl, sourceVersion, attempts, createdAt]
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        jobType:
          $ref: '#/components/schemas/AssetJobType'
        status:
          $ref: '#/components/schemas/AssetJobStatus'
        sourceModelUrl:
          type: string
          format: uri
        sourceVersion:
          type: string
        attempts:
          type: integer
          description: Worker retry count (0 until the worker runs).
        lastError:
          type: string
          nullable: true
          description: Failure reason; set on `failed`, cleared on `ready`, null otherwise.
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Set when the job reaches `ready` or `failed`; null while pending.

    Review:
      type: object
      description: >
        One PUBLISHED product review as it crosses the public wire (spec §02). The author's identity is
        deliberately omitted — reviews carry a nullable customer_id and guests may review, so exposing a
        reviewer name would be public PII (PDPL); only the review content is returned. `reply` is the
        shop's public reply, null until the shop replies (no Phase-1 write path populates it yet). Hidden
        reviews are filtered at the SQL source and never appear here.
      required: [id, rating, body, images, createdAt]
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Star rating 1–5 (spec §02).
        body:
          type: string
          description: The review text (may be empty).
        images:
          type: array
          description: Reviewer photos (spec §02). May be empty.
          items:
            type: string
            format: uri
        reply:
          nullable: true
          description: The shop's public reply, or null until the shop has replied.
          allOf:
            - $ref: '#/components/schemas/ReviewReply'
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 UTC when the review was posted.

    ReviewReply:
      type: object
      description: The shop's public reply to a review (spec §02 `reply?`). Null on the parent until replied.
      required: [body, at]
      properties:
        body:
          type: string
          description: The shop reply text.
        at:
          type: string
          format: date-time
          description: ISO-8601 UTC when the reply was posted.

    ReviewStatus:
      type: string
      description: >
        Moderation state of a review (spec §02). `published` = visible on the storefront; `hidden` =
        moderated out (never served by the public review list). Exposed only on the admin projection — the
        public Review omits it (a hidden review simply never appears).
      enum: [published, hidden]

    AdminReview:
      type: object
      description: >
        Admin review-moderation projection (P3-m) — a review with its moderation fields plus the product name
        and the reviewer's name for the moderation card. Unlike the public Review it carries `status` and
        `customerName` (admin-only PII, PDPL — a guest review has customerName null). `reply` is the shop's
        reply, null until replied. The FE derives its tabs (pending-reply = published & no reply, replied =
        has reply, has-image = images non-empty) from these fields.
      required: [id, productId, productName, rating, body, images, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        productName:
          type: string
          description: Name of the product this review is on (for the moderation card).
        customerName:
          type: string
          nullable: true
          description: Reviewer's name, or null for a guest review. Admin-only (PDPL).
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Star rating, 1–5.
        body:
          type: string
        images:
          type: array
          items:
            type: string
          description: Reviewer's attached image URLs (may be empty).
        reply:
          $ref: '#/components/schemas/ReviewReply'
        status:
          $ref: '#/components/schemas/ReviewStatus'
        createdAt:
          type: string
          format: date-time

    ReviewModeration:
      type: object
      description: >
        Moderation change for one review (P3-m). At least one field must be present (an empty body is a 400).
        `status` flips published ↔ hidden. `reply` sets the shop reply text (its timestamp is server-stamped);
        omit it to leave any existing reply untouched. The FE sends both (`status: published` + `reply`) for
        "Lưu & công khai" so a reply also publishes the review.
      properties:
        status:
          $ref: '#/components/schemas/ReviewStatus'
        reply:
          type: string
          description: Shop reply text (non-empty). Server stamps the timestamp. Omit to leave the reply unchanged.

    ReviewList:
      type: object
      description: >
        One page of published reviews plus the pagination envelope (spec §03 list state). `total` is the
        count of PUBLISHED reviews for the product across all pages; the client derives the page count.
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        page:
          type: integer
          description: 1-based page number echoed from the request.
        pageSize:
          type: integer
          description: Items per page echoed from the request.
        total:
          type: integer
          description: Total published reviews for the product, across all pages.

    Category:
      type: object
      description: >
        A catalog category (spec §02) — the taxonomy a product belongs to (Product.categoryId references
        Category.id) and the storefront browse chips render. No visibility axis: every category is public.
      required: [id, slug, name]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Unique URL slug — the value passed to GET /products?category={slug}.
        name:
          type: string
          description: Human-friendly display name (sentence case).

    AdminCategory:
      type: object
      description: >
        Admin category-list projection (P3-o): a Category plus productCount — the number of products
        referencing it across ALL statuses — and the menu-control fields (slice o-2): displayOrder (the
        owner's drag-set menu position), description + imageUrl (admin-only presentation metadata, NOT on the
        public Category shape), and visible (the menu-visibility toggle). productCount is the deletability
        signal (a non-zero count means a hard delete is blocked, 409). Only the admin list carries these; the
        create/edit responses return the plain Category.
      required: [id, slug, name, productCount, displayOrder, description, imageUrl, visible]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        productCount:
          type: integer
          format: int64
          description: Products referencing this category, across all statuses (>= 0). 0 = safe to delete.
        displayOrder:
          type: integer
          format: int32
          description: 0-based position in the storefront browse menu (owner sets via drag-to-reorder).
        description:
          type: string
          description: Admin-only short blurb (sentence case). Not surfaced on the public Category shape.
        imageUrl:
          type: string
          description: Cover-image URL (a shared proofstore image, same host as product photos) or "" if none.
        visible:
          type: boolean
          description: Whether the category shows in the customer menu (composes with the active-product auto-hide).

    CategoryInput:
      type: object
      description: >
        Create body for a category (P3-o). slug is a URL-safe lowercase-dash token (validated at the edge so
        a junk slug never reaches the storefront URL); name is a sentence-case display label. A new category
        starts visible, un-described, image-less, and appended to the end of the menu order; the rich fields
        are set afterward via the edit body (CategoryUpdate).
      required: [slug, name]
      properties:
        slug:
          type: string
          description: Unique URL slug (lowercase alphanumerics in dash-separated groups, e.g. "den-de-ban").
        name:
          type: string
          description: Human-friendly display name (sentence case).

    CategoryUpdate:
      type: object
      description: >
        Edit body for a category (P3-o slice o-2). Carries the same slug + name as create plus the menu
        metadata (description, imageUrl, visible). displayOrder is deliberately absent — order moves only via
        the reorder endpoint. imageUrl is "" for no cover image, else a proofstore image URL.
      required: [slug, name, description, imageUrl, visible]
      properties:
        slug:
          type: string
          description: Unique URL slug (lowercase alphanumerics in dash-separated groups, e.g. "den-de-ban").
        name:
          type: string
          description: Human-friendly display name (sentence case).
        description:
          type: string
          description: Short blurb (sentence case); "" clears it. Admin-only — never on the public shape.
        imageUrl:
          type: string
          description: Cover-image URL (a shared proofstore image) or "" to clear it.
        visible:
          type: boolean
          description: Show this category in the customer menu (still subject to the active-product auto-hide).

    CategoryReorder:
      type: object
      description: >
        The full ordered list of category ids after a drag (P3-o slice o-2). Each category's displayOrder is
        set to its 0-based index. Send every category id so no category is left with a stale order.
      required: [ids]
      properties:
        ids:
          type: array
          description: Category ids in the desired menu order (first = shown first).
          items:
            type: string
            format: uuid

    # --- Value objects ----------------------------------------------------------------------------
    StatusEvent:
      type: object
      description: One appended statusHistory record (spec §02/§04). `from` is null only at creation.
      required: [from, to, at, byUser]
      properties:
        from:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/OrderStatus'
        to:
          $ref: '#/components/schemas/OrderStatus'
        at:
          type: string
          format: date-time
          description: ISO-8601 UTC, trailing Z (e.g. 2026-06-25T00:00:00.000Z).
        byUser:
          type: string
          description: Actor — a `users.id` for staff/owner, the sentinel "customer" for guest web-create.
          minLength: 1
        reason:
          type: string
          description: Required when `to` is CANCELLED or REFUNDED.
        refundProofUrl:
          type: string
          format: uri
          description: Required when `to` is REFUNDED (transfer-back proof image).

    Address:
      type: object
      description: Vietnamese shipping address — no district level (ADR-017).
      required: [province, ward, street]
      properties:
        province: { type: string }
        ward: { type: string }
        street: { type: string }

    Personalization:
      type: object
      description: Per-item engraving (distinct from a Review's text — that field is `body`).
      required: [text, zoneId]
      properties:
        text:
          type: string
          minLength: 1
        zoneId:
          type: string
          minLength: 1

    Customer:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
        phone:
          type: string
          description: Vietnamese mobile — `0` or `+84` prefix + 9 digits.
          pattern: '^(0|\+84)\d{9}$'
        email:
          type: string
          format: email
        socialHandle:
          type: string

    PartColorSelection:
      type: object
      description: >
        One part's chosen colour (ADR-037). For a product with named parts the client sends one of
        these per part instead of the flat `colorId`. The server validates the colour belongs to that
        part (not merely the product) before pricing — a cross-part colour is rejected 422.
      required: [partId, colorId]
      properties:
        partId:
          type: string
          format: uuid
        colorId:
          type: string
          format: uuid

    OptionChoiceSelection:
      type: object
      description: >
        One choice-option's picked choice (ADR-037). For an option that offers enumerated choices the
        client sends the picked choice here (priced by the choice's own delta — the option base is
        ignored); text and legacy toggle options stay in `optionIds`.
      required: [optionId, choiceId]
      properties:
        optionId:
          type: string
          format: uuid
        choiceId:
          type: string
          format: uuid

    OrderItem:
      type: object
      description: A priced line item as returned in an Order (unitPrice is server-derived).
      required: [productId, optionIds, quantity, unitPrice]
      properties:
        productId:
          type: string
          format: uuid
        colorId:
          type: string
          format: uuid
        optionIds:
          type: array
          items:
            type: string
            format: uuid
        personalization:
          $ref: '#/components/schemas/Personalization'
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: integer
          format: int64
          description: Server-derived int VND (base + color/option deltas). Never accepted from the client.
        productName:
          type: string
          description: Human product name, joined for the admin order-detail view (P3-e). Read-only.
        colorName:
          type: string
          description: Human color name when the line has a color, joined for the admin detail. Read-only.
        optionLabels:
          type: array
          items:
            type: string
          description: Selected option labels, joined for the admin detail (empty when none). Read-only.
        partColors:
          type: array
          items:
            $ref: '#/components/schemas/PartColorSelection'
          description: >
            The colour chosen for each named part (ADR-037), snapshotted from the order. Omitted for a flat
            product (which uses colorId). Read-only.
        optionChoices:
          type: array
          items:
            $ref: '#/components/schemas/OptionChoiceSelection'
          description: >
            The picked choice for each choice-option that offers choices (ADR-037), snapshotted from the
            order. Omitted when the line has none. Read-only.
        partColorLabels:
          type: array
          items:
            type: string
          description: >
            Display labels for the per-part colours ("Chao: Đỏ"), resolved from the names DENORMALIZED into
            the order at capture (ADR-037 — a later catalog rename can't rewrite a sold order; no live join).
            One per partColors entry, same order. Omitted for a flat product. Read-only.
        optionChoiceLabels:
          type: array
          items:
            type: string
          description: >
            Display labels for the picked choices ("Kích thước: Lớn"), resolved from the names denormalized at
            capture (ADR-037). One per optionChoices entry, same order. Omitted when the line has none. Read-only.
        costSnapshot:
          $ref: '#/components/schemas/CostSnapshot'

    OrderItemInput:
      type: object
      description: >
        A requested line item. Deliberately has NO unitPrice — the server re-derives every price from
        the catalog (always-must #2); a client price is never trusted.
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        colorId:
          type: string
          format: uuid
        optionIds:
          type: array
          items:
            type: string
            format: uuid
          default: []
          description: >
            Text options + legacy toggle choice-options (no choices). A choice-option that offers choices
            is picked via optionChoices instead — toggling it here is rejected 422.
        partColors:
          type: array
          items:
            $ref: '#/components/schemas/PartColorSelection'
          description: >
            Per-part colour picks for a product with named parts (ADR-037): exactly one per part. A flat
            product uses colorId instead; mixing the two (or a per-part colour on a flat product) is 422.
            OPTIONAL (not defaulted): absent = a flat product with no per-part colours, so an existing flat
            client needs no change — the configurator storefront (Stage 2c) starts sending it.
        optionChoices:
          type: array
          items:
            $ref: '#/components/schemas/OptionChoiceSelection'
          description: >
            Picked choices for choice-options that offer them (ADR-037). Text/toggle options use optionIds.
            OPTIONAL (not defaulted): absent = the line picks no choices.
        personalization:
          $ref: '#/components/schemas/Personalization'
        quantity:
          type: integer
          minimum: 1

    # --- Price quote (P1-b: server-authoritative pricing preview; no order, no persistence) -------
    PriceQuoteInput:
      type: object
      description: >
        One or more selections to price. Reuses OrderItemInput (which has NO unitPrice — the server
        re-derives every price from the catalog). An optional `province` folds in shipping + total.
        Capped at 50 items: this is a public, unauthenticated read (no rate limit until the edge WAF),
        and each line costs a catalog round-trip, so the cap bounds the per-request work.
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: '#/components/schemas/OrderItemInput'
        province:
          type: string
          description: >
            Optional VN destination province (no district, ADR-017). When present, the response adds
            shippingFee (resolved server-side from settings.shipping_rules, same authority as checkout)
            and total (subtotal + shippingFee). Omitted or blank → line/subtotal only, byte-identical to
            the pre-P2-b response. An unshippable province → 422 NO_SHIPPING_RULE (never a silent ₫0).

    PriceQuote:
      type: object
      description: >
        Server-computed line prices + subtotal (raw int-VND). `lines` is positionally aligned with the
        request `items` (same index) — a line carries no product reference, so a client maps a line back
        to its selection by array index. `shippingFee` and `total` are present ONLY when the request
        carried a province (P2-b); without one the response is line/subtotal only.
      required: [lines, subtotal]
      properties:
        lines:
          type: array
          items:
            $ref: '#/components/schemas/PriceQuoteLine'
        subtotal:
          type: integer
          format: int64
          description: Sum of line totals, raw int VND (no shipping).
        shippingFee:
          type: integer
          format: int64
          description: >
            Server-resolved shipping fee (settings.shipping_rules), raw int VND. Present ONLY when the
            request carried a province — same authority as the checkout charge path.
        total:
          type: integer
          format: int64
          description: >
            subtotal + shippingFee, overflow-checked. Present ONLY when the request carried a province.

    PriceQuoteLine:
      type: object
      description: >
        One priced line, positionally aligned with the request item at the same index. Carries the
        server-derived unit price, its quantity, and the line total — no product ref (map back by index).
      required: [unitPrice, quantity, lineTotal]
      properties:
        unitPrice:
          type: integer
          format: int64
          description: Server-derived int VND (base + color delta + Σ option deltas). Never accepted from the client.
        quantity:
          type: integer
          minimum: 1
        lineTotal:
          type: integer
          format: int64
          description: unitPrice × quantity, overflow-checked server-side.

    # --- Order DTO (nested; assembled by handlers — NOT the flat sqlc row) ------------------------
    Order:
      type: object
      required:
        - id
        - code
        - channel
        - status
        - customer
        - shippingAddress
        - items
        - subtotal
        - shippingFee
        - total
        - statusHistory
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          description: Human order code, e.g. #LMN-0042.
        channel:
          $ref: '#/components/schemas/Channel'
        status:
          $ref: '#/components/schemas/OrderStatus'
        customer:
          $ref: '#/components/schemas/Customer'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'
        subtotal:
          type: integer
          format: int64
        shippingFee:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        paymentProofUrl:
          type: string
          format: uri
        paymentConfirmedAt:
          type: string
          format: date-time
        refundProofUrl:
          type: string
          format: uri
        trackingCode:
          type: string
        qcPhotoUrl:
          type: string
          format: uri
          description: QC packing photo attached on the PRINTING→SHIPPING transition (D-P3-6).
        note:
          type: string
        statusHistory:
          type: array
          items:
            $ref: '#/components/schemas/StatusEvent'
        createdAt:
          type: string
          format: date-time

    CreateOrderResult:
      type: object
      description: >
        The POST /orders 201 body: the created Order plus its phone-less tracking token (P2-i, D-P2-8).
        trackingToken is an HMAC capability derived from the order code and is returned ONLY here — never
        on the Order schema or any read endpoint — so it stays out of every surface that echoes an order.
        The storefront keeps it from this response to build the confirmation-screen link /o/{code}-{token}
        that GET /orders/track verifies without a phone. It is NOT stored (recomputed on the read), so no
        migration is needed and rotating TRACKING_SECRET invalidates every outstanding link.
      required: [order, trackingToken]
      properties:
        order:
          $ref: '#/components/schemas/Order'
        trackingToken:
          type: string
          description: HMAC capability token for GET /orders/track. Opaque; treat as a bearer secret.

    # --- Inputs -----------------------------------------------------------------------------------
    CreateOrderInput:
      description: >
        Order intake, discriminated on `channel`: `web` (public → PENDING_CONFIRM) vs `inbox`
        (staff/owner-only → PAID). This is a NAMED schema, not an inline oneOf, so oapi-codegen
        (strict-server) emits a usable discriminated union (AsCreateWebOrderInput /
        ValueByDiscriminator) instead of an opaque raw-message body the handler cannot read.
      oneOf:
        - $ref: '#/components/schemas/CreateWebOrderInput'
        - $ref: '#/components/schemas/CreateInboxOrderInput'
      discriminator:
        propertyName: channel
        mapping:
          web: '#/components/schemas/CreateWebOrderInput'
          inbox: '#/components/schemas/CreateInboxOrderInput'

    CreateWebOrderInput:
      type: object
      description: >
        Public web order → PENDING_CONFIRM. `paymentProofUrl` (the CK receipt image) is required.
        If any item carries `personalization`, both `personalizationAck` and `engraveEchoConfirmed`
        MUST be true (the no-return acknowledgement + engrave-echo step, ADR-012) — enforced server-side.
      required: [channel, customer, shippingAddress, items, paymentProofUrl]
      properties:
        channel:
          type: string
          enum: [web]
        customer:
          $ref: '#/components/schemas/Customer'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemInput'
        paymentProofUrl:
          type: string
          format: uri
        personalizationAck:
          type: boolean
        engraveEchoConfirmed:
          type: boolean

    CreateInboxOrderInput:
      type: object
      description: >
        Staff/owner-created inbox order → born PAID with no payment record (the staff already verified
        money landed, conventions §17). Requires a resolved staff/owner actor; no `paymentProofUrl`.
      required: [channel, customer, shippingAddress, items]
      properties:
        channel:
          type: string
          enum: [inbox]
        customer:
          $ref: '#/components/schemas/Customer'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemInput'
        note:
          type: string

    TransitionRequest:
      type: object
      description: >
        One requested status change. `reason` required for CANCELLED/REFUNDED; `refundProofUrl` for
        REFUNDED; `trackingCode` + `qcPhotoUrl` for →SHIPPING. Actor/role/time are NOT in the body
        (server-sourced).
      required: [to]
      properties:
        to:
          $ref: '#/components/schemas/OrderStatus'
        reason:
          type: string
        refundProofUrl:
          type: string
          format: uri
        trackingCode:
          type: string
        qcPhotoUrl:
          type: string
          format: uri

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        issueToken:
          type: boolean
          description: >
            When true, the 200 body also carries the signed JWT in `token` (alongside the
            Set-Cookie). Only the MV3 extension sets this — it stores the token in
            chrome.storage.local and sends it as `Authorization: Bearer` (cross-origin, no
            cookie; ADR-043). The admin SPA omits it and stays cookie-only (ADR-030).

    AuthUser:
      type: object
      description: >
        The authenticated user. `token` is present ONLY when the login request set
        `issueToken` (the MV3 extension; ADR-043); the admin SPA omits the flag and the token
        stays cookie-only (ADR-030). No other credential material.
      required: [id, name, email, role]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        token:
          type: string
          description: >
            Signed session JWT — the same token as the Set-Cookie. Present only for extension
            logins (issueToken=true; ADR-043). Optional (no `default`) so the admin client's
            typed response stays token-free.

    AdminStaff:
      type: object
      description: >
        A team-roster row (GET /admin/staff, P3-q) — the AuthUser fields plus `active`. No credential
        material (password_hash) is ever included. `active=false` is a deactivated account; the flag is
        shown, not toggled, this slice (no deactivate endpoint yet).
      required: [id, name, email, role, active]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        active:
          type: boolean

    StaffInvite:
      type: object
      description: >
        Create body for a staff/owner account (POST /admin/staff, P3-q). The owner sets an initial
        `password` (min 8) shared out-of-band — there is no email-invite flow yet. `role` is owner or
        staff (the two fixed roles, spec §08 — no custom roles). `name` is 2..60 chars. All bounds are
        validated server-side (oapi-codegen's strict server does not enforce schema min/maxLength).
      required: [name, email, role, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        password:
          type: string
          format: password
          minLength: 8

    # --- Storefront customer account (PR-P1-r) ----------------------------------------------------
    CustomerAccount:
      type: object
      description: >
        The authenticated storefront customer (no credential material). Distinct from AuthUser (admin):
        a customer has no role, and carries the phone captured at registration.
      required: [id, name, email, phone]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string

    CustomerRegisterInput:
      type: object
      description: New storefront account registration (ADR-030 realm riêng). Money/orders unrelated.
      required: [name, email, phone, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          description: Plaintext password; bcrypt-hashed server-side (never stored/returned in clear).

    CustomerOrderList:
      type: array
      description: >
        A customer's own orders, newest-first, each as the public timeline projection (the same shape
        the guest lookup returns) — deliberately NO internal money/PII/address fields (ADR-032). P1-s
        reuses the P1-o timeline renderer over this list.
      items:
        $ref: '#/components/schemas/PublicOrderTimeline'

    # --- Settings / STK (PR-3k) -------------------------------------------------------------------
    BankAccount:
      type: object
      description: VietQR STK the server renders the static QR from (conventions §57). May be unset.
      properties:
        bin:
          type: string
          description: Bank BIN (VietQR napas bank id).
        accountNumber:
          type: string
        accountName:
          type: string

    BankAccountUpdate:
      type: object
      description: Owner-only STK change (PATCH). `reason` is the optional audit note.
      required: [bin, accountNumber, accountName]
      properties:
        bin:
          type: string
        accountNumber:
          type: string
        accountName:
          type: string
        reason:
          type: string

    Settings:
      type: object
      description: >
        The settings singleton. `shopInfo` and `shippingRules` are free-form jsonb whose precise
        shapes are pinned in the Phase-1 storefront slice; typed loosely here on purpose.
      required: [bankAccount, refundPolicy, updatedAt]
      properties:
        shopInfo:
          type: object
          additionalProperties: true
        bankAccount:
          $ref: '#/components/schemas/BankAccount'
        shippingRules:
          type: array
          items:
            $ref: '#/components/schemas/ShippingRule'
        refundPolicy:
          type: string
        updatedAt:
          type: string
          format: date-time

    ShippingRule:
      type: object
      description: >
        One per-region shipping-fee row (settings.shipping_rules). VN address model, no district
        (ADR-017). Province "*" is the wildcard default fee (applied when no exact province matches).
      required: [province, fee]
      properties:
        province:
          type: string
          description: Destination province name, or "*" for the wildcard default.
        fee:
          type: integer
          format: int64
          description: Shipping fee for this province, raw int VND (≥ 0). Server resolves shippingFee from this table.

    ShippingRulesUpdate:
      type: object
      description: Owner-only wholesale replace of the shipping-fee table (PATCH).
      required: [shippingRules]
      properties:
        shippingRules:
          type: array
          items:
            $ref: '#/components/schemas/ShippingRule'

    RefundPolicyUpdate:
      type: object
      description: Owner-only refund-policy text change (PATCH, ADR-012).
      required: [refundPolicy]
      properties:
        refundPolicy:
          type: string

    ReplyTemplateInput:
      type: object
      description: >
        Create/replace body for a reply template. `variables` is DERIVED server-side from the {token}
        placeholders in `body` (spec §02) — it is NOT accepted here, so the stored hint list can never
        drift from the body text. The client sends title + body only.
      required: [title, body]
      properties:
        title:
          type: string
        body:
          type: string

    CheckoutConfig:
      type: object
      description: >
        Public checkout config (GET /checkout/config). A whitelist of the anonymous data the payment
        step and pre-purchase disclosure need — never the full Settings singleton (no shopInfo PII, no
        shipping-fee table).
      required: [bankAccount, vietqrUrl, shippableProvinces, refundPolicy]
      properties:
        bankAccount:
          $ref: '#/components/schemas/BankAccount'
        vietqrUrl:
          type: string
          description: >
            Server-built img.vietqr.io image URL for the STK static QR (D-P2-1). Derived entirely from
            the stored bank_account — no client-controllable field, no amount, no memo.
        shippableProvinces:
          type: array
          description: Provinces the shop ships to (settings.shipping_rules keys; the "*" wildcard excluded).
          items:
            type: string
        refundPolicy:
          type: string
          description: Refund/return policy text shown before purchase (compliance §3). May be empty if unset.

    PaymentProofUploadInput:
      type: object
      description: >
        Browser upload bootstrap for one payment-proof receipt image. The server does not accept a file
        name or client-declared size here: the object key is generated server-side with no PII, and the
        actual size/type gate lives in the signed S3 POST policy.
      required: [contentType]
      properties:
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp]
          description: Exact image MIME type the returned POST policy will allow.

    PaymentProofUpload:
      type: object
      description: >
        A short-lived, browser-ready S3/Garage POST form. Submit every `fields` entry and the file part
        to `uploadUrl`; after a successful direct upload, send `finalUrl` as `paymentProofUrl` in
        POST /orders. `finalUrl` is host-pinned by the server and never derived from browser input.
      required: [uploadUrl, fields, finalUrl, expiresAt, maxBytes]
      properties:
        uploadUrl:
          type: string
          format: uri
          description: S3/Garage form POST target, usually the bucket endpoint.
        fields:
          type: object
          additionalProperties:
            type: string
          description: Exact form fields to include before the file part.
        finalUrl:
          type: string
          format: uri
          description: Host-pinned object URL later passed as `paymentProofUrl` to POST /orders.
        expiresAt:
          type: string
          format: date-time
          description: Policy expiration timestamp.
        maxBytes:
          type: integer
          format: int64
          description: Maximum object size enforced by the signed POST policy.

    ImageUploadInput:
      type: object
      description: >
        Browser upload bootstrap for one permanent public image (pet-page or product-gallery photo). Like
        PaymentProofUploadInput, no file name or client-declared size is accepted: the object key is
        generated server-side with no PII and the actual size/type gate lives in the signed S3 POST policy.
      required: [contentType]
      properties:
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp]
          description: Exact image MIME type the returned POST policy will allow.

    ImageUpload:
      type: object
      description: >
        A short-lived, browser-ready S3/Garage POST form for one public image. Submit every `fields` entry
        and the file part to `uploadUrl`; after a successful direct upload the image is addressable at the
        host-pinned `finalUrl`, which the caller stores as the pet-photo or gallery URL. `finalUrl` is
        host-pinned by the server and never derived from browser input.
      required: [uploadUrl, fields, finalUrl, expiresAt, maxBytes]
      properties:
        uploadUrl:
          type: string
          format: uri
          description: S3/Garage form POST target, usually the bucket endpoint.
        fields:
          type: object
          additionalProperties:
            type: string
          description: Exact form fields to include before the file part.
        finalUrl:
          type: string
          format: uri
          description: Host-pinned object URL the caller stores as the pet-photo or product-gallery image URL.
        expiresAt:
          type: string
          format: date-time
          description: Policy expiration timestamp.
        maxBytes:
          type: integer
          format: int64
          description: Maximum object size enforced by the signed POST policy.

    ReplyTemplate:
      type: object
      description: An extension reply template (spec §02).
      required: [id, title, body, variables, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        variables:
          type: array
          items: { type: string }
          description: Placeholder tokens, e.g. ["{tên}", "{mã đơn}", "{STK}"].
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # --- Dashboard (PR-3i) ------------------------------------------------------------------------
    DashboardSnapshot:
      type: object
      required: [stats, recentOrders, todos]
      properties:
        stats:
          $ref: '#/components/schemas/DashboardStats'
        recentOrders:
          type: array
          items:
            $ref: '#/components/schemas/RecentOrder'
        todos:
          $ref: '#/components/schemas/DashboardTodos'

    DashboardStats:
      type: object
      required: [newOrdersToday, revenueToday, printing, reviewsWaiting]
      properties:
        newOrdersToday:
          type: integer
        revenueToday:
          type: integer
          format: int64
          description: Net revenue (int VND) for the Asia/Ho_Chi_Minh day (spec §04).
        printing:
          type: integer
        reviewsWaiting:
          type: integer

    RecentOrder:
      type: object
      required: [id, code, customerName, status, total, createdAt]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        customerName:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        total:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time

    DashboardTodos:
      type: object
      required: [pendingConfirm, paidWaitingPrint]
      properties:
        pendingConfirm:
          type: integer
        paidWaitingPrint:
          type: integer

    # --- Admin orders list (P3-b) -----------------------------------------------------------------
    AdminOrderSummary:
      type: object
      description: >
        One order row in the admin orders table (P3-b). The INTERNAL admin projection — unlike the public
        PublicOrderTimeline it carries the customer name, the channel and the total. firstItemName +
        itemCount back the "sản phẩm" column (the client renders e.g. "Đèn Mochi +1" when itemCount > 1);
        total is raw int-VND (never formatted server-side, always-must #2).
      required: [id, code, customerName, firstItemName, itemCount, channel, status, total, createdAt]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        customerName:
          type: string
        firstItemName:
          type: string
          description: Product name of the order's first line item — the "sản phẩm" column anchor.
        itemCount:
          type: integer
          description: Number of line items on the order; the client renders "+N" (itemCount − 1) when > 1.
        channel:
          $ref: '#/components/schemas/Channel'
        status:
          $ref: '#/components/schemas/OrderStatus'
        total:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time

    AdminOrderList:
      type: object
      description: >
        One page of admin order summaries plus the pagination envelope. `total` is the count of orders
        matching the status filter across all pages; the client derives the page count.
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminOrderSummary'
        page:
          type: integer
          description: 1-based page number echoed from the request.
        pageSize:
          type: integer
          description: Items per page echoed from the request.
        total:
          type: integer
          description: Total orders matching the status filter, across all pages.

    AdminCustomer:
      type: object
      description: >
        One customer row in the admin Khách hàng list (P3-p) — contact plus an order roll-up.
        socialHandle is the single stored MXH link (spec §02: singular, ADR-003). orderCount /
        totalSpent aggregate ALL of the customer's orders regardless of status (a rough lifetime value);
        totalSpent is raw int-VND (never formatted server-side, always-must #2). email / socialHandle
        are absent when unset; lastOrderAt is absent for a customer with no orders yet.
      required: [id, name, phone, orderCount, totalSpent]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        socialHandle:
          type: string
        orderCount:
          type: integer
          description: Count of the customer's orders (all statuses).
        totalSpent:
          type: integer
          format: int64
          description: Sum of the customer's order totals, raw int-VND (all statuses).
        lastOrderAt:
          type: string
          format: date-time
          description: Created-at of the customer's most recent order; absent if they have none yet.

    AdminCustomerDetail:
      type: object
      description: >
        A customer's full admin profile (GET /admin/customers/{id}, P3-p): contact + saved addresses +
        order history + summed lifetime spend. PII behind the admin gate (PDPL). orders is newest-first;
        each row carries the money (raw int-VND) + status enum a purchase-history list needs. addresses
        is the stored Address[] (may be empty). totalSpent is summed server-side (all statuses).
      required: [id, name, phone, createdAt, totalSpent, addresses, orders]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        socialHandle:
          type: string
        createdAt:
          type: string
          format: date-time
        totalSpent:
          type: integer
          format: int64
          description: Sum of the customer's order totals, raw int-VND (all statuses).
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        orders:
          type: array
          items:
            $ref: '#/components/schemas/AdminCustomerOrder'

    AdminCustomerOrder:
      type: object
      description: >
        One order in a customer's history (P3-p) — the compact row the profile lists. code + total (raw
        int-VND) + status + createdAt is enough to look an order up; the per-order product summary the
        design shows is deferred (it needs an item join). Newest first.
      required: [id, code, status, total, createdAt]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        total:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time

    PrintQueueJob:
      type: object
      description: >
        One enriched print-queue card (P3-f), returned by GET /admin/print-queue and the stage PATCH.
        The bare print_jobs row (spec §02: orderItemRef · stage · printer · colorName · eta) joined to
        the order code, product name and quantity so a card at the printer says WHAT to make for WHICH
        order. colorName/printer/eta are optional (nullable columns). Stage is a PrintStage enum the
        client maps to the kanban column label (always-must #3).
      required: [id, stage, productType, orderCode, productName, quantity]
      properties:
        id:
          type: string
          format: uuid
        stage:
          $ref: '#/components/schemas/PrintStage'
        productType:
          $ref: '#/components/schemas/ProductType'
        orderCode:
          type: string
          description: Display code of the owning order (e.g. #LMN-2261) — the card's "which order" anchor.
        productName:
          type: string
          description: Product name of the print job's order line — what to make.
        quantity:
          type: integer
          description: Quantity of the order line (the card renders "×N").
        colorName:
          type: string
          description: Denormalized color name for the queue card (spec colorName); absent if the line has no color.
        partColorLabels:
          type: array
          items:
            type: string
          description: >
            Per-part colour labels ("Chao: Đỏ") for a product with named parts (ADR-037), from the names
            denormalized into the order line at capture. What filament for which part, at the printer. Absent
            for a flat product (which uses colorName). Read-only.
        printer:
          type: string
          description: Assigned printer, when staff have set one.
        eta:
          type: string
          format: date-time
          description: Estimated handoff, when set.

    PrintStageUpdate:
      type: object
      description: PATCH body for /admin/print-jobs/{id} — the target print stage (staff drag-drop).
      required: [stage]
      properties:
        stage:
          $ref: '#/components/schemas/PrintStage'

    # --- Pet Tag NFC encode (P3-t t-2) ------------------------------------------------------------
    PetTagRef:
      type: object
      description: >
        A minimal reference to the physical Pet Tag behind a print job (spec §10). Returned by the encode
        endpoint so the admin sheet can show the URL to burn to the chip and the current tag status. The
        tag is minted lazily on the first encode call for an nfc_tag order line (no order→print_job
        wiring exists yet — ADR-041); code + shortId are stable once created.
      required: [code, shortId, url, status]
      properties:
        code:
          type: string
          description: Display code (e.g. #LMN-T0231) — the admin-facing tag reference.
        shortId:
          type: string
          description: The URL routing key burned to the chip — the /t/{shortId} pet-page segment.
        url:
          type: string
          description: >
            The absolute pet-page URL to write to the NFC chip (NDEF), derived server-side from shortId
            (PET_TAG_BASE_URL). This is what staff encode onto the NTAG215.
        status:
          $ref: '#/components/schemas/PetTagStatus'
        chipUid:
          type: string
          description: The NTAG215 hardware UID recorded at encode; absent until the tag is ENCODED.

    AdminPetTag:
      type: object
      description: >
        One Pet Tag row in the admin roster (P3-t t-5, GET /admin/pet-tags). code + status + url identify
        the physical tag and its lifecycle stage; chipUid is present once ENCODED. The pet-derived fields
        (handle, petName, species, lostMode) come from the linked pet_profiles row (a LEFT JOIN) and are
        therefore absent for a tag that is not yet ACTIVATED — the roster shows "chưa liên kết" for those.
        No money, no owner PII (the pet is identified by its public @handle, not the customer account).
      required: [id, code, status, url, createdAt]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          description: Display code (e.g. #LMN-T0231).
        status:
          $ref: '#/components/schemas/PetTagStatus'
        url:
          type: string
          description: The absolute pet-page URL (/t/{shortId}, PET_TAG_BASE_URL) — what is burned to the chip.
        chipUid:
          type: string
          description: The NTAG215 hardware UID; absent until the tag is ENCODED.
        createdAt:
          type: string
          format: date-time
        handle:
          type: string
          description: The linked pet's public @handle (absent until the tag is ACTIVATED).
        petName:
          type: string
          description: The linked pet's name (absent until ACTIVATED).
        species:
          $ref: '#/components/schemas/PetSpecies'
        lostMode:
          type: boolean
          description: Whether the owner has the pet in lost mode (absent until ACTIVATED).

    PrintTagEncodeInput:
      type: object
      description: >
        Body for POST /admin/print-jobs/{id}/encode. OMIT chipUid to PREPARE — mint/return the tag + the
        URL to burn, leaving the stage untouched (the sheet-open call). SEND chipUid to CONFIRM — record
        the chip UID, mark the tag ENCODED, and advance the print job to PACKING (the write-done call).
      properties:
        chipUid:
          type: string
          minLength: 1
          maxLength: 64
          description: The NTAG215 hardware UID read from the just-written chip. Omit to prepare only.

    PrintTagEncodeResult:
      type: object
      description: >
        Response for POST /admin/print-jobs/{id}/encode. `tag` is the Pet Tag ref (URL to burn + status);
        `card` is the print-queue card in its CURRENT state — unchanged for a prepare call, advanced to
        PACKING after a confirm. The client folds `card` back into the board (same shape as the list).
      required: [tag, card]
      properties:
        tag:
          $ref: '#/components/schemas/PetTagRef'
        card:
          $ref: '#/components/schemas/PrintQueueJob'

    # --- Pet Tag activation + public pet page (P3-t t-3) -------------------------------------------
    PetSpecies:
      type: string
      description: The pet's species — a fixed 3-choice set on the onboarding form (spec §10). `other` catches the rest.
      enum:
        - dog
        - cat
        - other

    PetOwnerContact:
      type: object
      description: >
        The owner's contact block (spec §10). phone is REQUIRED — it is what makes lost mode useful. On the
        public page phone is masked and revealed only in lost mode / to the owner (PDPL, t-4); the value
        stored here is the raw number.
      required: [name, phone]
      properties:
        name:
          type: string
        phone:
          type: string
          description: VN phone (0… or +84…), validated server-side.
        zalo:
          type: string

    PetMedical:
      type: object
      description: The pet's medical block (spec §10) — all optional. `allergies` drives the allergy warning on the page.
      properties:
        vaccinated:
          type: boolean
        neutered:
          type: boolean
        allergies:
          type: string
        vetClinic:
          type: string

    PetSocial:
      type: object
      description: One social link (spec §10) — a handle, not a full URL (e.g. instagram / tiktok).
      required: [platform, handle]
      properties:
        platform:
          type: string
        handle:
          type: string

    PetTheme:
      type: object
      description: >
        The pet page's theme (spec §10 "Theme trang pet") — 5 brand colorways + Đêm cocoa, a background style
        with a per-image opacity, and the name font. This is the READ shape (P3-t t-4c-1) projected as-is from
        the stored jsonb; the theme SHEET that writes it (with the fixed colorway/background/font choices, no
        free picker) lands in t-4c-2. All fields optional — an unthemed page carries an empty theme and renders
        the brand default. Safety colours (allergy warning, lost banner, emergency call) are never themed.
      properties:
        palette:
          type: string
          description: >
            A brand colorway id — bo · bac-ha · cam-nang · troi-xanh · nang (light) or cocoa (dark), spec §10
            "Bơ · Bạc hà · Cam nắng · Trời xanh · Nắng + Đêm cocoa". Drives the page bg + chips + accents. An
            unknown/absent value renders the bo default (read-passthrough is lenient; the write validates).
        background:
          type: string
          description: Background style — dots · plain · paper · image (spec §10 Chấm bi · Trơn · Vân giấy · Ảnh riêng).
        bgImageUrl:
          type: string
          description: The custom background image URL, present only when background=image.
        bgOpacity:
          type: integer
          description: Background image opacity 0–100 (default 40 — spec §10 validation).
        nameFont:
          type: string
          description: The pet-name font — display (Bricolage) or mono (Space Mono).

    PetBlock:
      type: object
      description: >
        One content block's placement (spec §10 ProfileBlock) — the order + visibility the owner sets in the
        reorder mode. READ shape (P3-t t-4c-1) projected from the stored blocks jsonb; the reorder mode that
        writes it lands in t-4c-2. The photo_name block is always first and cannot be hidden.
      required: [type, order, visible]
      properties:
        type:
          type: string
          description: The block kind — photo_name · bio · gallery · favorites · medical · socials.
        order:
          type: integer
        visible:
          type: boolean

    PetPageContact:
      type: object
      description: >
        The owner-contact block AS PROJECTED to the public page (P3-t t-4a) — the PDPL-safe view of
        PetOwnerContact. `masked` is the reveal gate: when true (a stranger, at-home page) only `phoneMasked`
        is present and NO callable value is shipped; when false (lost mode, or the owner viewing) the full
        `phone`/`zalo`/`email` are included so the finder can reach the owner. `name` is owner-only (a finder
        never needs it — the CTAs say "sen của {petName}"). Masking is decided server-side: the raw number
        never reaches the wire in the masked case.
      required: [masked, phoneMasked]
      properties:
        masked:
          type: boolean
          description: true = only the masked phone is available (at-home stranger view); false = full contact revealed.
        phoneMasked:
          type: string
          description: The always-safe masked phone, e.g. "+84 90 •••• 261".
        phone:
          type: string
          description: Full VN phone — present only when masked=false (lost mode or owner).
        zalo:
          type: string
          description: Present only when masked=false and the owner set a Zalo handle.
        email:
          type: string
          description: Present only when masked=false and the owner set an email.
        name:
          type: string
          description: Owner name — present only when the viewer IS the owner (never shown to finders).

    PetPageProfile:
      type: object
      description: >
        The pet profile the public /t/{shortId} page renders in its 3 view-states (P3-t t-4a/t-4c). Display
        fields + the content blocks (bio, gallery, favorites) + medical (drives the allergy warning) + socials
        + a PDPL-masked contact block + lostMode (routes the view-state) + the theme/blocks the page renders
        with. bio/gallery/favorites gained their writer with the t-4c in-place editor; theme/blocks are
        projected here (their writer — the theme sheet + reorder mode — lands in t-4c-2).
      required: [handle, petName, species, lostMode, contact]
      properties:
        handle:
          type: string
          description: The vanity slug shown as @handle (derived from the pet name).
        petName:
          type: string
        species:
          $ref: '#/components/schemas/PetSpecies'
        photoUrl:
          type: string
        breed:
          type: string
        age:
          type: string
        weight:
          type: string
        bio:
          type: string
          description: The pet's free-text intro (spec §10 "Giới thiệu"). Owner-editable (t-4c).
        gallery:
          type: array
          description: Album photo URLs (spec §10 gallery). Owner-editable (t-4c).
          items:
            type: string
        favorites:
          type: array
          description: '"Khoái khẩu" chips (spec §10 favorites) — short free-text labels. Owner-editable (t-4c).'
          items:
            type: string
        lostMode:
          type: boolean
          description: false = at-home (default), true = lost/rescue. Routes the view-state + gates the contact reveal.
        medical:
          $ref: '#/components/schemas/PetMedical'
        socials:
          type: array
          items:
            $ref: '#/components/schemas/PetSocial'
        theme:
          $ref: '#/components/schemas/PetTheme'
        blocks:
          type: array
          description: Content-block order + visibility (spec §10). Empty until the owner reorders (t-4c-2); the page falls back to a default order.
          items:
            $ref: '#/components/schemas/PetBlock'
        contact:
          $ref: '#/components/schemas/PetPageContact'

    PetPage:
      type: object
      description: >
        The public /t/{shortId} pet-page read (P3-t t-3/t-4a). `status` routes the page: UNENCODED/ENCODED =
        not yet activated (onboarding/welcome), ACTIVATED = live. `viewerIsOwner` is true when the optional
        customer session belongs to the tag's owner (drives the owner affordances — the lost-mode toggle now,
        the editor in t-4c). `profile` is present only when ACTIVATED.
      required: [shortId, status, viewerIsOwner]
      properties:
        shortId:
          type: string
        status:
          $ref: '#/components/schemas/PetTagStatus'
        viewerIsOwner:
          type: boolean
          description: Whether the (optional) signed-in customer is this tag's owner.
        profile:
          $ref: '#/components/schemas/PetPageProfile'
        recentScans:
          type: array
          description: >
            Recent finder location-shares for this pet — the in-app "your pet was scanned" notify (spec §10 D4,
            P3-t t-4b). Populated ONLY when viewerIsOwner (a stranger never learns where a lost pet was found).
            Most recent first.
          items:
            $ref: '#/components/schemas/PetLostScan'

    PetLostModeInput:
      type: object
      description: The PATCH body for toggleLostMode (P3-t t-4a) — the requested lost-mode value.
      required: [lostMode]
      properties:
        lostMode:
          type: boolean

    PetActivateInput:
      type: object
      description: >
        The 2-step onboarding payload (spec §10 steps 2b+2c) submitted to activate a tag. petName + species
        + ownerContact (phone) are required, the rest optional; consent MUST be true (PDPL consent point 1 —
        the profile stores pet + owner PII). No microchip field (spec §10: "bỏ field số microchip").
      required: [petName, species, ownerContact, consent]
      properties:
        petName:
          type: string
          minLength: 1
          maxLength: 40
        species:
          $ref: '#/components/schemas/PetSpecies'
        breed:
          type: string
        age:
          type: string
          description: Free-form ("2 tuổi", "6 tháng") — not a number in the design.
        weight:
          type: string
        photoUrl:
          type: string
          description: Optional avatar URL (reuses the presigned proof upload the checkout receipt uses).
        medical:
          $ref: '#/components/schemas/PetMedical'
        ownerContact:
          $ref: '#/components/schemas/PetOwnerContact'
        socials:
          type: array
          items:
            $ref: '#/components/schemas/PetSocial'
        consent:
          type: boolean
          description: >
            PDPL consent (point 1) to store the pet + owner PII for the pet-page purpose. Must be true — a
            false/absent consent is a 400. Recorded as a pet_profile consent grant (ADR-042).

    PetProfileUpdateInput:
      type: object
      description: >
        The in-place editor's save payload (spec §10 sửa-tại-chỗ, P3-t t-4c-1) — the full editable page
        content the owner replaces in one PATCH. petName + species + ownerContact (phone) are required (they
        can't be cleared), the rest optional; an absent optional clears that field. No consent (granted once
        at onboarding), no handle (derived), no lostMode/theme/blocks (their own endpoints / t-4c-2). Fields
        mirror onboarding + the new content blocks (bio, gallery, favorites).
      required: [petName, species, ownerContact]
      properties:
        petName:
          type: string
          minLength: 1
          maxLength: 40
        species:
          $ref: '#/components/schemas/PetSpecies'
        breed:
          type: string
        age:
          type: string
        weight:
          type: string
        photoUrl:
          type: string
        bio:
          type: string
        gallery:
          type: array
          items:
            type: string
        favorites:
          type: array
          items:
            type: string
        medical:
          $ref: '#/components/schemas/PetMedical'
        ownerContact:
          $ref: '#/components/schemas/PetOwnerContact'
        socials:
          type: array
          items:
            $ref: '#/components/schemas/PetSocial'

    PetAppearanceInput:
      type: object
      description: >
        The theme sheet + reorder mode save (spec §10, P3-t t-4c-2) — a FULL replace of the page appearance:
        the theme and the ordered block list, both sent every time (the client holds the loaded appearance).
        Reuses the loose read shapes (PetTheme / PetBlock); the server validates the fixed choices (palette /
        background / font enums, opacity 0–100, known block types, a first-and-visible photo_name block).
        Kept separate from PetProfileUpdateInput so appearance + content never clobber each other.
      required: [theme, blocks]
      properties:
        theme:
          $ref: '#/components/schemas/PetTheme'
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/PetBlock'

    PetShareLocationInput:
      type: object
      description: >
        The finder's one-shot location share for a lost pet (spec §10 rescue 4a→4b, P3-t t-4b). Only lat/lng —
        data-minimized (PDPL). Sent once, after the finder grants the browser geolocation permission.
      required: [lat, lng]
      properties:
        lat:
          type: number
          format: double
          description: WGS84 latitude, -90..90.
        lng:
          type: number
          format: double
          description: WGS84 longitude, -180..180.

    PetShareLocationResult:
      type: object
      description: Acknowledges that the finder's location was recorded (spec §10 4b "đã gửi").
      required: [ok]
      properties:
        ok:
          type: boolean
          description: Always true on a 200 — the lost_events row was created.

    PetLostScan:
      type: object
      description: >
        One finder location-share surfaced to the OWNER on their own pet page (spec §10 D4 in-app notify, P3-t
        t-4b). Present only in PetPage.recentScans, only for the owner. mapUrl is an OpenStreetMap link derived
        from the stored {lat,lng} (never reverse-geocoded here — that is deferred, plan §6).
      required: [scannedAt, mapUrl]
      properties:
        scannedAt:
          type: string
          format: date-time
          description: When the finder shared the location (ISO-8601 UTC).
        mapUrl:
          type: string
          description: OpenStreetMap link to the shared coordinates (owner-only).

    # --- Public guest order lookup (P1-n) ---------------------------------------------------------
    PublicOrderTimeline:
      type: object
      description: >
        The guest-facing order timeline returned by GET /orders/lookup. It is a SEPARATE schema from
        Order (never a $ref) and exposes ONLY what a customer who already knows their code + phone may
        see: the code they typed, the current status, a status→time milestone list, an optional carrier
        tracking code, and the creation instant. It deliberately OMITS every internal field — customer
        PII, shipping address, line items, money (subtotal/shippingFee/total/unitPrice), payment/refund
        proof URLs, the internal note, the order uuid, the channel, and the statusHistory actor (byUser)
        + reason (ADR-032 non-leak).
      required: [code, status, milestones, createdAt]
      properties:
        code:
          type: string
          description: The human order code the guest supplied (e.g. "#LMN-1000").
        status:
          $ref: '#/components/schemas/OrderStatus'
        milestones:
          type: array
          description: >
            Reached statuses with the instant each was entered, oldest-first — the progress milestones
            plus any CANCELLED/REFUNDED close state. The frontend (P1-o) renders labels and shows the
            close states apart from the 5-step progress track (spec §04).
          items:
            $ref: '#/components/schemas/OrderMilestone'
        trackingCode:
          type: string
          description: Carrier waybill, present only from SHIPPING onward (spec §04). Omitted before then.
        createdAt:
          type: string
          format: date-time

    OrderMilestone:
      type: object
      description: >
        One reached order status with the instant it was entered — a whitelist projection of a
        statusHistory event that drops the actor (byUser), reason, and proof fields (ADR-032 non-leak).
      required: [status, at]
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'
        at:
          type: string
          format: date-time

    # --- Errors -----------------------------------------------------------------------------------
    ErrorEnvelope:
      type: object
      description: >
        The one error shape every endpoint returns (ADR-032). `code` is a stable machine code
        (e.g. NOT_FOUND, INVALID_EDGE, RBAC, REASON_REQUIRED, VALIDATION); `messageKey` is a next-intl
        key (the domain's Vietnamese prose is NEVER forwarded). `fields` maps a field path → messageKey
        for per-field validation errors.
      required: [code, messageKey]
      properties:
        code:
          type: string
        messageKey:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
