          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/staff:
    get:
      tags: [admin]
      operationId: getAdminStaff
      summary: Staff & roles roster — every user account (owner-only read).
      description: >
        Lists every user account (owner + staff), owner first, as the team roster for Cài đặt › Nhân
        viên (P3-q). Owner-only for BOTH read and write: managing the team — and even seeing the roster —
        is an owner power (spec §08; the design's role matrix gives staff no access to "Cài đặt & nhân
        viên"), so a staff caller gets 403. This is the ONE owner-only admin READ; every other admin read
        is owner+staff. No credential material (password_hash) is ever projected. NOT paginated — a
        made-to-order shop's team is small.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: The team roster (owner first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminStaff'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [admin]
      operationId: createStaff
      summary: Invite a staff/owner account with an owner-set initial password (owner-only).
      description: >
        Creates a user account carrying a login credential the owner sets and shares out-of-band
        (P3-q). There is no email-invite / self-service-password infrastructure yet (deferred) — the
        owner sets a starting password here and passes it to the person, who logs in with email +
        password immediately. Owner-only. A duplicate email → 409 EMAIL_TAKEN (a login email is
        user-known, not a secret — the same safe-to-surface conflict as customer register).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffInvite'
      responses:
        '201':
          description: The created account (no credential material).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStaff'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/categories:
    get:
      tags: [admin]
      operationId: getAdminCategories
      summary: Admin category list — every category with its product count (admin-gated read).
      description: >
        Returns EVERY category (P3-o) as the admin projection — id, slug, name, productCount (the number of
        products referencing it across ALL statuses), plus the menu-control fields displayOrder, description,
        imageUrl and visible (slice o-2) — ordered by displayOrder (the owner's drag-set menu order), then
        name/slug as the tiebreak. Unlike the public GetCategories (which lists only VISIBLE categories with
        an ACTIVE product), this is the INTERNAL admin taxonomy: it shows empty, draft-only, AND owner-hidden
        categories too, so the owner can manage the whole set. productCount is the deletability signal — a
        non-zero count means a hard delete is blocked (409). NOT paginated: categories are a small,
        admin-curated set. Admin-gated (cookieAuth; owner AND staff read).
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Every category with its product count (name A→Z).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminCategory'
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [admin]
      operationId: createAdminCategory
      summary: Create a category (owner-only).
      description: >
        Creates a category from the admin taxonomy editor (owner-only — spec §08 catalog is an owner power).
        A duplicate slug → 400 with a `slug` field error. The response is the created Category (its
        productCount is definitionally 0, so the list shape is not needed here).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryInput'
      responses:
        '201':
          description: The created category.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [admin]
      operationId: updateAdminCategory
      summary: Edit a category — name, slug, description, cover image, visibility (owner-only).
      description: >
        Saves a category's editable fields (owner-only): slug, name, description, imageUrl (a shared
        proofstore image URL, same host as product photos) and visible (the menu-visibility toggle). Does NOT
        change displayOrder — that moves only via the reorder endpoint (a drag), so a Save never disturbs the
        menu order. Unknown id → 404; a slug now taken by another category → 400 with a `slug` field error.
        The response is the updated Category (the plain public shape; productCount is unchanged, so the caller
        keeps the count it already holds).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdate'
      responses:
        '200':
          description: The updated category.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [admin]
      operationId: deleteAdminCategory
      summary: Delete a category (owner-only; blocked while products reference it).
      description: >
        Hard-deletes a category (owner-only). Allowed only for a category no product references; a category
        still in use is retained (products.category_id is NOT NULL with NO ACTION) and the delete returns 409
        CATEGORY_IN_USE — reassign or archive the products first. Unknown id → 404.
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/categories/reorder:
    post:
      tags: [admin]
      operationId: reorderAdminCategories
      summary: Set the category menu order (owner-only).
      description: >
        Persists the storefront menu order after an owner drags the list (P3-o slice o-2). The body is the
        FULL ordered list of category ids; each category's displayOrder is set to its 0-based position in one
        atomic update, so GetCategories then returns the menu in this order. Ids the client omits keep their
        current order; an unknown id is ignored. Owner-only (spec §08 catalog is an owner power). Idempotent
        — re-sending the same order is a no-op.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryReorder'
      responses:
        '204':
          description: Order saved.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/reviews:
    get:
      tags: [admin]
      operationId: getAdminReviews
      summary: Admin review-moderation list — every review across all products (admin-gated read).
      description: >
        Returns EVERY review (P3-m) as the admin moderation projection — rating/body/images/reply/status/
        createdAt plus the product name and the reviewer's name (customerName is null for a guest review) —
        newest first, optionally filtered to one status. Unlike the public GET /products/{slug}/reviews (which
        is published-only at the SQL source), this shows HIDDEN reviews too, so the shop can un-hide or reply.
        The reviewer name is admin-only PII (PDPL) — served only behind the admin auth wall. NOT paginated: a
        made-to-order shop's review set is small and the FE derives its tabs (pending-reply / replied /
        has-image) client-side. Admin-gated (cookieAuth; owner AND staff — staff moderates reviews, spec §08).
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter to a single review status (published/hidden). Omit for all ("Tất cả").
          schema:
            $ref: '#/components/schemas/ReviewStatus'
      responses:
        '200':
          description: Every review as an admin moderation card (newest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminReview'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/reviews/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [admin]
      operationId: updateAdminReview
      summary: Moderate a review — publish/hide and/or reply (owner or staff).
      description: >
        Applies a moderation change to one review (P3-m): set status (publish ↔ hide) and/or write the shop
        reply. At least one of `status`/`reply` must be present (an empty body is a 400). A `reply` sets the
        public shop reply (its timestamp is server-stamped); the FE sends `status: published` alongside a
        reply for "Lưu & công khai" so replying also makes the review visible. Omitting a field leaves it
        unchanged (a plain hide keeps any existing reply). Unknown id → 404. Owner AND staff (staff moderates
        reviews, spec §08). Returns 204 — the FE re-reads the list.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewModeration'
      responses:
        '204':
          description: Moderation applied.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/products:
    get:
      tags: [admin]
      operationId: getAdminProducts
      summary: Admin catalog list — every product across all statuses (admin-gated read).
      description: >
        Returns the whole catalog as an admin SUMMARY projection (id, slug, name, basePrice, category,
        status, cover images, rating, review count, created date), newest first, optionally filtered to a
        single ProductStatus (omit for all, "Tất cả"). This is the INTERNAL admin projection — unlike the
        public GetProducts card list it shows draft/archived products too (ADR-032). NOT paginated: a
        made-to-order catalog is small and admin-curated, so the FE holds the whole set and searches
        client-side. Admin-gated (cookieAuth; owner AND staff read). Money (basePrice) is raw int-VND
        (always-must #2); status is an enum the client maps to an i18n label (always-must #3).
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter to a single product status (spec §02). Omit for all statuses ("Tất cả").
          schema:
            $ref: '#/components/schemas/ProductStatus'
      responses:
        '200':
          description: Every product as an admin summary card (newest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminProductSummary'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [admin]
      operationId: createAdminProduct
      summary: Create a product (owner-only).
      description: >
        Creates a product from the editor form (owner-only — spec §08 catalog is an owner power). A
        product is born with no model (model3dUrl is set later by the asset pipeline, P3-j-b) and with the
        colors/options added through their own nested endpoints, so the response Product has empty
        colors/options. A duplicate slug → 400 with a `slug` field error.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: The created product.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [admin]
      operationId: getAdminProduct
      summary: Admin product detail by id — any status, with colors and options (admin-gated read).
      description: >
        Returns one product as the full Product shape (with its colors and options) for the editor to
        populate — ANY status, unlike the active-only public GetProductBySlug (ADR-032). Admin-gated
        (cookieAuth; owner AND staff read). Unknown id → 404.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: The product with its colors and options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [admin]
      operationId: updateAdminProduct
      summary: Save a product's editable fields (owner-only).
      description: >
        Saves the editable fields of a product (owner-only). It does NOT touch model3dUrl — that column is
        owned by the asset pipeline (P3-j-b), so the editor form can never blank it. A slug changed to one
        already taken → 400 with a `slug` field error. Unknown id → 404. Returns the updated product with
        its colors and options.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: The updated product.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [admin]
      operationId: deleteAdminProduct
      summary: Hard-delete a product (owner-only; blocked for products with history).
      description: >
        Hard-deletes a product (owner-only). Allowed only for a never-ordered, never-rendered product
        (its colors/options cascade away); a product referenced by an order or an asset job is retained
        (ON DELETE RESTRICT) and the delete returns 409 — the reversible "remove from store" path is
        PATCH status→archived. Unknown id → 404.
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/products/{id}/model-view:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [admin]
      operationId: updateProductModelView
      summary: Save a product's default 3D-viewer camera pose (owner-only, ADR-038).
      description: >
        Persists the owner's saved default camera pose (the "Lưu góc mặc định" action) — the exact angle a
        customer sees when opening the 3D viewer. The whole pose is set together (atomic). Display metadata,
        never money; it does not touch pricing. Out-of-range values → 400 with a per-field error. Unknown id
        → 404. On success the pose is stored and the storefront viewer opens to it (a NULL pose auto-frames).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Model3dView'
      responses:
        '204':
          description: Saved.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/products/{id}/colors:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [admin]
      operationId: createProductColor
      summary: Add a named print colour to a product (owner-only).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ColorInput'
      responses:
        '201':
          description: The created colour.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Color'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/products/{id}/colors/{colorId}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: colorId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [admin]
      operationId: updateProductColor
      summary: Edit a product's colour (owner-only).
      description: Scoped by (product, colour); a colourId under another product → 404.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ColorInput'
      responses:
        '200':
          description: The updated colour.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Color'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [admin]
      operationId: deleteProductColor
      summary: Remove a product's colour (owner-only).
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/products/{id}/options:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [admin]
      operationId: createProductOption
      summary: Add a customization option to a product (owner-only).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptionInput'
      responses:
        '201':
          description: The created option.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Option'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/products/{id}/options/{optionId}:
    parameters:
