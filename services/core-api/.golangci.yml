# golangci-lint v2 config for services/core-api — run via `make verify-go`.
# ADR-020 locks golangci-lint v2. The standard linters (errcheck, govet,
# ineffassign, staticcheck, unused) are enabled by default; gofmt is enforced
# separately in the Makefile. Low-noise, high-signal.
version: "2"

run:
  timeout: 3m

linters:
  enable:
    - misspell
  exclusions:
    # Generated code carries the standard "Code generated … DO NOT EDIT" header
    # (lax already skips it), but path-exclude *.gen.go explicitly too: oapi-codegen
    # output routinely trips v2's zero-issue gate and is machine output, not ours to
    # fix (ADR-031/§6 D8, plan core-http-relay.md §3c-2; mirrors sqlc's gen package).
    generated: lax
    paths:
      - '.*\.gen\.go$'
    rules:
      # Tests favour readability over exhaustive error checks on helpers.
      - path: _test\.go
        linters:
          - errcheck
