# sqlc v2 codegen for core-api (ADR-020/ADR-028). Run via `make sqlc`; the
# generated package is committed and validated in `make verify-go` (see Makefile).
#
# schema points at the UP migrations ONLY (`*.up.sql`) — the golang-migrate dir
# also holds `.down.sql` DROP statements, and globbing those would feed sqlc an
# empty/inconsistent schema. The up-migrations are the single schema source sqlc
# compiles queries against (plan core-data-layer §3, critique BLOCKER fix).
version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations/*.up.sql"
    queries: "db/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"
        # camelCase JSON tags so generated models match the OpenAPI/TS contract
        # even though columns are snake_case (ADR-003, no ORM auto-map).
        emit_json_tags: true
        json_tags_case_style: "camel"
        emit_pointers_for_null_types: true
        emit_interface: true
        emit_prepared_queries: false
        emit_exact_table_names: false
        overrides:
          # App-generated UUIDs use google/uuid (Go stdlib has no UUID type/generator),
          # so columns are clean uuid.UUID, not pgtype.UUID. Applies to all uuid columns.
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          # Outbox payload stays raw JSON — the relay forwards it verbatim to NATS.
          - column: "outbox.payload"
            go_type: "encoding/json.RawMessage"
          # Order spine (PR-2e): map the enum + jsonb columns to the EXISTING slice-1 domain
          # types so the DB layer and the state machine share one set of types and cannot
          # drift (plan core-data-layer §3, ADR-004). order_status/order_channel are used only
          # by the new orders table, so these db_type overrides have no retroactive effect on
          # earlier axes. payment_method/user_role keep sqlc's generated enums (no slice-1
          # equivalent for the former; the latter is owned by the already-merged identity axis).
          - db_type: "order_status"
            go_type:
              import: "github.com/huongnguyenduc/lumin-studio/services/core-api/internal/order"
              type: "Status"
          - db_type: "order_channel"
            go_type:
              import: "github.com/huongnguyenduc/lumin-studio/services/core-api/internal/order"
              type: "Channel"
          # statusHistory jsonb reuses the exact slice the state machine appends.
          - column: "orders.status_history"
            go_type:
              import: "github.com/huongnguyenduc/lumin-studio/services/core-api/internal/order"
              type: "StatusEvent"
              slice: true
          - column: "orders.shipping_address"
            go_type:
              import: "github.com/huongnguyenduc/lumin-studio/services/core-api/internal/order"
              type: "Address"
          # personalization is a nullable jsonb column → pointer (nil = no engraving).
          - column: "order_items.personalization"
            go_type:
              import: "github.com/huongnguyenduc/lumin-studio/services/core-api/internal/order"
              type: "Personalization"
              pointer: true
